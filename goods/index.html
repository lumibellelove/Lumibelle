<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOODS | Lumibelle</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=SUIT:wght@400;500;600;700;800&display=swap');

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      background:#fffafc;
      color:#7f6a77;
      font-family:"SUIT","Noto Sans KR",sans-serif;
      letter-spacing:-0.01em;
    }

    .top-lang-bar{
      width:100%;
      max-width:1260px;
      margin:16px auto 0;
      display:flex;
      justify-content:flex-end;
      padding:0 34px 0 18px;
    }

    .lang-switch{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .lang-switch a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:42px;
      height:36px;
      padding:0 10px;
      border-radius:999px;
      background:#fff;
      border:1px solid #f0bfd4;
      color:#d27ca8;
      text-decoration:none;
      font-size:12px;
      font-weight:900;
      box-shadow:0 4px 10px rgba(255,95,165,0.08);
      transition:.18s ease;
    }

    .lang-switch a:hover,
    .lang-switch a.active{
      background:#fff0f7;
      color:#ff59a5;
    }

    .wrap{
      width:min(1260px, calc(100% - 32px));
      margin:0 auto;
    }

    .header-box{
      display:flex;
      align-items:center;
      gap:24px;
    }

    nav{
      display:grid;
      grid-template-columns:repeat(8, minmax(0, 1fr));
      gap:18px;
      text-align:center;
      align-items:center;
      flex:1;
      margin:0 20px;
    }

    nav a{
      position:relative;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
      text-decoration:none;
      border-radius:22px;
      padding:10px 8px;
    }

    nav a b,
    nav a span{
      display:block;
      width:100%;
      text-align:center;
      white-space:nowrap;
    }

    nav a b{
      font-size:1.2em;
      font-weight:700;
      color:#d97ca9;
    }

    nav a span{
      margin-top:6px;
      font-size:.94em;
      color:#c697b1;
      font-weight:600;
    }

    nav a.current::before,
    nav a:hover::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:22px;
      background:linear-gradient(90deg,
        rgba(255,217,232,0.00) 0%,
        rgba(255,217,232,0.14) 16%,
        rgba(255,192,215,0.16) 36%,
        rgba(255,192,215,0.20) 50%,
        rgba(255,192,215,0.16) 64%,
        rgba(255,217,232,0.14) 84%,
        rgba(255,217,232,0.00) 100%);
      z-index:-1;
    }

    nav a.current b,
    nav a:hover b{ color:#ff59a5; }
    nav a.current span,
    nav a:hover span{ color:#d88dad; }

    .page{
      padding:26px 0 80px;
    }

    .page-title{
      text-align:center;
      margin:8px 0 34px;
    }

    .page-title h1{
      margin:0;
      color:#ff5aa6;
      font-size:64px;
      line-height:1;
      font-weight:900;
      letter-spacing:-0.04em;
    }

    .page-title p{
      margin:10px 0 0;
      color:#c99ab2;
      font-size:18px;
      font-weight:700;
    }

    .goods-toolbar{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:28px;
    }

    .toolbar-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      font-size:14px;
      font-weight:800;
      border:1px solid #f0bfd4;
      background:#fff;
      color:#d27ca8;
      box-shadow:0 6px 14px rgba(255,95,165,0.08);
      transition:.18s ease;
    }

    .toolbar-btn:hover{
      background:#fff0f7;
      transform:translateY(-1px);
    }

    .toolbar-btn.primary{
      background:linear-gradient(180deg, #ff7eb3 0%, #ff5fa5 100%);
      color:#fff;
      border-color:transparent;
      box-shadow:0 10px 20px rgba(255,95,165,0.22);
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:24px;
      margin-top:6px;
    }

    .goods-card{
      background:#fff5fb;
      border:1px solid #f2d8e7;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(232,191,211,0.12);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .goods-card:hover{
      transform:translateY(-4px);
      box-shadow:0 14px 30px rgba(232,191,211,0.18);
    }

    .goods-image{
      width:100%;
      aspect-ratio:1 / 1;
      background:linear-gradient(180deg,#fff 0%, #fff7fb 100%);
      border-bottom:1px solid #f2d8e7;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }

    .goods-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .goods-image.placeholder::before{
      content:"LUMIBELLE";
      color:#e0b3ca;
      font-size:14px;
      font-weight:800;
      letter-spacing:0.18em;
    }

    .goods-info{
      padding:20px 18px 18px;
      text-align:center;
    }

    .goods-name{
      margin:0 0 8px;
      color:#d77ca7;
      font-size:28px;
      line-height:1;
      font-weight:900;
    }

    .goods-sub{
      margin:0 0 14px;
      color:#c99ab2;
      font-size:15px;
      font-weight:700;
    }

    .goods-item-name{
      margin:0 0 6px;
      color:#de78a9;
      font-size:18px;
      font-weight:900;
    }

    .goods-price{
      margin:0 0 14px;
      color:#8f7183;
      font-size:15px;
      font-weight:700;
    }

    .goods-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:106px;
      padding:11px 18px;
      border-radius:999px;
      text-decoration:none;
      font-size:14px;
      font-weight:900;
      background:linear-gradient(180deg,#ff7eb3,#ff5fa5);
      color:#fff;
      box-shadow:0 8px 18px rgba(255,95,165,.2);
    }

    .goods-btn.disabled{
      background:#f0d7e3;
      color:#9e7e90;
      box-shadow:none;
      cursor:default;
      pointer-events:none;
    }

    .empty-note{
      text-align:center;
      margin-top:52px;
      color:#c2a2b3;
      font-size:18px;
      font-weight:700;
    }

    footer{
      text-align:center;
      padding:28px 16px 40px;
      color:#c6a2b4;
      font-size:14px;
    }

    @media (max-width: 1180px){
      nav{
        grid-template-columns:repeat(4,1fr);
        gap:16px;
      }
      .goods-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 780px){
      .top-lang-bar{
        justify-content:center;
        margin-top:14px;
        padding:0 12px;
      }

      .header-box{
        flex-wrap:wrap;
        justify-content:center;
      }

      nav{
        grid-template-columns:repeat(2,1fr);
        gap:12px;
        width:100%;
        margin:0;
      }

      .page-title h1{
        font-size:48px;
      }

      .page-title p{
        font-size:16px;
      }

      .goods-grid{
        grid-template-columns:1fr;
        gap:18px;
      }

      .goods-name{
        font-size:22px;
      }
    }
  </style>
</head>
<body>
  <div class="top-lang-bar">
    <div class="lang-switch">
      <a href="../index.html" class="active">KR</a>
      <a href="../en/index.html">EN</a>
      <a href="../jp/index.html">JP</a>
      <a href="../cn/index.html">CN</a>
    </div>
  </div>

  <header>
    <div class="wrap header-box">
      <div class="logo">
        <a href="../index.html">
          <picture>
            <source srcset="../img/ui/logo.webp?v=3" type="image/webp">
            <img src="../img/ui/logo.png?v=3" alt="Lumibelle 로고" loading="eager" decoding="async">
          </picture>
        </a>
      </div>

      <nav>
        <a href="../index.html"><b>HOME</b><span>홈</span></a>
        <a href="../news.html"><b>NEWS</b><span>공지사항</span></a>
        <a href="../member.html"><b>MEMBER</b><span>멤버 소개</span></a>
        <a href="../schedule.html"><b>SCHEDULE</b><span>스케줄</span></a>
        <a href="../ticket/current.html"><b>TICKET</b><span>예매</span></a>
        <a href="./" class="current"><b>GOODS</b><span>굿즈</span></a>
        <a href="../setlist.html"><b>SETLIST</b><span>응원 가이드</span></a>
        <a href="../info.html"><b>INFO</b><span>안내</span></a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="wrap">
      <section class="page-title">
        <h1>GOODS</h1>
        <p>굿즈</p>
      </section>

      <div class="goods-toolbar">
        <a href="./" class="toolbar-btn primary">현재 굿즈</a>
        <a href="./archive/" class="toolbar-btn">지난 굿즈</a>
      </div>

      <section class="goods-grid">
        <article class="goods-card">
          <div class="goods-image placeholder">
            <!-- 실제 이미지 넣을 때:
            <img src="../img/goods/lumibelle-debut-tshirt.webp" alt="루미벨 데뷔 티셔츠">
            -->
          </div>
          <div class="goods-info">
            <h2 class="goods-item-name">루미벨 데뷔 티셔츠</h2>
            <p class="goods-price">₩30,000</p>
            <span class="goods-btn disabled">준비 중</span>
          </div>
        </article>

        <article class="goods-card">
          <div class="goods-image placeholder">
            <!-- 실제 이미지 넣을 때:
            <img src="../img/goods/acrylic-stand.webp" alt="아크릴 스탠드">
            -->
          </div>
          <div class="goods-info">
            <h2 class="goods-item-name">아크릴 스탠드</h2>
            <p class="goods-price">₩12,000</p>
            <span class="goods-btn disabled">준비 중</span>
          </div>
        </article>

        <article class="goods-card">
          <div class="goods-image placeholder">
            <!-- 실제 이미지 넣을 때:
            <img src="../img/goods/photocard-set.webp" alt="포토카드 세트">
            -->
          </div>
          <div class="goods-info">
            <h2 class="goods-item-name">포토카드 세트</h2>
            <p class="goods-price">₩8,000</p>
            <span class="goods-btn disabled">준비 중</span>
          </div>
        </article>
      </section>

      <div class="empty-note">새로운 굿즈가 준비 중입니다 ✦</div>
    </div>
  </main>

  <footer>© 2026 Lumibelle All Rights Reserved.</footer>
</body>
</html>
