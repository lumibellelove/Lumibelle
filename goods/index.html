<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOODS | Lumibelle</title>
  <link rel="stylesheet" href="../style.css" />

  <style>
    body{
      margin:0;
      background:#fff8fb;
      font-family:"SUIT","Noto Sans KR",sans-serif;
      color:#7f6a77;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:40px 20px;
    }

    .title{
      text-align:center;
      margin-bottom:40px;
    }

    .title h1{
      margin:0;
      font-size:56px;
      font-weight:900;
      color:#ff5aa6;
    }

    .title p{
      margin-top:10px;
      color:#c99ab2;
      font-weight:600;
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    .goods-card{
      background:#fff5fb;
      border:1px solid #f2d8e7;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(232,191,211,0.12);
      transition:0.2s;
    }

    .goods-card:hover{
      transform:translateY(-4px);
    }

    .goods-image{
      width:100%;
      height:260px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .goods-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .goods-info{
      padding:18px;
      text-align:center;
    }

    .goods-name{
      font-weight:900;
      font-size:18px;
      margin-bottom:6px;
      color:#d77ca7;
    }

    .goods-price{
      color:#8f7183;
      font-size:14px;
      margin-bottom:12px;
    }

    .goods-btn{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      background:linear-gradient(180deg,#ff7eb3,#ff5fa5);
      color:#fff;
      text-decoration:none;
      font-weight:800;
      font-size:14px;
    }

    .empty{
      text-align:center;
      margin-top:60px;
      color:#bfa2b2;
    }

    @media(max-width:900px){
      .goods-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="title">
      <h1>GOODS</h1>
      <p>굿즈</p>
    </div>

    <!-- 🔥 굿즈 리스트 -->
    <div class="goods-grid">

      <!-- 예시 카드 -->
      <div class="goods-card">
        <div class="goods-image">
          <img src="../img/goods/sample1.webp" alt="굿즈">
        </div>
        <div class="goods-info">
          <div class="goods-name">루미벨 데뷔 티셔츠</div>
          <div class="goods-price">₩30,000</div>
          <a href="#" class="goods-btn">구매하기</a>
        </div>
      </div>

      <div class="goods-card">
        <div class="goods-image">
          <img src="../img/goods/sample2.webp" alt="굿즈">
        </div>
        <div class="goods-info">
          <div class="goods-name">아크릴 스탠드</div>
          <div class="goods-price">₩12,000</div>
          <a href="#" class="goods-btn">구매하기</a>
        </div>
      </div>

      <div class="goods-card">
        <div class="goods-image">
          <img src="../img/goods/sample3.webp" alt="굿즈">
        </div>
        <div class="goods-info">
          <div class="goods-name">포토카드 세트</div>
          <div class="goods-price">₩8,000</div>
          <a href="#" class="goods-btn">구매하기</a>
        </div>
      </div>

    </div>

    <!-- 🔥 비어있을 때 -->
    <div class="empty">
      새로운 굿즈가 준비 중입니다 ✦
    </div>

  </div>

</body>
</html>
