<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GOODS | Lumibelle</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    body{
      margin:0;
      background:#fff8fb;
      font-family:"SUIT","Noto Sans KR",sans-serif;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:40px 20px;
    }

    .title{
      text-align:center;
      margin-bottom:40px;
    }

    .title h1{
      font-size:56px;
      color:#ff5aa6;
      margin:0;
    }

    .goods-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    .goods-card{
      background:#fff5fb;
      border-radius:24px;
      overflow:hidden;
      border:1px solid #f2d8e7;
      transition:.2s;
    }

    .goods-card:hover{
      transform:translateY(-5px);
    }

    .goods-image{
      height:240px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .goods-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .goods-info{
      padding:18px;
      text-align:center;
    }

    .goods-name{
      font-weight:900;
      color:#d77ca7;
    }

    .goods-price{
      margin:8px 0;
      color:#8f7183;
    }

    .goods-btn{
      display:inline-block;
      padding:10px 16px;
      border-radius:999px;
      background:#ff5aa6;
      color:#fff;
      text-decoration:none;
      font-weight:800;
    }

    .goods-btn:hover{
      transform:translateY(-2px);
    }

    nav{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:30px;
    }

    nav a{
      text-decoration:none;
      color:#d77ca7;
      font-weight:800;
    }

  </style>
</head>

<body>

  <!-- 🔥 상단 메뉴 (경로 수정 완료) -->
  <nav>
    <a href="../index.html">HOME</a>
    <a href="../news.html">NEWS</a>
    <a href="../member.html">MEMBER</a>
    <a href="../schedule.html">SCHEDULE</a>
    <a href="../ticket/current.html">TICKET</a>
    <a href="../goods/index.html">GOODS</a>
    <a href="../setlist.html">SETLIST</a>
    <a href="../info.html">INFO</a>
  </nav>

  <div class="wrap">

    <div class="title">
      <h1>GOODS</h1>
    </div>

    <div class="goods-grid">

      <!-- 🔥 굿즈 1 -->
      <div class="goods-card">
        <div class="goods-image">
          <img src="../img/goods/tshirt.webp">
        </div>
        <div class="goods-info">
          <div class="goods-name">루미벨 데뷔 티셔츠</div>
          <div class="goods-price">₩30,000</div>
          <a href="cart.html?item=tshirt" class="goods-btn">구매하기</a>
        </div>
      </div>

      <!-- 🔥 굿즈 2 -->
      <div class="goods-card">
        <div class="goods-image">
          <img src="../img/goods/acrylic.webp">
        </div>
        <div class="goods-info">
          <div class="goods-name">아크릴 스탠드</div>
          <div class="goods-price">₩12,000</div>
          <a href="cart.html?item=acrylic" class="goods-btn">구매하기</a>
        </div>
      </div>

      <!-- 🔥 굿즈 3 -->
      <div class="goods-card">
        <div class="goods-image">
          <img src="../img/goods/photocard.webp">
        </div>
        <div class="goods-info">
          <div class="goods-name">포토카드 세트</div>
          <div class="goods-price">₩8,000</div>
          <a href="cart.html?item=photocard" class="goods-btn">구매하기</a>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
