<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORDER COMPLETE | Lumibelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fffafc;--panel:#fff5fb;--line:#f2d8e7;--pink:#ff5aa6;--text:#7f6a77;--shadow:0 8px 24px rgba(232,191,211,0.12)}
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--text); font-family:"SUIT","Noto Sans KR",sans-serif}
    .box{width:min(760px, calc(100% - 32px)); background:var(--panel); border:1px solid var(--line); border-radius:32px; box-shadow:var(--shadow); padding:38px 30px; text-align:center}
    .kicker{color:var(--pink); font-weight:800; margin-bottom:8px}
    h1{margin:0; font-family:"Cormorant Garamond",serif; font-size:64px; line-height:.94; color:var(--pink); font-weight:600}
    p{line-height:1.9; color:#8f7183}
    .summary{margin:24px auto 0; max-width:520px; text-align:left; background:#fff; border:1px solid var(--line); border-radius:22px; padding:18px}
    .summary strong{color:#d77ca7}
    .actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:24px}
    .btn{display:inline-flex; align-items:center; justify-content:center; min-width:180px; padding:14px 20px; border-radius:999px; text-decoration:none; font-weight:800}
    .btn.primary{background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%); color:#fff; box-shadow:0 8px 18px rgba(255,95,165,.25)}
    .btn.secondary{background:#fff; color:#d27ca8; border:1px solid #f0bfd4}
    @media (max-width:780px){h1{font-size:48px}}
  </style>
</head>
<body>
  <div class="box">
    <div class="kicker">THANK YOU</div>
    <h1>Order Complete</h1>
    <p>구매해주셔서 감사합니다 ✦<br>주문 내용 확인 후 입금이 완료되면 순서대로 접수될 예정입니다.</p>

    <div class="summary" id="summaryBox"></div>

    <div class="actions">
      <a href="goods_index.html" class="btn secondary">굿즈 페이지로</a>
      <a href="../index.html" class="btn primary">메인으로 돌아가기</a>
    </div>
  </div>

  <script>
    const ORDER_KEY = 'lumibelle_goods_last_order';
    const CART_KEY = 'lumibelle_goods_cart';
    function money(v){ return `₩ ${v.toLocaleString('ko-KR')}`; }
    let order;
    try { order = JSON.parse(localStorage.getItem(ORDER_KEY)) || null; } catch(e){ order = null; }
    const box = document.getElementById('summaryBox');
    if (!order){
      box.innerHTML = '<strong>안내</strong><br>주문 요약 정보가 아직 없어요. 바로 위 버튼으로 이동해 다시 진행해 주세요.';
    } else {
      box.innerHTML = `
        <strong>주문자</strong> ${order.buyerName}<br>
        <strong>연락처</strong> ${order.contact}<br>
        <strong>입금자명</strong> ${order.depositor}<br>
        <strong>총 금액</strong> ${money(order.total)}<br><br>
        <strong>주문 상품</strong><br>
        ${order.cart.map(item => `${item.name} × ${item.quantity}`).join('<br>')}
      `;
      localStorage.removeItem(CART_KEY);
    }
  </script>
</body>
</html>
