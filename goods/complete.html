<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORDER COMPLETE | Lumibelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fffafc;
      --panel:#fff5fb;
      --line:#f2d8e7;
      --pink:#ff5aa6;
      --text:#7f6a77;
      --shadow:0 8px 24px rgba(232,191,211,0.12);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:"SUIT","Noto Sans KR",sans-serif;
    }
    .wrap{
      width:min(920px, calc(100% - 32px));
      margin:0 auto;
      padding:42px 0 60px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:38px 28px 30px;
      text-align:center;
    }
    .icon{
      width:86px;
      height:86px;
      margin:0 auto 18px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%);
      box-shadow:0 10px 24px rgba(255,95,165,.20);
    }
    .sub{
      color:#d77ca7;
      font-weight:800;
      font-size:18px;
      margin-bottom:8px;
    }
    h1{
      margin:0;
      font-family:"Cormorant Garamond", serif;
      color:var(--pink);
      font-size:72px;
      line-height:.95;
      font-weight:600;
    }
    .desc{
      margin:18px auto 0;
      max-width:620px;
      line-height:1.9;
      font-size:15px;
      color:#8f7183;
      font-weight:700;
    }
    .summary{
      margin-top:24px;
      text-align:left;
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px 18px;
    }
    .summary h2{
      margin:0 0 14px;
      color:#d77ca7;
      font-size:24px;
      font-weight:900;
    }
    .row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
      font-size:15px;
    }
    .row:last-child{border-bottom:none}
    .row.total{
      font-size:20px;
      font-weight:900;
      color:#7e6b78;
    }
    .goods-list{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .goods-item{
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(180deg,#fff9fc 0%, #fff4fa 100%);
      font-size:14px;
      line-height:1.7;
    }
    .notice{
      margin-top:20px;
      padding:16px 18px;
      border-radius:20px;
      background:#fff;
      border:1px solid var(--line);
      line-height:1.8;
      font-size:14px;
      text-align:left;
    }
    .actions{
      margin-top:24px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:14px 22px;
      border-radius:999px;
      text-decoration:none;
      font-size:15px;
      font-weight:800;
      transition:transform .15s ease;
    }
    .btn:hover{ transform:translateY(-2px); }
    .btn.primary{
      background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%);
      color:#fff;
      box-shadow:0 8px 18px rgba(255,95,165,.24);
    }
    .btn.sub{
      background:#fff;
      color:#d77ca7;
      border:1px solid #f0bfd4;
      box-shadow:0 4px 10px rgba(255,95,165,0.08);
    }
    .empty{
      color:#b28ea2;
      font-size:14px;
      line-height:1.8;
    }
    @media (max-width:700px){
      .wrap{padding:28px 0 40px}
      .card{padding:30px 18px 22px}
      h1{font-size:56px}
      .summary{text-align:left}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="icon">✓</div>
      <div class="sub">주문 접수가 완료되었어요</div>
      <h1>Complete</h1>
      <p class="desc">
        루미벨 굿즈 주문이 정상적으로 접수되었어요.<br>
        아래 내용을 확인한 뒤 안내된 계좌로 입금해 주세요 ✦
      </p>

      <div class="summary">
        <h2>주문 요약</h2>
        <div class="goods-list" id="goodsList">
          <div class="empty">주문 상품 정보를 불러오는 중이에요.</div>
        </div>

        <div class="row" style="margin-top:14px;">
          <span>상품 금액</span>
          <span id="productTotal">₩ 0</span>
        </div>
        <div class="row">
          <span>배송비</span>
          <span id="shippingFee">₩ 0</span>
        </div>
        <div class="row total">
          <span>총 금액</span>
          <span id="grandTotal">₩ 0</span>
        </div>
      </div>

      <div class="notice">
        <strong style="color:#ff5aa6;">입금 안내</strong><br>
        국민은행 000000-00-000000 / 예금주 : 루미벨<br><br>
        주문서 접수 후 위 계좌로 입금해 주세요.<br>
        입금자명은 주문서에 작성한 입금자명과 동일하게 맞춰주시면 확인이 빨라져요.
      </div>

      <div class="actions">
        <a href="index.html" class="btn primary">굿즈 페이지로 돌아가기</a>
        <a href="../index.html" class="btn sub">루미벨 홈으로 가기</a>
      </div>
    </section>
  </div>

  <script>
    const ORDER_KEY = 'lumibelle_goods_last_order';

    function money(v){
      return `₩ ${Number(v || 0).toLocaleString('ko-KR')}`;
    }

    function renderComplete(){
      let orderData = null;
      try{
        orderData = JSON.parse(localStorage.getItem(ORDER_KEY));
      }catch(e){
        orderData = null;
      }

      const goodsList = document.getElementById('goodsList');

      if(!orderData || !Array.isArray(orderData.cart) || !orderData.cart.length){
        goodsList.innerHTML = '<div class="empty">최근 주문 정보를 찾지 못했어요. 그래도 구글폼 접수가 되었다면 정상 접수일 수 있어요.</div>';
        return;
      }

      goodsList.innerHTML = orderData.cart.map(item => `
        <div class="goods-item">
          <strong>${item.name}</strong><br>
          ${money(item.price)} × ${item.quantity} = ${money(item.price * item.quantity)}
        </div>
      `).join('');

      document.getElementById('productTotal').textContent = money(orderData.productTotal);
      document.getElementById('shippingFee').textContent = money(orderData.shippingFee);
      document.getElementById('grandTotal').textContent = money(orderData.total);
    }

    renderComplete();
  </script>
</body>
</html>
