<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDER COMPLETE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff9fc;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#7a5c6f;
}

.box{
  background:#fff;
  padding:40px;
  border-radius:24px;
  border:1px solid #f2d8e7;
  text-align:center;
  width:90%;
  max-width:400px;
}

h1{
  color:#ff5fa5;
  margin-bottom:10px;
}

.order-id{
  margin:15px 0;
  padding:10px;
  border-radius:999px;
  background:#fff0f7;
  display:inline-block;
  font-weight:bold;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#ff5fa5;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h1>주문 완료 ✦</h1>
  <p>주문이 정상적으로 접수되었습니다.</p>

  <div class="order-id" id="orderId">주문번호: -</div>

  <p>입금 확인 후 안내가 발송됩니다.</p>

  <button onclick="location.href='index.html'">홈으로 돌아가기</button>
</div>

<script>
const orderId = "LB-" + new Date().getFullYear().toString().slice(-2) + "-" + Math.floor(100000 + Math.random()*900000);
document.getElementById("orderId").innerText = "주문번호: " + orderId;
</script>

</body>
</html>
