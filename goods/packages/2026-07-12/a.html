<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A 패키지</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff9fc;
}

.layout{
  display:grid;
  grid-template-columns:1.02fr 1fr;
  gap:22px;
  align-items:start; /* ⭐ 핵심 */
}

.left-panel,.right-panel{
  background:#fff;
  border-radius:20px;
  padding:20px;
  border:1px solid #f2d8e7;
}

.left-panel{
  align-self:start; /* ⭐ 핵심 */
}

.poster{
  height:300px;
  background:#ffeef7;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:16px;
}

.section{
  margin-bottom:16px;
}

.goods{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  padding:10px;
  border:1px solid #f0cde0;
  border-radius:12px;
  background:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#ff5fa5;
  color:white;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="layout">

<!-- 왼쪽 -->
<div class="left-panel">

  <div class="poster">패키지 이미지 넣기</div>

  <h2>루미벨 데뷔 공연 한정 A 패키지</h2>

  <div class="section">
    <strong>공연 정보</strong><br>
    2026.07.12 / 홍대 상상마당
  </div>

</div>

<!-- 오른쪽 -->
<div class="right-panel">

  <!-- ⭐ 순서 핵심 -->
  <div class="section">
    <h3>패키지 상세 구성</h3>

    <div class="goods">
      <div class="item">입장권</div>
      <div class="item">패스트 패스권</div>
      <div class="item">아크릴 키링</div>
      <div class="item">핀버튼</div>
      <div class="item">포토카드</div>
      <div class="item">티셔츠</div>
      <div class="item">포스터</div>
      <div class="item">특전권</div>
    </div>
  </div>

  <div class="section">
    <h2>루미벨 데뷔 공연 한정 A 패키지 예약</h2>
    <h4>예약 정보 입력</h4>

    <input placeholder="이름"><br><br>
    <input placeholder="숫자 4자리"><br><br>
    <input placeholder="이메일"><br><br>

    <select>
      <option>티셔츠 색상</option>
      <option>화이트</option>
      <option>핑크</option>
      <option>블랙</option>
    </select><br><br>

    <select>
      <option>티셔츠 사이즈</option>
      <option>S</option>
      <option>M</option>
      <option>L</option>
    </select><br><br>

    <input placeholder="입금자명"><br><br>

    <button>제출하기</button>
  </div>

</div>

</div>

</body>
</html>
