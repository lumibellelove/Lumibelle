<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MORE VIDEO | Lumibelle</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fffafc;
    }

    main.page-shell {
      flex: 1;
    }

    .video-page-shell {
      padding-top: 18px;
      padding-bottom: 46px;
    }

    .video-hero {
      background: linear-gradient(180deg, #fff1f8 0%, #fff8fc 100%);
      border: 1px solid #f2d8e7;
      border-radius: 32px;
      padding: 42px 28px 34px;
      box-shadow: 0 8px 24px rgba(232, 191, 211, 0.12);
      text-align: center;
    }

    .video-hero h2 {
      margin: 0;
      color: #d77ca7;
      font-size: 58px;
      line-height: 1;
      font-weight: 900;
    }

    .video-hero p {
      margin: 12px 0 0;
      color: #c99ab2;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.7;
    }

    .video-toolbar-wrap {
      position: sticky;
      top: 14px;
      z-index: 60;
      margin-top: 22px;
    }

    .video-toolbar {
      background: rgba(255, 245, 251, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid #f2d8e7;
      border-radius: 28px;
      box-shadow: 0 10px 24px rgba(232, 191, 211, 0.16);
      padding: 18px;
    }

    .video-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .video-filter-row:last-child {
      margin-bottom: 0;
    }

    .filter-chip {
      border: 1px solid #f0d5e4;
      background: #fff;
      color: #b57e9d;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .filter-chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(232, 191, 211, 0.14);
    }

    .filter-chip.active {
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(232, 191, 211, 0.18);
    }

    .chip-all.active {
      background: linear-gradient(180deg, #ff7eb3 0%, #ff5fa5 100%);
    }

    .chip-mariring.active {
      background: #ff59a5;
    }

    .chip-lulu.active {
      background: linear-gradient(180deg, #FFB8D3 0%, #FFD9E8 100%);
      color: #9b5a77;
    }

    .chip-iro.active {
      background: #B2DEFF;
      color: #5d7f9a;
    }

    .chip-lunar.active {
      background: #ba8ce7;
    }

    .chip-hotclip.active {
      background: linear-gradient(180deg, #ff8fc1 0%, #ff6cab 100%);
    }

    .control-row {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 1fr;
      gap: 12px;
      align-items: center;
    }

    .search-box,
    .sort-select,
    .event-select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #efd4e2;
      background: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      color: #8d7082;
      outline: none;
    }

    .search-box:focus,
    .sort-select:focus,
    .event-select:focus {
      border-color: #e6aeca;
      box-shadow: 0 0 0 4px rgba(255, 171, 211, 0.16);
    }

    .video-list-wrap {
      margin-top: 24px;
      background: #fff5fb;
      border: 1px solid #f2d8e7;
      border-radius: 28px;
      box-shadow: 0 8px 24px rgba(232, 191, 211, 0.12);
      padding: 22px;
    }

    .video-list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .video-list-head h3 {
      margin: 0;
      color: #d77ca7;
      font-size: 30px;
      font-weight: 900;
    }

    .video-count {
      color: #b688a2;
      font-size: 14px;
      font-weight: 800;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .video-card-item {
      background: #fff;
      border: 1px solid #f0dde8;
      border-radius: 22px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
    }

    .video-card-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(232, 191, 211, 0.18);
    }

    .video-card-item.featured-card {
      border: 2px solid #ff90be;
      box-shadow: 0 12px 26px rgba(255, 95, 165, 0.16);
    }

    .video-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: linear-gradient(180deg, #ffe3ef 0%, #ffd2e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .video-card-item:hover .video-thumb img {
      transform: scale(1.05);
    }

    .video-thumb::after {
      content: "▶";
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.94);
      color: #ef67a8;
      font-size: 32px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(239, 103, 168, 0.18);

      align-items: center;
      justify-content: center;
      padding: 7px 10px;

      font-weight: 900;

    .badge-featured {

      background: rgba(255,255,255,0.96);
      color: #ef67a8;
    }

    .badge-new {
      right: 12px;
      background: #ff4fa3;
      color: #fff;
    }
.badge-trending {
  left: 12px;
  top: 46px;
  background: #ff8a3d;
  color: #fff;
}
    .video-card-body {

    .video-meta-top {

      margin-bottom: 10px;
      flex-wrap: wrap;

    .video-date {

      color: #c99ab2;
      font-weight: 800;
    }

    .video-tag {

      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      background: #fbe8f4;
      color: #c97ca8;
      border: 1px solid #efc6dc;

    .video-title {

      font-weight: 900;

    .video-subinfo {

      color: #ab869c;

      line-height: 1.6;
    }

    .empty-state {

      color: #c08aa8;
    }

    .empty-state.show {

    .empty-state h4 {

      font-size: 28px;
      color: #d77ca7;
      font-weight: 900;

    .empty-state p {

      font-weight: 700;
      line-height: 1.8;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .page-btn {
      min-width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 1px solid #efd4e2;
      background: #fff;
      color: #bf88a6;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .page-btn:hover {

    }

    .page-btn.active {
      background: linear-gradient(180deg, #ff7eb3 0%, #ff5fa5 100%);
      color: #fff;
      border-color: transparent;
    }

    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(40, 22, 34, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
    }

    .video-modal.show {
      display: flex;
    }

    .video-modal-panel {
      width: min(920px, 100%);
      background: #fffafc;
      border: 1px solid #f2d8e7;
      border-radius: 28px;
      box-shadow: 0 18px 42px rgba(36, 16, 29, 0.24);
      overflow: hidden;
    }

    .video-player-wrap {
      background: #111;
      aspect-ratio: 16 / 9;
    }

    .video-player-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .video-modal-body {
      padding: 22px 22px 24px;
    }

    .video-modal-title {
      margin: 0 0 8px;
      color: #d77ca7;
      font-size: 26px;
      font-weight: 900;
      line-height: 1.4;
    }

    .video-modal-meta {
      color: #ae88a0;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      line-height: 1.7;
    }

    .video-modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .modal-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 14px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.15s ease;
    }

    .modal-btn:hover {
      transform: translateY(-1px);
    }

    .modal-btn-primary {
      background: linear-gradient(180deg, #ff7eb3 0%, #ff5fa5 100%);
      color: #fff;
    }

    .modal-btn-secondary {
      background: #fff;
      color: #c97ca8;
      border-color: #efc6dc;
    }

    .scroll-top-btn {
      position: fixed;
      right: 22px;
      bottom: 24px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(180deg, #ff7eb3 0%, #ff5fa5 100%);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(255, 95, 165, 0.26);
      cursor: pointer;
      display: none;
      z-index: 200;
    }

    .scroll-top-btn.show {
      display: block;
    }

    footer {
      text-align: center;
      padding: 28px 16px 40px;
      color: #c6a2b4;
      font-size: 14px;
    }

    @media (max-width: 1100px) {
      .video-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .control-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 780px) {
      .video-hero {
        padding: 34px 18px 28px;
      }

      .video-hero h2 {
        font-size: 42px;
      }

      .video-toolbar {
        padding: 14px;
        border-radius: 24px;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }

      .video-list-wrap {
        padding: 16px;
      }

      .video-list-head h3 {
        font-size: 24px;
      }

      .video-title {
        font-size: 16px;
      }

      .video-modal {
        padding: 14px;
      }

      .video-modal-title {
        font-size: 22px;
      }

      .modal-btn {
        width: 100%;
      }

      .scroll-top-btn {
        width: 52px;
        height: 52px;
        right: 16px;
        bottom: 18px;
      }
    }
  </style>
</head>

    const ITEMS_PER_PAGE = 6;

    let currentMember = "ALL";

    function buildYoutubeUrl(youtubeId) {
      return `https://www.youtube.com/watch?v=${youtubeId}`;
    }

    function buildEmbedUrl(youtubeId) {
      return `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
    }

    function buildThumbUrl(youtubeId) {
      return `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}.${m}.${day}`;
    }

    function formatViews(views) {
      if (!views || views <= 0) return "비공개";
      if (views >= 10000) return `${(views / 10000).toFixed(1)}만회`;
      return `${views.toLocaleString()}회`;
    }
function isRecent(dateStr) {
  const now = new Date();
  const upload = new Date(dateStr);
  const diff = (now - upload) / (1000 * 60 * 60 * 24);
  return diff <= 7;
}
    function getSectionTitle() {
      if (currentMember === "ALL") return "ALL VIDEO";
      return `${currentMember} VIDEO`;
    }

    function applyFilters() {
      let filtered = [...videoData];

      if (currentMember !== "ALL") {
        filtered = filtered.filter(item => item.member === currentMember);
      }

      if (currentEvent !== "ALL") {
        filtered = filtered.filter(item => item.event === currentEvent);
      }

      if (currentSearch.trim()) {
        const keyword = currentSearch.trim().toLowerCase();
        filtered = filtered.filter(item =>
          item.title.toLowerCase().includes(keyword) ||
          item.tag.toLowerCase().includes(keyword) ||
          item.desc.toLowerCase().includes(keyword) ||
          item.event.toLowerCase().includes(keyword) ||
          item.member.toLowerCase().includes(keyword)
        );
      }

      filtered.sort((a, b) => {
        if (a.featured !== b.featured) {
          return a.featured ? -1 : 1;
        }

        if (currentSort === "latest") {
          return new Date(b.date) - new Date(a.date);
        }

        if (currentSort === "popular") {
  if ((a.featured || false) !== (b.featured || false)) {
    return (b.featured || false) - (a.featured || false);
  }

  if ((a.isTrending || false) !== (b.isTrending || false)) {
    return (b.isTrending || false) - (a.isTrending || false);
  }

  return new Date(b.date) - new Date(a.date);
}

        return 0;
      });

      return filtered;
    }

    function createCard(item) {
      const article = document.createElement("article");
      article.className = "video-card-item" + (item.featured ? " featured-card" : "");

      const thumbUrl = item.thumb ? item.thumb : buildThumbUrl(item.youtubeId);
      const fallbackThumb = buildThumbUrl(item.youtubeId);

      article.innerHTML = `
        <div class="video-thumb">
          <img src="${thumbUrl}" alt="${item.title}" onerror="this.onerror=null;this.src='${fallbackThumb}'">
          ${item.featured ? `<span class="video-badge badge-featured">PICK</span>` : ""}
${isRecent(item.date) ? `<span class="video-badge badge-new">NEW</span>` : ""}
${item.isTrending ? `<span class="video-badge badge-trending">TRENDING</span>` : ""}
        </div>
        <div class="video-card-body">
          <div class="video-meta-top">
            <div class="video-date">${formatDate(item.date)}</div>
            <div class="video-tag">${item.tag}</div>
          </div>
          <div class="video-title">${item.title}</div>
          <div class="video-subinfo">${item.member} · ${item.event}</div>
          <div class="video-subinfo">조회수 ${formatViews(item.views)}</div>
        </div>
      `;

      article.addEventListener("click", () => openModal(item));
      return article;
    }

    function renderPagination(totalItems) {
      pagination.innerHTML = "";

      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.className = "page-btn" + (i === currentPage ? " active" : "");
        btn.textContent = i;
        btn.type = "button";

        btn.addEventListener("click", () => {
          currentPage = i;
          renderVideos();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        pagination.appendChild(btn);
      }
    }

    function renderVideos() {
      const filtered = applyFilters();
      const totalItems = filtered.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / ITEMS_PER_PAGE));

      if (currentPage > totalPages) currentPage = 1;

      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const visibleItems = filtered.slice(startIndex, startIndex + ITEMS_PER_PAGE);

      videoGrid.innerHTML = "";
      videoSectionTitle.textContent = getSectionTitle();
      videoCountText.textContent = `총 ${totalItems}개`;

      if (visibleItems.length === 0) {
        emptyState.classList.add("show");
      } else {
        emptyState.classList.remove("show");
        visibleItems.forEach(item => {
          videoGrid.appendChild(createCard(item));
        });
      }

      renderPagination(totalItems);
    }

    function openModal(item) {
      const youtubeUrl = buildYoutubeUrl(item.youtubeId);
      let embedUrl = buildEmbedUrl(item.youtubeId);

      if (item.start) {
        embedUrl += `&start=${item.start}`;
      }

      modalTitle.textContent = item.title;
      modalMeta.textContent = `${formatDate(item.date)} · ${item.tag} · ${item.member} · 조회수 ${formatViews(item.views)}`;
      youtubeLink.href = youtubeUrl;

      videoPlayerWrap.innerHTML = `
        <iframe
          src="${embedUrl}"
          title="${item.title}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      `;

      videoModal.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      videoModal.classList.remove("show");
      videoPlayerWrap.innerHTML = "";
      document.body.style.overflow = "";
    }

    memberButtons.forEach(button => {
      button.addEventListener("click", () => {
        memberButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        currentMember = button.dataset.member;
        currentPage = 1;
        renderVideos();
      });
    });

    searchInput.addEventListener("input", (e) => {
      currentSearch = e.target.value;
      currentPage = 1;
      renderVideos();
    });

    sortSelect.addEventListener("change", (e) => {
      currentSort = e.target.value;
      currentPage = 1;
      renderVideos();
    });

    eventSelect.addEventListener("change", (e) => {
      currentEvent = e.target.value;
      currentPage = 1;
      renderVideos();
    });

    closeModalBtn.addEventListener("click", closeModal);

    videoModal.addEventListener("click", (e) => {
      if (e.target === videoModal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && videoModal.classList.contains("show")) {
        closeModal();
      }
    });

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        scrollTopBtn.classList.add("show");
      } else {
        scrollTopBtn.classList.remove("show");
      }
    });

    scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    renderVideos();
  </script>
</body>
</html>
