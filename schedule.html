<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule | Lumibelle</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .calendar-day.has-event:hover {
      background: #ffeaf4;
      box-shadow: 0 6px 18px rgba(255, 120, 180, 0.25);
    }

    .badge-debut {
      box-shadow: 0 0 10px rgba(160, 120, 255, 0.4);
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="header-box">
        <div class="top-bow">🎀</div>
        <div class="logo">
          <h1>Lumibelle</h1>
          <p>ルミベル</p>
        </div>
        <nav>
          <a href="index.html">TOP</a>
          <a href="news.html">NEWS</a>
          <a href="member.html">MEMBER</a>
          <a href="schedule.html" class="current">SCHEDULE</a>
          <a href="fanname.html">FANNAME</a>
          <a href="info.html">INFO</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <div class="wrap">
      <div class="page-title">
        <h2>SCHEDULE</h2>
        <p>スケジュール</p>
      </div>

      <!-- 리스트 -->
      <div class="box schedule-list-page">
        <div class="row schedule-row">
          <div>07.12(土)</div>
          <div>상상마당@홍대</div>
          <div>루미벨 데뷔라이브</div>
          <a class="ticket" href="https://forms.gle/DrYqVV6GCUrzB4wm7" target="_blank">TICKET</a>
        </div>
      </div>

      <!-- 버튼 -->
      <div style="text-align:center; margin-top:20px;">
        <button id="toggleCalendar" style="padding:14px 30px; border-radius:999px; background:#f6d8e6; border:none; cursor:pointer;">
          MORE SCHEDULE
        </button>
      </div>

      <!-- 캘린더 -->
      <div id="calendarSection" style="display:none; margin-top:30px;">
        <div style="display:flex; justify-content:center; gap:10px; align-items:center;">
          <button id="prevMonth">‹</button>
          <h3 id="calendarMonth"></h3>
          <button id="nextMonth">›</button>
        </div>

        <div id="calendarGrid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-top:20px;"></div>

        <div id="scheduleDetail" style="margin-top:20px;"></div>
      </div>
    </div>
  </main>

  <footer>© 2026 Lumibelle All Rights Reserved.</footer>

<script>
const events = {
  "2026-07-12": [
    {
      type: "DEBUT",
      place: "상상마당@홍대",
      event: "루미벨 데뷔라이브",
      ticket: "https://forms.gle/DrYqVV6GCUrzB4wm7",
      detail: "news-debut.html",
      isNew: true
    }
  ]
};

const toggleBtn = document.getElementById("toggleCalendar");
const calendarSection = document.getElementById("calendarSection");
const calendarGrid = document.getElementById("calendarGrid");
const calendarMonth = document.getElementById("calendarMonth");
const scheduleDetail = document.getElementById("scheduleDetail");
const prevMonthBtn = document.getElementById("prevMonth");
const nextMonthBtn = document.getElementById("nextMonth");

let currentDate = new Date(2026, 3, 1);

toggleBtn.onclick = () => {
  calendarSection.style.display = calendarSection.style.display === "none" ? "block" : "none";
  renderCalendar();
};

prevMonthBtn.onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
};

nextMonthBtn.onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
};

function renderCalendar() {
  calendarGrid.innerHTML = "";
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  calendarMonth.textContent = year + "." + (month + 1);

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendarGrid.innerHTML += "<div></div>";
  }

  for (let day = 1; day <= lastDate; day++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const event = events[key]?.[0];

    let html = `<div style="border:1px solid #ddd; padding:10px; border-radius:10px;">${day}`;

    if (event) {
      html += `<br><small>${event.type}</small>`;
      if (event.isNew) html += `<span style="color:#ff4fa3;"> NEW</span>`;
    }

    html += "</div>";

    const el = document.createElement("div");
    el.innerHTML = html;

    el.onclick = () => {
      if (!event) {
        scheduleDetail.innerHTML = "일정 없음";
        return;
      }

      scheduleDetail.innerHTML = `
        <h3>${key}</h3>
        <p>${event.event}</p>
        <a href="${event.ticket}" target="_blank">TICKET</a>
        <a href="${event.detail}">DETAIL</a>
      `;
    };

    calendarGrid.appendChild(el);
  }
}
</script>

</body>
</html>
