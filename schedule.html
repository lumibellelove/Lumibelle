<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule | Lumibelle</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .schedule-extra-wrap{margin-top:22px;text-align:center;}
    .more-schedule-btn{appearance:none;border:0;background:#f6d8e6;color:#c46d98;padding:14px 30px;border-radius:999px;font-size:17px;font-weight:800;letter-spacing:.02em;cursor:pointer;transition:transform .18s ease,background .18s ease,box-shadow .18s ease;box-shadow:0 6px 18px rgba(228,163,193,.22);}
    .more-schedule-btn:hover{background:#f3cddd;transform:translateY(-1px);}
    .calendar-section{margin-top:24px;padding:28px;background:#fff5fb;border:1px solid #f2d8e7;border-radius:26px;box-shadow:0 8px 24px rgba(232,191,211,.12);}
    .calendar-section.hidden{display:none;}
    .calendar-header{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:22px;}
    .calendar-nav-btn{width:42px;height:42px;border-radius:50%;border:1px solid #ebc4d8;background:#fff;color:#cc7ca3;font-size:24px;line-height:1;cursor:pointer;transition:background .18s ease,transform .18s ease;}
    .calendar-nav-btn:hover{background:#fff0f7;transform:translateY(-1px);}
    .calendar-month{min-width:160px;margin:0;text-align:center;font-size:24px;font-weight:900;color:#d77ca7;letter-spacing:.03em;}
    .calendar-weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
    .calendar-weekdays{margin-bottom:10px;}
    .calendar-weekdays div{text-align:center;font-size:13px;font-weight:800;color:#c99ab2;padding:6px 0;}
    .calendar-day{position:relative;min-height:108px;border:1px solid #f1dfe9;border-radius:18px;background:#fff;padding:10px 10px 14px;cursor:pointer;transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;overflow:hidden;}
    .calendar-day:hover{background:#fff1f7;transform:translateY(-1px);}
    .calendar-day.has-event:hover{background:#ffeaf4;box-shadow:0 6px 18px rgba(255,120,180,.25);}
    .calendar-day.empty{background:transparent;border:none;cursor:default;pointer-events:none;}
    .calendar-day.selected{background:#ffeef6;border-color:#e7aac7;box-shadow:0 4px 14px rgba(228,163,193,.18);}
    .calendar-day.is-important{min-height:118px;border-width:1.5px;border-color:#e6aac7;box-shadow:0 6px 18px rgba(228,163,193,.16);background:linear-gradient(180deg,#fff7fb 0%,#fff 100%);}
    .calendar-day-number{font-size:16px;font-weight:800;color:#9f7d90;margin-bottom:8px;position:relative;z-index:2;}
    .calendar-day.has-event::after{content:"";position:absolute;left:10px;bottom:10px;width:8px;height:8px;border-radius:50%;background:#ef88b5;box-shadow:0 0 0 4px rgba(239,136,181,.12);}
    .calendar-preview{display:flex;flex-direction:column;gap:5px;position:relative;z-index:2;}
    .calendar-preview-top{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
    .calendar-badge{display:inline-flex;width:fit-content;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;letter-spacing:.01em;border:1px solid transparent;}
    .badge-live{background:#ffe7f1;color:#de77a7;border-color:#f3bfd5;}
    .badge-event{background:#eef7ff;color:#6f9bcf;border-color:#c9dff9;}
    .badge-debut{background:#f4ebff;color:#9f74d1;border-color:#dcc8fa;box-shadow:0 0 10px rgba(160,120,255,.4);}
    .badge-oneman{background:#fff0f1;color:#de6c88;border-color:#f5c1cc;}
    .badge-new{background:#ff4fa3;color:#fff;border-color:#ff4fa3;}
    .calendar-preview-title{font-size:11px;line-height:1.35;color:#b1849c;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .calendar-preview-title.is-important-title{font-size:12px;font-weight:800;color:#9d6f87;}
    .schedule-detail{margin-top:24px;padding:22px;border-radius:22px;background:#fff;border:1px solid #f2dbe7;}
    .detail-empty{margin:0;text-align:center;font-size:15px;color:#b291a4;}
    .detail-date{margin-bottom:16px;font-size:20px;font-weight:900;color:#d77ca7;letter-spacing:.02em;}
    .detail-item{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid #f6e7ef;}
    .detail-item:last-child{border-bottom:none;padding-bottom:0;}
    .detail-left{display:flex;flex-direction:column;gap:7px;}
    .detail-topline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .detail-place{font-size:14px;color:#b28ea2;}.detail-event{font-size:18px;font-weight:800;color:#8f7183;}
    .detail-buttons{display:flex;gap:10px;flex-wrap:wrap;}
    .detail-ticket{display:inline-flex;align-items:center;justify-content:center;min-width:96px;padding:10px 16px;border-radius:999px;border:1px solid #efbfd4;background:#fff8fc;color:#e27aa9;text-decoration:none;font-size:14px;font-weight:800;transition:background .18s ease,transform .18s ease;}
    .detail-ticket:hover{background:#fff0f7;transform:translateY(-1px);}.detail-button-muted{opacity:.65;cursor:default;pointer-events:none;}.detail-button-detail{background:#f4f0ff;color:#8d70d5;border-color:#d7caf6;}.detail-button-detail:hover{background:#eee8ff;}
    @media (max-width:900px){.calendar-section{padding:18px;}.calendar-month{min-width:120px;font-size:20px;}.calendar-grid,.calendar-weekdays{gap:6px;}.calendar-day{min-height:92px;border-radius:14px;padding:8px 8px 12px;}.calendar-day.is-important{min-height:98px;}.calendar-day-number{font-size:14px;}.calendar-preview-title{font-size:10px;}.calendar-preview-title.is-important-title{font-size:11px;}.calendar-badge{font-size:10px;padding:3px 7px;}.detail-item{flex-direction:column;align-items:flex-start;}.detail-ticket{min-width:0;}}
    @media (max-width:640px){.calendar-section{overflow-x:auto;}.calendar-weekdays,.calendar-grid{min-width:650px;}}
  </style>
</head>
<body>

  <main class="page-shell"><div class="wrap">
    <div class="page-title reveal"><h2>SCHEDULE</h2><p>스케줄</p></div>
    <div class="box schedule-list-page reveal"><div class="row schedule-row"><div>2026.07.12(일)</div><div>KT&amp;G 상상마당 라이브홀</div><div>루미벨 데뷔라이브</div><a class="ticket" href="ticket/current.html">TICKET</a></div></div>
    <div class="schedule-extra-wrap reveal"><button id="toggleCalendar" class="more-schedule-btn" type="button">MORE SCHEDULE</button></div>
    <div id="calendarSection" class="calendar-section hidden"><div class="calendar-header"><button id="prevMonth" class="calendar-nav-btn" type="button" aria-label="이전 달">‹</button><h3 id="calendarMonth" class="calendar-month"></h3><button id="nextMonth" class="calendar-nav-btn" type="button" aria-label="다음 달">›</button></div><div class="calendar-weekdays"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div><div id="calendarGrid" class="calendar-grid"></div><div id="scheduleDetail" class="schedule-detail"><p class="detail-empty">날짜를 선택하면 상세 일정이 보여집니다.</p></div></div>
  </div></main>
  <footer>© 2026 Lumibelle All Rights Reserved.</footer>

  <script>
    const events={"2026-07-12":[{type:"DEBUT",place:"KT&G 상상마당 라이브홀",event:"루미벨 데뷔라이브",ticket:"ticket/current.html",detail:"ticket/current.html",isNew:true}],"2026-10-18":[{type:"LIVE",place:"미정",event:"라이브 예정",ticket:"",detail:"",isNew:false}]};
    const toggleBtn=document.getElementById("toggleCalendar"),calendarSection=document.getElementById("calendarSection"),calendarGrid=document.getElementById("calendarGrid"),calendarMonth=document.getElementById("calendarMonth"),scheduleDetail=document.getElementById("scheduleDetail"),prevMonthBtn=document.getElementById("prevMonth"),nextMonthBtn=document.getElementById("nextMonth");
    let currentDate=new Date(2026,6,1);
    toggleBtn.addEventListener("click",()=>{calendarSection.classList.toggle("hidden");if(!calendarSection.classList.contains("hidden")){toggleBtn.textContent="CLOSE";renderCalendar();}else{toggleBtn.textContent="MORE SCHEDULE";scheduleDetail.innerHTML='<p class="detail-empty">날짜를 선택하면 상세 일정이 보여집니다.</p>';}});
    prevMonthBtn.addEventListener("click",()=>{currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);renderCalendar();});
    nextMonthBtn.addEventListener("click",()=>{currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);renderCalendar();});
    function getBadgeInfo(type){switch(type){case"ONEMAN":return{label:"ONEMAN",className:"badge-oneman",important:true};case"DEBUT":return{label:"DEBUT",className:"badge-debut",important:true};case"EVENT":return{label:"EVENT",className:"badge-event",important:false};default:return{label:"LIVE",className:"badge-live",important:false};}}
    function renderCalendar(){calendarGrid.innerHTML="";scheduleDetail.innerHTML='<p class="detail-empty">날짜를 선택하면 상세 일정이 보여집니다.</p>';const year=currentDate.getFullYear(),month=currentDate.getMonth();calendarMonth.textContent=`${year}.${String(month+1).padStart(2,"0")}`;const firstDay=new Date(year,month,1).getDay(),lastDate=new Date(year,month+1,0).getDate(),today=new Date();for(let i=0;i<firstDay;i++){const emptyCell=document.createElement("div");emptyCell.className="calendar-day empty";calendarGrid.appendChild(emptyCell);}for(let day=1;day<=lastDate;day++){const dateKey=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`,dayCell=document.createElement("div");dayCell.className="calendar-day";if(year===today.getFullYear()&&month===today.getMonth()&&day===today.getDate())dayCell.style.border="2px solid #ff4fa3";const eventList=events[dateKey];let previewHTML="";if(eventList&&eventList.length>0){dayCell.classList.add("has-event");const firstEvent=eventList[0],badgeInfo=getBadgeInfo(firstEvent.type);if(badgeInfo.important)dayCell.classList.add("is-important");previewHTML=`<div class="calendar-preview"><div class="calendar-preview-top"><span class="calendar-badge ${badgeInfo.className}">${badgeInfo.label}</span>${firstEvent.isNew?`<span class="calendar-badge badge-new">NEW</span>`:``}</div><div class="calendar-preview-title ${badgeInfo.important?"is-important-title":""}">${firstEvent.event}</div></div>`;}dayCell.innerHTML=`<div class="calendar-day-number">${day}</div>${previewHTML}`;dayCell.addEventListener("click",()=>{document.querySelectorAll(".calendar-day").forEach(cell=>cell.classList.remove("selected"));dayCell.classList.add("selected");renderDetail(dateKey);});calendarGrid.appendChild(dayCell);}}
    function renderDetail(dateKey){const eventList=events[dateKey];if(!eventList){scheduleDetail.innerHTML='<p class="detail-empty">해당 날짜에는 등록된 일정이 없습니다.</p>';return;}const [year,month,day]=dateKey.split("-"),formattedDate=`${year}.${month}.${day}`;scheduleDetail.innerHTML=`<div class="detail-date">${formattedDate}</div>${eventList.map(item=>{const badgeInfo=getBadgeInfo(item.type);return`<div class="detail-item"><div class="detail-left"><div class="detail-topline"><span class="calendar-badge ${badgeInfo.className}">${badgeInfo.label}</span>${item.isNew?`<span class="calendar-badge badge-new">NEW</span>`:``}<span class="detail-place">${item.place}</span></div><span class="detail-event">${item.event}</span></div><div class="detail-buttons">${item.ticket?`<a href="${item.ticket}" class="detail-ticket">TICKET</a>`:`<span class="detail-ticket detail-button-muted">추후 안내</span>`}${item.detail?`<a href="${item.detail}" class="detail-ticket detail-button-detail">DETAIL</a>`:``}</div></div>`;}).join("")}`;}
    const revealEls=document.querySelectorAll('.reveal');if('IntersectionObserver'in window){const observer=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('show');observer.unobserve(entry.target);}});},{threshold:.12});revealEls.forEach(el=>observer.observe(el));}else{revealEls.forEach(el=>el.classList.add('show'));}
  </script>
</body>
