<script>
  const events = {
    "2026-07-12": [
      {
        type: "DEBUT",
        place: "상상마당@홍대",
        event: "루미벨 데뷔라이브",
        ticket: "https://forms.gle/DrYqVV6GCUrzB4wm7",
        detail: "news-debut.html",
        isNew: true
      }
    ],
    "2026-10-18": [
      {
        type: "LIVE",
        place: "빅 이벤트",
        event: "라이브 예정",
        ticket: "",
        detail: "news-big-event.html",
        isNew: false
      }
    ]
  };

  const toggleBtn = document.getElementById("toggleCalendar");
  const calendarSection = document.getElementById("calendarSection");
  const calendarGrid = document.getElementById("calendarGrid");
  const calendarMonth = document.getElementById("calendarMonth");
  const scheduleDetail = document.getElementById("scheduleDetail");
  const prevMonthBtn = document.getElementById("prevMonth");
  const nextMonthBtn = document.getElementById("nextMonth");

  let currentDate = new Date(2026, 3, 1);

  toggleBtn.addEventListener("click", () => {
    calendarSection.classList.toggle("hidden");

    if (!calendarSection.classList.contains("hidden")) {
      toggleBtn.textContent = "CLOSE";
      renderCalendar();
    } else {
      toggleBtn.textContent = "MORE SCHEDULE";
      scheduleDetail.innerHTML = '<p class="detail-empty">날짜를 선택하면 상세 일정이 보여집니다.</p>';
    }
  });

  prevMonthBtn.addEventListener("click", () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
    renderCalendar();
  });

  nextMonthBtn.addEventListener("click", () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
    renderCalendar();
  });

  function getBadgeInfo(type) {
    switch (type) {
      case "ONEMAN":
        return { label: "ONEMAN", className: "badge-oneman", important: true };
      case "DEBUT":
        return { label: "DEBUT", className: "badge-debut", important: true };
      case "EVENT":
        return { label: "EVENT", className: "badge-event", important: false };
      default:
        return { label: "LIVE", className: "badge-live", important: false };
    }
  }

  function renderCalendar() {
    calendarGrid.innerHTML = "";
    scheduleDetail.innerHTML = '<p class="detail-empty">날짜를 선택하면 상세 일정이 보여집니다.</p>';

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    calendarMonth.textContent = `${year}.${String(month + 1).padStart(2, "0")}`;

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const emptyCell = document.createElement("div");
      emptyCell.className = "calendar-day empty";
      calendarGrid.appendChild(emptyCell);
    }

    for (let day = 1; day <= lastDate; day++) {
      const dateKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      const dayCell = document.createElement("div");
      dayCell.className = "calendar-day";

      const eventList = events[dateKey];
      let previewHTML = "";

      if (eventList && eventList.length > 0) {
        dayCell.classList.add("has-event");

        const firstEvent = eventList[0];
        const badgeInfo = getBadgeInfo(firstEvent.type);

        if (badgeInfo.important) {
          dayCell.classList.add("is-important");
        }

        previewHTML = `
          <div class="calendar-preview">
            <div style="display:flex; gap:5px; flex-wrap:wrap;">
              <span class="calendar-badge ${badgeInfo.className}">${badgeInfo.label}</span>
              ${firstEvent.isNew ? `<span class="calendar-badge" style="background:#ff4fa3; color:#fff;">NEW</span>` : ``}
            </div>
            <div class="calendar-preview-title ${badgeInfo.important ? "is-important-title" : ""}">
              ${firstEvent.event}
            </div>
          </div>
        `;
      }

      dayCell.innerHTML = `
        <div class="calendar-day-number">${day}</div>
        ${previewHTML}
      `;

      dayCell.addEventListener("click", () => {
        document.querySelectorAll(".calendar-day").forEach(cell => {
          cell.classList.remove("selected");
        });

        dayCell.classList.add("selected");
        renderDetail(dateKey);
      });

      calendarGrid.appendChild(dayCell);
    }
  }

  function renderDetail(dateKey) {
    const eventList = events[dateKey];

    if (!eventList) {
      scheduleDetail.innerHTML = '<p class="detail-empty">해당 날짜에는 등록된 일정이 없습니다.</p>';
      return;
    }

    const [year, month, day] = dateKey.split("-");
    const formattedDate = `${year}.${month}.${day}`;

    scheduleDetail.innerHTML = `
      <div class="detail-date">${formattedDate}</div>
      ${eventList.map(item => {
        const badgeInfo = getBadgeInfo(item.type);

        return `
          <div class="detail-item">
            <div class="detail-left">
              <div class="detail-topline">
                <span class="calendar-badge ${badgeInfo.className}">${badgeInfo.label}</span>
                ${item.isNew ? `<span class="calendar-badge" style="background:#ff4fa3; color:#fff;">NEW</span>` : ``}
                <span class="detail-place">${item.place}</span>
              </div>
              <span class="detail-event">${item.event}</span>
            </div>

            <div class="detail-buttons">
              ${
                item.ticket
                  ? `<a href="${item.ticket}" class="detail-ticket" target="_blank">TICKET</a>`
                  : `<span class="detail-ticket detail-button-muted">COMING SOON</span>`
              }
              ${
                item.detail
                  ? `<a href="${item.detail}" class="detail-ticket detail-button-detail">DETAIL</a>`
                  : ``
              }
            </div>
          </div>
        `;
      }).join("")}
    `;
  }
</script>
