<script>
const events = {
  "2026-07-12": [
    {
      type: "DEBUT",
      place: "상상마당@홍대",
      event: "루미벨 데뷔라이브",
      ticket: "#",
      detail: "news-debut.html"
    }
  ],
  "2026-10-18": [
    {
      type: "EVENT",
      place: "빅 이벤트",
      event: "라이브 예정",
      ticket: "#",
      detail: "news-event.html"
    }
  ]
};

const toggleBtn = document.getElementById("toggleCalendar");
const calendarSection = document.getElementById("calendarSection");
const calendarGrid = document.getElementById("calendarGrid");
const calendarMonth = document.getElementById("calendarMonth");
const scheduleDetail = document.getElementById("scheduleDetail");
const prevMonthBtn = document.getElementById("prevMonth");
const nextMonthBtn = document.getElementById("nextMonth");

let currentDate = new Date(2026, 3, 1);

toggleBtn.addEventListener("click", () => {
  calendarSection.classList.toggle("hidden");

  if (!calendarSection.classList.contains("hidden")) {
    toggleBtn.textContent = "CLOSE";
    renderCalendar();
  } else {
    toggleBtn.textContent = "MORE SCHEDULE";
  }
});

prevMonthBtn.addEventListener("click", () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
  renderCalendar();
});

nextMonthBtn.addEventListener("click", () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
  renderCalendar();
});

function getBadge(type) {
  if (type === "DEBUT") return "🟣 DEBUT";
  if (type === "ONEMAN") return "🔴 ONEMAN";
  if (type === "EVENT") return "🔵 EVENT";
  return "💗 LIVE";
}

function renderCalendar() {
  calendarGrid.innerHTML = "";
  scheduleDetail.innerHTML = "<p>날짜를 선택하면 상세 일정이 보여집니다.</p>";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  calendarMonth.textContent = `${year}.${String(month + 1).padStart(2, "0")}`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendarGrid.innerHTML += `<div class="calendar-day empty"></div>`;
  }

  for (let day = 1; day <= lastDate; day++) {
    const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const ev = events[key];

    let preview = "";
    if (ev) {
      preview = `
        <div style="font-size:11px;">
          ${getBadge(ev[0].type)}<br>
          ${ev[0].event}
        </div>
      `;
    }

    calendarGrid.innerHTML += `
      <div class="calendar-day ${ev ? "has-event" : ""}" onclick="showDetail('${key}')">
        <div>${day}</div>
        ${preview}
      </div>
    `;
  }
}

function showDetail(key) {
  const ev = events[key];

  if (!ev) {
    scheduleDetail.innerHTML = "<p>일정 없음</p>";
    return;
  }

  scheduleDetail.innerHTML = ev.map(item => `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div>
        <div>${getBadge(item.type)} ${item.place}</div>
        <div style="font-weight:700;">${item.event}</div>
      </div>

      <div style="display:flex; gap:10px;">
        <a href="${item.ticket}" class="detail-ticket">TICKET</a>
        ${item.detail ? `<a href="${item.detail}" class="detail-ticket">DETAIL</a>` : ""}
      </div>
    </div>
  `).join("");
}
</script>
