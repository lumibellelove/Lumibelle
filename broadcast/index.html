<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ON AIR LIVE ADMIN | Lumibelle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=SUIT:wght@400;600;700;800;900&display=swap');
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:#fffafc;
      color:#7f6a77;
      font-family:"SUIT","Noto Sans KR",sans-serif;
      padding:24px 14px 48px;
    }
    .wrap{max-width:860px;margin:0 auto}
    .panel{
      border:1px solid #f2d8e7;
      border-radius:34px;
      background:linear-gradient(180deg,#fff1f8 0%,#fff8fc 100%);
      box-shadow:0 8px 24px rgba(232,191,211,.12);
      padding:28px;
      overflow:hidden;
    }
    h1{
      margin:0;
      text-align:center;
      color:#d77ca7;
      font-size:52px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .lead{
      text-align:center;
      margin:12px auto 24px;
      color:#b688a2;
      font-size:15px;
      line-height:1.7;
      font-weight:800;
    }
    .notice{
      padding:16px 18px;
      border:1px solid #f0d5e4;
      border-radius:22px;
      background:#fff;
      color:#9b7d90;
      font-size:14px;
      font-weight:800;
      line-height:1.7;
      margin-bottom:18px;
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{
      display:flex;
      flex-direction:column;
      gap:8px;
      color:#b57e9d;
      font-size:13px;
      font-weight:900;
    }
    input, select, textarea{
      width:100%;
      border:1px solid #efd4e2;
      background:#fff;
      border-radius:16px;
      padding:13px 14px;
      color:#846f81;
      font-size:15px;
      font-weight:800;
      font-family:inherit;
      outline:none;
    }
    textarea{min-height:90px;resize:vertical}
    .full{grid-column:1/-1}
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:18px;
    }
    button, a.btn{
      min-height:54px;
      border:0;
      border-radius:999px;
      font-family:inherit;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:13px 18px;
    }
    .primary{
      color:#fff;
      background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%);
      box-shadow:0 10px 22px rgba(255,95,165,.24);
    }
    .off{
      color:#fff;
      background:linear-gradient(180deg,#a98aa0 0%,#8c7385 100%);
      box-shadow:0 10px 22px rgba(140,115,133,.16);
    }
    .ghost{
      color:#c97ca8;
      background:#fff;
      border:1px solid #efc6dc;
    }
    .status-box{
      margin-top:20px;
      border:1px solid #f0dde8;
      border-radius:24px;
      background:#fff;
      padding:18px;
      color:#8f7183;
      font-size:14px;
      font-weight:800;
      line-height:1.7;
      white-space:pre-wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 12px;
      border-radius:999px;
      background:#fff0f7;
      border:1px solid #efc6dc;
      color:#c97ca8;
      font-size:12px;
      font-weight:900;
      margin:0 6px 8px 0;
    }
    .pill.live{background:#ff5fa5;color:#fff;border-color:transparent}
    @media(max-width:720px){
      h1{font-size:38px}
      .grid,.actions{grid-template-columns:1fr}
      .panel{padding:22px 16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>ON AIR ADMIN</h1>
      <p class="lead">방송 시작/종료를 구글시트에 바로 기록하고, 현재 상태를 확인하는 관리용 페이지입니다.</p>

      <div class="notice">
        이 페이지는 팬 메뉴에 넣지 말고 링크를 아는 사람만 사용하세요.<br>
        방송 시작은 <b>LIVE ON</b>, 방송 종료는 <b>LIVE OFF</b> 버튼을 누르면 됩니다.
      </div>

      <div class="grid">
        <label>멤버
          <select id="member">
            <option value="마리링">마리링</option>
            <option value="루루">루루</option>
            <option value="이로">이로</option>
            <option value="루나">루나</option>
          </select>
        </label>

        <label>플랫폼
          <select id="platform">
            <option value="씨미">씨미</option>
            <option value="유튜브">유튜브</option>
            <option value="트윗캐스">트윗캐스</option>
            <option value="기타">기타</option>
          </select>
        </label>

        <label>방송 제목
          <input id="title" value="현재 마리링 방송중입니다" />
        </label>

        <label>방송 링크
          <input id="url" value="https://ci.me/@mariring_love" />
        </label>

        <label class="full">안내 문구
          <textarea id="summary">씨미에서 ON AIR 중이에요.</textarea>
        </label>
      </div>

      <div class="actions">
        <button class="primary" type="button" onclick="setLive('on')">LIVE ON</button>
        <button class="off" type="button" onclick="setLive('off')">LIVE OFF</button>
        <button class="ghost" type="button" onclick="loadStatus()">현재 상태 확인</button>
        <a class="btn ghost" href="https://lumibellelove.github.io/Lumibelle/broadcast/?v=live" target="_blank" rel="noopener noreferrer">방송 페이지 보기</a>
      </div>

      <div class="status-box" id="statusBox">현재 상태 확인 버튼을 누르면 시트의 LIVE 상태가 표시됩니다.</div>
    </section>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTc3TdPD3KUrUHYciEAlZYNdYdVX8khT_BHAASCpejc86vTr-lORomb9lO2acPiurGDA/exec";

  function todayKST(){
    const now = new Date();
    const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    return kst.toISOString().slice(0,10);
  }

  function timeKST(){
    const now = new Date();
    const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    return kst.toISOString().slice(11,16);
  }

  function payload(status){
    const member = document.getElementById("member").value;
    const platform = document.getElementById("platform").value;
    return {
      mode: "live",
      type: "live",
      member,
      status,
      date: todayKST(),
      time: timeKST(),
      platform,
      visibility: "public",
      title: document.getElementById("title").value || `현재 ${member} 방송중입니다`,
      summary: document.getElementById("summary").value || `${platform}에서 ON AIR 중이에요.`,
      body: status === "on" ? "방송 페이지로 이동해서 시청할 수 있어요." : "방송이 종료되었습니다.",
      url: document.getElementById("url").value || ""
    };
  }

  async function postForm(data){
    const form = new FormData();
    Object.entries(data).forEach(([k,v]) => form.append(k, v ?? ""));
    const res = await fetch(SCRIPT_URL, { method: "POST", body: form });
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return { ok:false, raw:text }; }
  }

  async function setLive(status){
    const box = document.getElementById("statusBox");
    box.textContent = status === "on" ? "LIVE ON 저장중..." : "LIVE OFF 저장중...";
    try{
      const result = await postForm(payload(status));
      if(result.ok){
        box.textContent = status === "on"
          ? "저장 완료! 방송중 상태가 켜졌어요. 방송 페이지를 새로고침해서 확인하세요."
          : "저장 완료! 방송중 상태가 꺼졌어요. 방송 페이지를 새로고침해서 확인하세요.";
        setTimeout(loadStatus, 800);
      }else{
        box.textContent = "저장 실패: " + JSON.stringify(result);
      }
    }catch(err){
      box.textContent = "저장 실패: " + err.message;
    }
  }

  function loadStatus(){
    const box = document.getElementById("statusBox");
    box.textContent = "현재 상태 불러오는 중...";
    const cb = "liveAdminCallback_" + Date.now();
    window[cb] = function(data){
      try{
        const items = (data.items || []).filter(x => String(x.type).toLowerCase() === "live");
        const active = items.filter(x => ["on","live","방송중"].includes(String(x.status || "").toLowerCase()) && String(x.visibility || "public").toLowerCase() === "public");
        if(active.length){
          box.innerHTML = '<span class="pill live">LIVE ON</span>\n' + active.map(x => `${x.member} · ${x.platform} · ${x.title}\n${x.url || ""}`).join("\n\n");
        }else{
          box.innerHTML = '<span class="pill">OFF AIR</span>\n현재 공개 방송중 상태가 없습니다.';
        }
      }catch(e){
        box.textContent = "상태 표시 실패: " + e.message;
      }finally{
        delete window[cb];
        const tag = document.getElementById(cb);
        if(tag) tag.remove();
      }
    };
    const s = document.createElement("script");
    s.id = cb;
    s.src = SCRIPT_URL + "?callback=" + cb + "&t=" + Date.now();
    s.onerror = function(){
      box.textContent = "상태 불러오기 실패. Apps Script 배포/권한을 확인해주세요.";
      delete window[cb];
      s.remove();
    };
    document.body.appendChild(s);
  }
</script>
</body>
</html>
