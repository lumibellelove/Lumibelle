<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ON AIR WRITE | Lumibelle</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=SUIT:wght@400;500;600;700;800;900&display=swap');
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{min-height:100vh;background:#fffafc;color:#7f6a77;font-family:"SUIT","Noto Sans KR",sans-serif;}
    .wrap{max-width:980px;margin:0 auto;padding:18px;}
    .top-card{margin-top:10px;padding:24px 26px;border:1px solid #f2d8e7;border-radius:30px;background:#fff5fb;box-shadow:0 8px 24px rgba(232,191,211,.12);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    .brand h1{margin:0;color:#ff5aa6;font-family:"Cormorant Garamond",serif;font-size:34px;line-height:1;font-weight:700;}
    .brand p{margin:6px 0 0;color:#c697b1;font-size:14px;font-weight:800;}
    .nav-btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 15px;border-radius:999px;background:#fff;border:1px solid #f0d5e4;color:#d27ca8;text-decoration:none;font-size:13px;font-weight:900;}
    .hero{position:relative;margin-top:18px;padding:42px 24px 34px;text-align:center;border:1px solid #f2d8e7;border-radius:34px;background:linear-gradient(180deg,#fff1f8 0%,#fff8fc 100%);box-shadow:0 8px 24px rgba(232,191,211,.12);overflow:hidden;}
    .hero:before{content:"";position:absolute;inset:-50%;background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.85),transparent 18%),radial-gradient(circle at 78% 62%,rgba(202,167,255,.20),transparent 17%),conic-gradient(from 0deg,rgba(255,255,255,0),rgba(255,138,194,.18),rgba(255,255,255,0));animation:spin 10s linear infinite;pointer-events:none;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hero>*{position:relative;z-index:1;}
    .hero h2{margin:0;color:#d77ca7;font-size:52px;line-height:.95;font-weight:900;letter-spacing:-.04em;}
    .hero p{margin:13px 0 0;color:#9b7d90;font-size:16px;font-weight:700;line-height:1.75;}
    .panel{margin-top:18px;border:1px solid #f2d8e7;border-radius:32px;background:#fff5fb;box-shadow:0 8px 24px rgba(232,191,211,.12);padding:22px;}
    .notice{padding:14px 16px;border-radius:22px;background:#fff;border:1px solid #f0dde8;color:#9b7d90;font-size:14px;font-weight:700;line-height:1.7;margin-bottom:16px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    label{display:flex;flex-direction:column;gap:7px;color:#b27496;font-size:13px;font-weight:900;}
    input,select,textarea{width:100%;border:1px solid #efd4e2;background:#fff;border-radius:16px;padding:13px 14px;color:#846f81;font-family:inherit;font-size:15px;font-weight:700;outline:none;}
    input:focus,select:focus,textarea:focus{border-color:#ff93c0;box-shadow:0 0 0 4px rgba(255,147,192,.16);}
    textarea{min-height:150px;resize:vertical;line-height:1.7;}
    .wide{grid-column:1 / -1;}
    .type-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
    .type-tab{position:relative;display:flex;align-items:center;justify-content:center;min-height:54px;border-radius:18px;border:1px solid #f0d5e4;background:#fff;color:#c97ca8;font-weight:900;cursor:pointer;text-align:center;}
    .type-tab input{position:absolute;opacity:0;pointer-events:none;}
    .type-tab.active{background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%);color:#fff;border-color:transparent;box-shadow:0 10px 22px rgba(255,95,165,.22);}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
    button{border:0;border-radius:999px;padding:14px 22px;background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%);color:#fff;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 10px 22px rgba(255,95,165,.22);}
    button.secondary{background:#fff;color:#c97ca8;border:1px solid #efc6dc;box-shadow:none;}
    .result{display:none;margin-top:14px;padding:14px 16px;border-radius:20px;background:#fff;color:#9b7d90;border:1px solid #f0dde8;font-size:14px;font-weight:800;line-height:1.65;}
    .result.show{display:block;}
    .hint{margin-top:10px;color:#b28ea2;font-size:12.5px;font-weight:700;line-height:1.65;}
    .hidden-frame{display:none;width:0;height:0;border:0;}
    @media(max-width:760px){.wrap{padding:14px}.top-card{text-align:center;justify-content:center}.hero h2{font-size:40px}.form-grid,.type-tabs{grid-template-columns:1fr}.panel{padding:16px}button{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top-card">
      <div class="brand"><h1>Lumibelle</h1><p>ON AIR · 작성 페이지</p></div>
      <a class="nav-btn" href="index.html">ON AIR로 돌아가기</a>
    </header>

    <section class="hero">
      <h2>WRITE</h2>
      <p>방송 스케줄, 갑작스러운 휴방 공지, 짧은 방송 후기를 빠르게 등록하는 페이지입니다.</p>
    </section>

    <section class="panel">
      <div class="notice">
        작성 후 제출하면 Google Sheet에 저장됩니다. 공개 페이지에는 나중에 자동 연결할 수 있어요.<br>
        처음 설정할 때는 파일 안의 <b>SCRIPT_URL</b> 한 줄만 Apps Script 주소로 바꾸면 됩니다.
      </div>

      <form id="writeForm" method="POST" target="submitFrame">
        <input type="hidden" name="createdAt" id="createdAt">
        <input type="hidden" name="type" id="typeInput" value="schedule">

        <div class="type-tabs" id="typeTabs">
          <label class="type-tab active"><input type="radio" name="typeRadio" value="schedule" checked>스케줄 등록</label>
          <label class="type-tab"><input type="radio" name="typeRadio" value="notice">휴방/공지</label>
          <label class="type-tab"><input type="radio" name="typeRadio" value="shortDiary">짧은 후기</label>
          <label class="type-tab"><input type="radio" name="typeRadio" value="longDiary">긴 후기</label>
        </div>

        <div class="form-grid">
          <label>멤버
            <select name="member" required>
              <option value="마리링">마리링</option>
              <option value="루루">루루</option>
              <option value="이로">이로</option>
              <option value="루나">루나</option>
              <option value="전체">전체</option>
            </select>
          </label>

          <label>상태
            <select name="status">
              <option value="예정">예정</option>
              <option value="방송중">방송중</option>
              <option value="휴방">휴방</option>
              <option value="시간변경">시간변경</option>
              <option value="취소">취소</option>
              <option value="기록">기록</option>
            </select>
          </label>

          <label>날짜
            <input type="date" name="date" required>
          </label>

          <label>시간
            <input type="time" name="time">
          </label>

          <label>플랫폼
            <select name="platform">
              <option value="씨미">씨미</option>
              <option value="유튜브">유튜브</option>
              <option value="트윗캐스">트윗캐스</option>
              <option value="기타">기타</option>
              <option value="없음">없음</option>
            </select>
          </label>

          <label>공개 여부
            <select name="visibility">
              <option value="public">공개</option>
              <option value="pending">대기</option>
              <option value="private">비공개</option>
            </select>
          </label>

          <label class="wide">제목
            <input name="title" placeholder="예: 오늘 방송 휴방 안내 / 금요일 22시 수다 방송" required>
          </label>

          <label class="wide">짧은 요약
            <input name="summary" placeholder="카드에 보일 한 줄 설명을 적어주세요.">
          </label>

          <label class="wide">내용
            <textarea name="body" placeholder="공지 내용이나 방송 후기를 적어주세요."></textarea>
          </label>

          <label class="wide">링크 / 이미지 경로 / 참고 URL
            <input name="url" placeholder="예: https://ci.me/@mariring_love 또는 img/broadcast/...">
          </label>
        </div>

        <div class="actions">
          <button type="submit">작성하기</button>
          <button type="reset" class="secondary">초기화</button>
        </div>
        <p class="hint">※ 멤버에게 이 링크를 줄 경우, GitHub나 코드 수정 없이 폼만 작성하게 하면 됩니다.</p>
        <div class="result" id="resultBox"></div>
      </form>
      <iframe class="hidden-frame" name="submitFrame" id="submitFrame"></iframe>
    </section>
  </div>

<script>
  /* 여기에 Apps Script 웹 앱 URL을 넣으면 실제 저장됩니다. */
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTc3TdPD3KUrUHYciEAlZYNdYdVX8khT_BHAASCpejc86vTr-lORomb9lO2acPiurGDA/exec";

  const form = document.getElementById("writeForm");
  const typeTabs = document.getElementById("typeTabs");
  const typeInput = document.getElementById("typeInput");
  const resultBox = document.getElementById("resultBox");
  const createdAt = document.getElementById("createdAt");

  function setToday(){
    const dateInput = form.querySelector('input[name="date"]');
    if(!dateInput.value){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      dateInput.value = `${yyyy}-${mm}-${dd}`;
    }
  }

  function showResult(message){
    resultBox.textContent = message;
    resultBox.classList.add("show");
  }

  typeTabs.addEventListener("change", (e)=>{
    if(!e.target.matches('input[name="typeRadio"]')) return;
    typeInput.value = e.target.value;
    document.querySelectorAll(".type-tab").forEach(tab=>tab.classList.remove("active"));
    e.target.closest(".type-tab").classList.add("active");
  });

  form.addEventListener("submit", (e)=>{
    createdAt.value = new Date().toISOString();

    if(!SCRIPT_URL || SCRIPT_URL.includes("PASTE_GOOGLE_APPS_SCRIPT")){
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      const drafts = JSON.parse(localStorage.getItem("lumibelleBroadcastDrafts") || "[]");
      drafts.unshift(data);
      localStorage.setItem("lumibelleBroadcastDrafts", JSON.stringify(drafts.slice(0,30)));
      showResult("아직 Apps Script URL이 연결되지 않아서, 이 브라우저에 임시 저장했어요. URL을 넣으면 Google Sheet로 저장됩니다.");
      return;
    }

    form.action = SCRIPT_URL;
    showResult("제출 중입니다. 잠시만 기다려주세요...");
    setTimeout(()=>{
      showResult("제출 완료로 처리했어요. Google Sheet에서 저장 내용을 확인해주세요.");
      form.reset();
      typeInput.value = "schedule";
      document.querySelectorAll(".type-tab").forEach(tab=>tab.classList.remove("active"));
      document.querySelector('.type-tab input[value="schedule"]').closest(".type-tab").classList.add("active");
      setToday();
    }, 900);
  });

  setToday();
</script>
</body>
</html>
