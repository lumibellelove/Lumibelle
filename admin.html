<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ON AIR Admin | Lumibelle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SUIT:wght@500;700;800;900&display=swap');
    *{box-sizing:border-box}
    body{margin:0;background:#fffafc;color:#7f6a77;font-family:"SUIT","Noto Sans KR",sans-serif}
    .wrap{max-width:880px;margin:40px auto;padding:0 18px}
    .panel{border:1px solid #f2d8e7;border-radius:30px;background:#fff5fb;box-shadow:0 8px 24px rgba(232,191,211,.14);padding:28px}
    h1{margin:0 0 8px;color:#d77ca7;font-size:46px;line-height:1;font-weight:900;text-align:center}
    p{font-weight:800;color:#b28ea2;line-height:1.7}
    .notice{background:#fff;border:1px solid #f0dde8;border-radius:20px;padding:16px;margin:20px 0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:flex;flex-direction:column;gap:7px;color:#b57e9d;font-weight:900;font-size:13px}
    input,select,textarea{width:100%;border:1px solid #efd4e2;background:#fff;border-radius:16px;padding:13px 14px;color:#846f81;font-weight:800;font-family:inherit}
    textarea{min-height:86px;resize:vertical}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    button,a.btn{border:0;border-radius:999px;min-height:52px;padding:13px 18px;font-weight:900;font-size:15px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}
    .primary{background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;box-shadow:0 10px 22px rgba(255,95,165,.24)}
    .secondary{background:#fff;color:#c97ca8;border:1px solid #efc6dc}
    .danger{background:#9b7d90;color:#fff}
    .live-list{display:grid;gap:12px;margin-top:20px}
    .live-item{background:#fff;border:1px solid #f0dde8;border-radius:20px;padding:16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
    .live-item strong{display:block;color:#d77ca7;font-size:19px;margin-bottom:5px}
    .live-item span{color:#8f7183;font-weight:800}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap}
    .mini-actions button{min-height:38px;font-size:12px;padding:8px 12px}
    .status{margin-top:16px;text-align:center;color:#ff59a5;font-weight:900}
    @media(max-width:720px){.grid,.actions{grid-template-columns:1fr}.live-item{grid-template-columns:1fr}h1{font-size:36px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>ON AIR ADMIN</h1>
      <p style="text-align:center">멤버가 동시에 방송할 때는 아래에서 방송 카드를 여러 개 추가하면 됩니다.</p>
      <div class="notice">※ 현재 버전은 브라우저 테스트용 localStorage 방식입니다. 실제 모든 팬에게 반영하려면 기존처럼 Apps Script 연결이 필요해요.</div>
      <div class="grid">
        <label>멤버명<input id="member" value="마리링" placeholder="예: 마리링 / 루나 / 이로"></label>
        <label>플랫폼<select id="platform"><option value="cime">씨미</option><option value="youtube">유튜브</option><option value="twitcast">트윗캐스</option></select></label>
        <label>씨미 링크<input id="cimeUrl" value="https://ci.me/@mariring_love"></label>
        <label>유튜브 Live ID<input id="youtubeId" placeholder="유튜브 영상 ID"></label>
        <label>유튜브 링크<input id="youtubeUrl" placeholder="선택: 유튜브 전체 링크"></label>
        <label>트윗캐스 ID<input id="twitcastId" placeholder="예: mariring_love"></label>
      </div>
      <label style="margin-top:12px">상태 문구<textarea id="message" placeholder="예: 현재 마리링이 씨미에서 방송중입니다 💗"></textarea></label>
      <div class="actions">
        <button class="primary" onclick="addLive()">이 멤버 LIVE 추가</button>
        <button class="secondary" onclick="saveAll()">현재 목록 저장</button>
        <button class="danger" onclick="clearAll()">전체 LIVE OFF</button>
        <a class="btn secondary" href="broadcast/">방송 페이지 보기</a>
      </div>
      <div class="status" id="statusText">준비 완료</div>
      <div class="live-list" id="liveList"></div>
    </section>
  </div>
<script>
  const KEY="lumibelleLiveState";
  let lives=[];
  function load(){
    try{
      const saved=JSON.parse(localStorage.getItem(KEY)||"{}");
      lives=Array.isArray(saved.liveList)?saved.liveList:[];
      if(!lives.length&&saved.isLive){
        lives=[{isLive:true,member:saved.member,platform:saved.platform,message:saved.message,cimeUrl:saved.cimeUrl,youtubeId:saved.youtubeId,youtubeUrl:saved.youtubeUrl,twitcastId:saved.twitcastId,twitcastUrl:saved.twitcastUrl}];
      }
    }catch(e){lives=[]}
    render();
  }
  function readForm(){
    const member=document.getElementById('member').value.trim()||'멤버';
    const platform=document.getElementById('platform').value;
    return {
      isLive:true,
      member,
      platform,
      message:document.getElementById('message').value.trim()||`현재 ${member} 방송중입니다 💗`,
      cimeUrl:document.getElementById('cimeUrl').value.trim(),
      youtubeId:document.getElementById('youtubeId').value.trim(),
      youtubeUrl:document.getElementById('youtubeUrl').value.trim(),
      twitcastId:document.getElementById('twitcastId').value.trim()
    };
  }
  function addLive(){
    const item=readForm();
    const idx=lives.findIndex(v=>v.member===item.member);
    if(idx>=0) lives[idx]=item;
    else lives.push(item);
    saveAll('LIVE 추가 완료');
  }
  function removeLive(i){lives.splice(i,1);saveAll('삭제 완료')}
  function saveAll(msg='저장 완료'){
    localStorage.setItem(KEY,JSON.stringify({isLive:false,liveList:lives}));
    document.getElementById('statusText').textContent=msg;
    render();
  }
  function clearAll(){
    lives=[];
    localStorage.setItem(KEY,JSON.stringify({isLive:false,liveList:[]}));
    document.getElementById('statusText').textContent='전체 OFF 완료';
    render();
  }
  function render(){
    const box=document.getElementById('liveList');
    if(!lives.length){
      box.innerHTML='<div class="live-item"><div><strong>현재 LIVE 없음</strong><span>멤버 방송을 추가하면 홈과 방송 페이지에 표시됩니다.</span></div></div>';
      return;
    }
    box.innerHTML=lives.map((item,i)=>`<div class="live-item"><div><strong>${item.member} · ${String(item.platform).toUpperCase()}</strong><span>${item.message||''}</span></div><div class="mini-actions"><button class="secondary" onclick="removeLive(${i})">삭제</button></div></div>`).join('');
  }
  load();
</script>
</body>
</html>
