<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ON AIR ADMIN | Lumibelle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SUIT:wght@500;700;800;900&display=swap');
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      padding:24px 14px 50px;
      background:#fffafc;
      color:#7f6a77;
      font-family:"SUIT","Noto Sans KR",sans-serif;
    }
    .wrap{max-width:760px;margin:0 auto}
    .card{
      border:1px solid #f2d8e7;
      border-radius:32px;
      background:linear-gradient(180deg,#fff1f8,#fff8fc);
      box-shadow:0 8px 24px rgba(232,191,211,.12);
      padding:28px;
    }
    h1{
      margin:0;
      text-align:center;
      color:#d77ca7;
      font-size:46px;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .desc{
      margin:12px 0 22px;
      text-align:center;
      color:#9b7d90;
      font-size:14px;
      font-weight:800;
      line-height:1.7;
    }
    .notice{
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:20px;
      border:1px solid #f0d5e4;
      background:#fff;
      color:#9b7d90;
      font-size:13px;
      font-weight:800;
      line-height:1.65;
    }
    label{
      display:block;
      margin:12px 0 6px;
      color:#b57e9d;
      font-size:13px;
      font-weight:900;
    }
    input, select, textarea{
      width:100%;
      border:1px solid #efd4e2;
      border-radius:16px;
      background:#fff;
      padding:13px 14px;
      color:#846f81;
      font-size:15px;
      font-weight:800;
      font-family:inherit;
      outline:none;
    }
    textarea{min-height:80px;resize:vertical}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
    button,a{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:54px;
      border-radius:999px;
      padding:13px 16px;
      text-decoration:none;
      border:0;
      font-family:inherit;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      text-align:center;
    }
    .on{background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;box-shadow:0 10px 22px rgba(255,95,165,.22)}
    .off{background:linear-gradient(180deg,#a98aa0,#8c7385);color:#fff}
    .ghost{background:#fff;color:#c97ca8;border:1px solid #efc6dc}
    .status{
      margin-top:18px;
      padding:15px;
      border-radius:20px;
      background:#fff;
      border:1px solid #f0dde8;
      color:#8f7183;
      font-size:14px;
      font-weight:800;
      line-height:1.7;
      white-space:pre-line;
    }
    @media(max-width:650px){.grid,.actions{grid-template-columns:1fr} h1{font-size:36px} .card{padding:22px 16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>ON AIR ADMIN</h1>
      <p class="desc">이 페이지는 구글시트에 직접 저장하는 아주 단순한 버전입니다.</p>
      <div class="notice">
        저장이 안 되던 문제 때문에 fetch 방식 대신 <b>일반 form 제출 방식</b>으로 바꿨어요.<br>
        버튼을 누르면 시트에 한 줄이 들어가야 정상입니다.
      </div>

      <form id="liveForm" action="https://script.google.com/macros/s/AKfycbyTc3TdPD3KUrUHYciEAlZYNdYdVX8khT_BHAASCpejc86vTr-lORomb9lO2acPiurGDA/exec" method="POST" target="hiddenFrame">
        <input type="hidden" name="type" value="live">
        <input type="hidden" name="visibility" value="public">
        <input type="hidden" name="status" id="statusInput" value="on">
        <input type="hidden" name="date" id="dateInput">
        <input type="hidden" name="time" id="timeInput">

        <div class="grid">
          <div>
            <label>멤버</label>
            <select name="member" id="member">
              <option value="마리링">마리링</option>
              <option value="루루">루루</option>
              <option value="이로">이로</option>
              <option value="루나">루나</option>
            </select>
          </div>
          <div>
            <label>플랫폼</label>
            <select name="platform" id="platform">
              <option value="씨미">씨미</option>
              <option value="유튜브">유튜브</option>
              <option value="트윗캐스">트윗캐스</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="full">
            <label>방송 제목</label>
            <input name="title" id="title" value="현재 마리링 방송중입니다">
          </div>
          <div class="full">
            <label>요약</label>
            <textarea name="summary" id="summary">씨미에서 ON AIR 중이에요.</textarea>
          </div>
          <div class="full">
            <label>본문</label>
            <textarea name="body" id="body">클릭하면 방송 페이지로 이동합니다.</textarea>
          </div>
          <div class="full">
            <label>방송 링크</label>
            <input name="url" id="url" value="https://ci.me/@mariring_love">
          </div>
        </div>

        <div class="actions">
          <button type="button" class="on" onclick="submitLive('on')">LIVE ON</button>
          <button type="button" class="off" onclick="submitLive('off')">LIVE OFF</button>
          <a class="ghost" href="https://script.google.com/macros/s/AKfycbyTc3TdPD3KUrUHYciEAlZYNdYdVX8khT_BHAASCpejc86vTr-lORomb9lO2acPiurGDA/exec" target="_blank" rel="noopener noreferrer">시트 연결 테스트</a>
          <a class="ghost" href="https://lumibellelove.github.io/Lumibelle/broadcast/?v=admin" target="_blank" rel="noopener noreferrer">방송 페이지 보기</a>
        </div>
      </form>

      <iframe name="hiddenFrame" id="hiddenFrame" style="display:none"></iframe>
      <div class="status" id="statusBox">버튼을 누르면 1~2초 뒤 구글시트에 새 줄이 생겨야 해요.</div>
    </section>
  </div>

<script>
  function kstParts(){
    const now = new Date();
    const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    return {
      date: kst.toISOString().slice(0,10),
      time: kst.toISOString().slice(11,16)
    };
  }

  function submitLive(status){
    const p = kstParts();
    document.getElementById("statusInput").value = status;
    document.getElementById("dateInput").value = p.date;
    document.getElementById("timeInput").value = p.time;

    const member = document.getElementById("member").value;
    const platform = document.getElementById("platform").value;

    if(status === "on"){
      if(!document.getElementById("title").value.trim()) document.getElementById("title").value = `현재 ${member} 방송중입니다`;
      if(!document.getElementById("summary").value.trim()) document.getElementById("summary").value = `${platform}에서 ON AIR 중이에요.`;
    }

    document.getElementById("liveForm").submit();
    document.getElementById("statusBox").textContent =
      status === "on"
      ? "LIVE ON 제출했어요. 구글시트에 type=live / status=on 줄이 들어갔는지 확인해주세요."
      : "LIVE OFF 제출했어요. 구글시트에 type=live / status=off 줄이 들어갔는지 확인해주세요.";
  }
</script>
</body>
</html>
