<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumibelle ON AIR Admin</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#fffafc;font-family:'SUIT','Noto Sans KR',sans-serif;color:#846f81;display:flex;align-items:center;justify-content:center;padding:24px}
    .panel{width:min(720px,100%);background:#fff5fb;border:1px solid #f2d8e7;border-radius:30px;box-shadow:0 14px 34px rgba(232,191,211,.18);padding:28px}
    h1{margin:0 0 8px;color:#d77ca7;font-size:42px;line-height:1;font-weight:900;text-align:center}
    .sub{text-align:center;color:#c99ab2;font-weight:800;line-height:1.7;margin-bottom:24px}
    .notice{background:#fff;border:1px solid #f0d5e4;border-radius:20px;padding:14px 16px;font-size:14px;line-height:1.7;margin-bottom:20px;color:#9b7d90;font-weight:700}
    label{display:block;margin:16px 0 8px;color:#b57e9d;font-weight:900}
    input,select,textarea{width:100%;border:1px solid #efd4e2;background:#fff;border-radius:16px;padding:14px 16px;font-size:15px;font-weight:700;color:#8d7082;outline:none}
    textarea{min-height:86px;resize:vertical;line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
    button{border:0;border-radius:999px;padding:15px 18px;font-size:15px;font-weight:900;cursor:pointer;transition:.15s ease}
    button:hover{transform:translateY(-1px)}
    .primary{background:linear-gradient(180deg,#ff7eb3 0%,#ff5fa5 100%);color:#fff;box-shadow:0 8px 18px rgba(255,95,165,.25)}
    .secondary{background:#fff;color:#c97ca8;border:1px solid #efc6dc}
    .danger{background:#8d7082;color:#fff}
    .status{margin-top:18px;text-align:center;font-weight:900;color:#ff59a5;min-height:24px}
    .preview{margin-top:20px;background:#fff;border:1px solid #f0dde8;border-radius:24px;padding:18px;text-align:center}
    .live-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff4fa3;margin-right:6px;box-shadow:0 0 0 5px rgba(255,79,163,.12)}
    @media(max-width:680px){.grid,.buttons{grid-template-columns:1fr}h1{font-size:34px}.panel{padding:20px}}
  </style>
</head>
<body>
  <main class="panel">
    <h1>ON AIR ADMIN</h1>
    <p class="sub">루미벨 방송 상태를 관리하는 페이지입니다.</p>

    <div class="notice">
      ※ 이 파일은 관리자용입니다. 실제로 모든 팬에게 반영하려면 아래 SCRIPT_URL에 Google Apps Script 주소를 연결해야 해요.<br>
      ※ SCRIPT_URL이 비어 있으면 내 브라우저에서만 테스트됩니다.
    </div>

    <label>관리 비밀번호</label>
    <input id="password" type="password" placeholder="비밀번호 입력" />

    <div class="grid">
      <div>
        <label>방송 상태</label>
        <select id="isLive">
          <option value="true">🔴 방송중</option>
          <option value="false">⚪ 방송 아님</option>
        </select>
      </div>
      <div>
        <label>플랫폼</label>
        <select id="platform">
          <option value="cime">씨미</option>
          <option value="youtube">유튜브</option>
          <option value="twitcast">트윗캐스</option>
        </select>
      </div>
    </div>

    <label>방송 제목</label>
    <input id="title" placeholder="예: 마리링 ON AIR" />

    <label>상태 문구</label>
    <textarea id="message" placeholder="예: 현재 마리링이 씨미에서 방송중입니다 💗"></textarea>

    <div class="grid">
      <div>
        <label>씨미 링크</label>
        <input id="cimeUrl" value="https://ci.me/@mariring_love" />
      </div>
      <div>
        <label>유튜브 LIVE ID</label>
        <input id="youtubeId" placeholder="유튜브 영상 ID" />
      </div>
    </div>

    <label>트윗캐스 아이디</label>
    <input id="twitcastId" placeholder="예: mariring_love" />

    <div class="buttons">
      <button class="primary" onclick="saveState()">저장하기</button>
      <button class="secondary" onclick="loadState()">현재 상태 불러오기</button>
      <button class="danger" onclick="quickOff()">LIVE OFF</button>
      <button class="secondary" onclick="openBroadcast()">방송 페이지 보기</button>
    </div>

    <div class="status" id="statusText"></div>
    <div class="preview" id="previewBox"></div>
  </main>

  <script>
    const SCRIPT_URL = ""; // 여기에 Google Apps Script 웹앱 URL 넣기

    const DEFAULT_STATE = {
      isLive:false,
      platform:"cime",
      title:"마리링 ON AIR",
      message:"다음 방송 예정 💫",
      cimeUrl:"https://ci.me/@mariring_love",
      youtubeId:"",
      twitcastId:""
    };

    const $ = (id) => document.getElementById(id);

    function getFormState(){
      return {
        isLive: $("isLive").value === "true",
        platform: $("platform").value,
        title: $("title").value.trim() || "마리링 ON AIR",
        message: $("message").value.trim() || "다음 방송 예정 💫",
        cimeUrl: $("cimeUrl").value.trim() || "https://ci.me/@mariring_love",
        youtubeId: $("youtubeId").value.trim(),
        twitcastId: $("twitcastId").value.trim()
      };
    }

    function setFormState(state){
      $("isLive").value = String(!!state.isLive);
      $("platform").value = state.platform || "cime";
      $("title").value = state.title || "마리링 ON AIR";
      $("message").value = state.message || "다음 방송 예정 💫";
      $("cimeUrl").value = state.cimeUrl || "https://ci.me/@mariring_love";
      $("youtubeId").value = state.youtubeId || "";
      $("twitcastId").value = state.twitcastId || "";
      renderPreview();
    }

    function renderPreview(){
      const s = getFormState();
      $("previewBox").innerHTML = `
        <strong>${s.isLive ? '<span class="live-dot"></span>방송중' : '방송 아님'}</strong><br>
        ${s.title}<br>
        <span style="color:#b688a2">${s.message}</span><br>
        <small>${s.platform}</small>
      `;
    }

    async function saveState(){
      const state = getFormState();
      const password = $("password").value;

      if(!SCRIPT_URL){
        localStorage.setItem("lumibelleLiveState", JSON.stringify(state));
        $("statusText").textContent = "테스트 저장 완료! 단, 내 브라우저에서만 반영됩니다.";
        renderPreview();
        return;
      }

      try{
        const res = await fetch(SCRIPT_URL, {
          method:"POST",
          headers:{"Content-Type":"text/plain;charset=utf-8"},
          body: JSON.stringify({password, state})
        });
        const data = await res.json();
        if(!data.ok) throw new Error(data.error || "저장 실패");
        $("statusText").textContent = "저장 완료! 공개 사이트에 반영됩니다.";
      }catch(err){
        $("statusText").textContent = "저장 실패: " + err.message;
      }
      renderPreview();
    }

    async function loadState(){
      if(!SCRIPT_URL){
        const saved = localStorage.getItem("lumibelleLiveState");
        setFormState(saved ? JSON.parse(saved) : DEFAULT_STATE);
        $("statusText").textContent = "테스트 상태를 불러왔어요.";
        return;
      }
      try{
        const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
        const data = await res.json();
        setFormState(data.state || DEFAULT_STATE);
        $("statusText").textContent = "현재 상태를 불러왔어요.";
      }catch(err){
        $("statusText").textContent = "불러오기 실패: " + err.message;
      }
    }

    function quickOff(){
      $("isLive").value = "false";
      $("message").value = "다음 방송 예정 💫";
      saveState();
    }

    function openBroadcast(){
      window.open("broadcast/index.html", "_blank");
    }

    ["isLive","platform","title","message","cimeUrl","youtubeId","twitcastId"].forEach(id => {
      $(id).addEventListener("input", renderPreview);
      $(id).addEventListener("change", renderPreview);
    });

    loadState();
  </script>
</body>
</html>
