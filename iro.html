<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRO | Lumibelle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: #fff9fc;
      color: #8e7b8c;
    }

    a {
      text-decoration: none;
    }

    .iro-page {
      width: 100%;
      min-height: 100vh;
      padding: 44px 40px 48px;
    }

    .iro-wrap {
      max-width: 1380px;
      margin: 0 auto;
    }

    .iro-top {
      text-align: center;
      margin-bottom: 28px;
    }

    .iro-top h1 {
      margin: 0;
      font-size: clamp(54px, 7vw, 86px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #d97aa8;
    }

    .iro-top p {
      margin: 10px 0 0;
      font-size: 15px;
      font-weight: 700;
      color: #c59ab1;
    }

    .iro-card {
      background: #fffafb;
      border: 1.5px solid #f3dce8;
      border-radius: 34px;
      padding: 28px 30px 36px;
    }

    .iro-card-inner {
      display: flex;
      align-items: flex-start;
      gap: 34px;
    }

    .iro-image-box {
      flex: 0 0 460px;
    }

    .iro-image-box img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.35;
      object-fit: cover;
      border-radius: 28px;
      border: 1.5px solid #ebedf4;
      background: #fff;
    }

    .iro-info {
      flex: 1;
      padding-top: 6px;
      min-width: 0;
    }

    .iro-name-ko {
      margin: 0;
      font-size: clamp(60px, 6vw, 92px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #d97aa8;
    }

    .iro-name-en {
      margin: 10px 0 28px;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: #c59ab1;
    }

    .iro-profile {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .iro-line {
      font-size: 17px;
      line-height: 1.8;
      color: #8c7b89;
      word-break: keep-all;
    }

    .iro-line strong {
      color: #d97aa8;
      font-weight: 800;
    }

    .iro-sns {
      margin-top: 28px;
      margin-bottom: 26px;
    }

    .iro-sns a {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ff67b1;
      color: #fff;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .iro-sns a:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .iro-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .iro-btn {
      min-width: 130px;
      height: 52px;
      padding: 0 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      background: #fffafb;
      transition: all 0.18s ease;
    }

    .iro-btn.pink {
      color: #ff6aa9;
      border: 2px solid #ff84ba;
    }

    .iro-btn.purple {
      color: #a991ff;
      border: 2px solid #b49cff;
    }

    .iro-btn:hover {
      transform: translateY(-2px);
      background: #fff;
    }

    .iro-footer {
      text-align: center;
      margin-top: 52px;
      font-size: 14px;
      color: #c9aebd;
    }

    @media (max-width: 1100px) {
      .iro-card-inner {
        flex-direction: column;
      }

      .iro-image-box {
        flex: none;
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
      }

      .iro-info {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .iro-page {
        padding: 28px 18px 38px;
      }

      .iro-card {
        padding: 20px 18px 28px;
        border-radius: 24px;
      }

      .iro-card-inner {
        gap: 22px;
      }

      .iro-name-ko {
        font-size: 54px;
      }

      .iro-name-en {
        font-size: 22px;
        margin-bottom: 22px;
      }

      .iro-line {
        font-size: 15px;
        line-height: 1.7;
      }

      .iro-sns a {
        width: 54px;
        height: 54px;
      }

      .iro-btn {
        min-width: 118px;
        height: 48px;
        font-size: 16px;
      }

      .iro-footer {
        margin-top: 34px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="iro-page">
    <div class="iro-wrap">
      <section class="iro-top">
        <h1>IRO</h1>
        <p>이로</p>
      </section>

      <section class="iro-card">
        <div class="iro-card-inner">
          <div class="iro-image-box">
  <img src="iro.png" alt="이로 프로필 이미지" />
</div>

<div class="iro-sns">
  <a href="https://instagram.com/0w0.irochi" target="_blank" aria-label="이로 인스타그램">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/>
      <circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/>
    </svg>
  </a>
</div>

          <div class="iro-info">
            <h2 class="iro-name-ko">이로</h2>
            <div class="iro-name-en">IRO</div>

            <div class="iro-profile">
              <div class="iro-line"><strong>나마콜</strong> · 이로치</div>
              <div class="iro-line"><strong>담당 컬러</strong> · Angel Blue</div>
              <div class="iro-line"><strong>키워드</strong> · 청량 / 에너지</div>
              <div class="iro-line"><strong>캐치프라이즈</strong> · いろんな色の中で、イロチがいちばんでしょ？ εɞ&lt;3</div>
              <div class="iro-line"><strong>한마디</strong> · “네 세상의 색(色)을 완전히 바꿔 줄게!”</div>
              <div class="iro-line"><strong>호출 태그</strong> · #이로이로안노요</div>
              <div class="iro-line"><strong>체키메세 태그</strong> · #이로레맛있다니</div>
            </div>

            <div class="iro-sns">
              <a href="https://instagram.com/" target="_blank" aria-label="이로 인스타그램">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2"/>
                  <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/>
                  <circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/>
                </svg>
              </a>
            </div>

            <div class="iro-actions">
              <a href="member.html" class="iro-btn pink">멤버 목록</a>
              <a href="index.html#member" class="iro-btn purple">메인으로</a>
            </div>
          </div>
        </div>
      </section>

      <footer class="iro-footer">
        © 2026 Lumibelle All Rights Reserved.
      </footer>
    </div>
  </main>
</body>
</html>
