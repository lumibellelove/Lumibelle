<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>

<style>
body{font-family:sans-serif;background:#fffafc;margin:0}

/* 타이틀 */
.iro-title{
  text-align:center;
  margin-top:40px;
}
.iro-title h2{
  font-size:56px;
  color:#d77ca7;
  margin:0;
}
.iro-title p{
  margin-top:10px;
  color:#c99ab2;
  transform:translateX(-12px);
}

/* 이름 */
.iro-name{
  font-size:82px;
  font-weight:900;
  color:#d77ca7;
  text-align:center;
  transform:translateX(-26px);
  transition:.3s;
}

.iro-name.voice-active{
  color:#B2DEFF;
  text-shadow:
    0 0 4px rgba(255,255,255,.7),
    0 0 10px rgba(178,222,255,.22),
    0 0 18px rgba(178,222,255,.12);
  transform:translateX(-26px) translateY(-1px);
}

/* 보이스 */
.iro-voice{
  margin:20px auto;
  display:flex;
  justify-content:center;
}

.iro-voice button{
  padding:12px 28px;
  border-radius:999px;
  border:2px solid #B2DEFF;
  background:#fff;
  color:#B2DEFF;
  font-weight:800;
  cursor:pointer;
}

.iro-voice button.playing{
  background:#B2DEFF;
  color:#fff;
}

/* SNS */
.iro-sns-row{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.iro-sns-item{
  position:relative;
  width:72px;
  height:72px;
  border-radius:50%;
  background:#f4fbff;
  border:1px solid #d8efff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
}

.iro-sns-item img{
  width:72px;
  height:72px;
  transition:.3s;
}

.iro-sns-item:hover img{
  transform:scale(1.1);
}

/* 반짝 */
.iro-sns-item::before{
  content:"✨";
  position:absolute;
  top:-10px;
  right:-4px;
  font-size:18px;
  opacity:0;
}

.iro-sns-item:hover::before{
  animation:sparkle .7s;
}

@keyframes sparkle{
  0%{opacity:0;transform:scale(.4) translateY(6px)}
  50%{opacity:1;transform:scale(1.2) translateY(-2px)}
  100%{opacity:0;transform:scale(.9) translateY(-12px)}
}
</style>
</head>

<body>

<div class="iro-title">
  <h2>IRO</h2>
  <p>이로</p>
</div>

<h1 class="iro-name">이로</h1>

<div class="iro-voice">
  <button onclick="playVoice(this)">▶ VOICE</button>
</div>

<div class="iro-sns-row">
  <a class="iro-sns-item"><img src="img/iro-instagram.png"></a>
  <a class="iro-sns-item"><img src="img/iro-tiktok.png"></a>
  <a class="iro-sns-item"><img src="img/iro-x.png"></a>
</div>

<script>
let audios=[
  new Audio("voice/IroVoice1.mp3"),
  new Audio("voice/IroVoice2.mp3"),
  new Audio("voice/IroVoice3.mp3")
]

let last=-1
let current=null
let playing=false

function rand(){
  let i
  do{i=Math.floor(Math.random()*audios.length)}
  while(i===last)
  last=i
  return i
}

function playVoice(btn){
  let name=document.querySelector(".iro-name")

  if(playing){
    current.pause()
    playing=false
    btn.classList.remove("playing")
    btn.innerText="▶ VOICE"
    name.classList.remove("voice-active")
    return
  }

  let i=rand()
  current=audios[i]
  current.play()

  playing=true
  btn.classList.add("playing")
  btn.innerText="⏸ PAUSE"
  name.classList.add("voice-active")

  current.onended=()=>{
    playing=false
    btn.classList.remove("playing")
    btn.innerText="▶ VOICE"
    name.classList.remove("voice-active")
  }
}
</script>

</body>
</html>
