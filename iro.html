<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>
<link rel="stylesheet" href="style.css">

<style>
/* ===== IRO 전용 영역 ===== */
.iro-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
}

.iro-title {
  text-align: center;
  margin: 28px 0 22px;
}

.iro-title h2 {
  margin: 0;
  color: #d77ca7;
  font-size: 56px;
  line-height: 1;
  font-weight: 900;
}

.iro-title p {
  margin: 12px 0 0;
  color: #c99ab2;
  font-size: 16px;
  font-weight: 700;
}

.iro-card {
  background: #fff8fb;
  border: 1px solid #f2d8e7;
  border-radius: 32px;
  padding: 22px 24px 34px;
  min-height: 620px;
  box-sizing: border-box;
}

.iro-grid {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 28px;
  align-items: stretch;
}

.iro-photo {
  min-height: 520px;
  border-radius: 28px;
  border: 1px solid #f0dde8;
  background-color: #fff;
  background-image: url('iro.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.iro-info {
  display: flex;
  flex-direction: column;
  min-height: 100%;
}

.iro-name {
  margin: 4px 0 0;
  color: #d77ca7;
  font-size: 64px;
  line-height: 1;
  font-weight: 900;
}

.iro-en {
  margin: 12px 0 24px;
  color: #c99ab2;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.18em;
}

.iro-meta {
  color: #8f7183;
  font-size: 16px;
  line-height: 1.95;
}

.iro-meta div + div {
  margin-top: 8px;
}

.iro-meta strong {
  color: #c97ca8;
  font-weight: 900;
  margin-right: 4px;
}

.iro-bottom {
  margin-top: auto;
  padding-top: 28px;
}

.iro-sns {
  margin-bottom: 18px;
}

.iro-sns-link {
  display: inline-block;
  transition: transform 0.2s ease;
}

.iro-sns-link:hover {
  transform: translateY(-4px);
}

.iro-sns-link img {
  width: 100px;
  height: 100px;
  display: block;
}

.iro-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.iro-btn {
  padding: 12px 24px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 800;
  transition: transform 0.2s ease;
}

.iro-btn:hover {
  transform: translateY(-2px);
}

.iro-btn.pink {
  border: 2px solid #ff7fa6;
  color: #ff7fa6;
  background: #fff0f6;
}

.iro-btn.purple {
  border: 2px solid #a892f0;
  color: #a892f0;
  background: #f4f0ff;
}

@media (max-width: 980px) {
  .iro-grid {
    grid-template-columns: 1fr;
  }

  .iro-photo {
    min-height: 420px;
  }

  .iro-name {
    font-size: 52px;
  }

  .iro-bottom {
    margin-top: 20px;
    padding-top: 0;
  }

  .iro-sns-link img {
    width: 84px;
    height: 84px;
  }
}
</style>
</head>

<body>

      </div>
      <nav>

        <a href="info.html"><b>INFO</b><span>안내</span></a>
      </nav>
    </div>
  </div>
</header>

<main class="page-shell">

    </div>

    <section class="iro-card">

        <div class="iro-photo"></div>

        <div class="iro-info">
          <h3 class="iro-name">이로</h3>
          <div class="iro-en">IRO</div>

          <div class="iro-meta">
            <div><strong>나마콜</strong> · 이로치</div>

            <div><strong>캐치프라이즈</strong> · いろんな色の中で、イロチがいちばんでしょ？꒰ঌ ໒꒱</div>

          </div>

          <div class="iro-bottom">

              <a href="https://www.instagram.com/0w0.irochi/" target="_blank" class="iro-sns-link">

          </div>
        </div>
