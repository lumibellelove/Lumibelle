<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>
<link rel="stylesheet" href="style.css">

<style>
.iro-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
}

.iro-title {
  text-align: center;
  margin: 28px 0 22px;
}

.iro-title h2 {
  margin: 0;
  color: #d77ca7;
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
}

.iro-title p {
  margin: 10px 0 0;
  color: #c99ab2;
  font-size: 16px;
  font-weight: 700;
}

/* 1. 카드의 전체 높이를 키우고, 내부 요소를 정중앙에 배치 */
.iro-card {
  background: #fff8fb;
  border: 1px solid #f2d8e7;
  border-radius: 32px;
  padding: 60px; /* 사방 여백을 더 넓혀 답답함을 해소 */
  min-height: 850px; /* 카드를 시원하게 길게 만듭니다 */
  display: flex;
  align-items: center; /* [핵심] 사진과 글자를 세로 중앙으로 정렬 */
  box-sizing: border-box;
}

/* 2. 전체 그리드 설정: 오른쪽 여백(0.3fr) 확보 및 IRO 안쪽 이동 */
.iro-grid {
  display: grid;
  /* 사진 500px 고정, 글자 영역 0.7 비율, 오른쪽 빈 여백 0.3 비율 */
  grid-template-columns: 500px 0.7fr 0.3fr; 
  gap: 60px; /* 사진과 글자 사이의 넉넉한 간격 */
  width: 100%;
  align-items: center; /* 내부 요소들끼리 높이를 맞춤 */
}

/* 3. 사진 영역 */
.iro-photo {
  width: 500px;
  height: 750px; /* 사진을 아래로 길게 쭉 뻗게 만듭니다 */
  border-radius: 28px;
  background-image: url('iro.png'); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border: 1px solid #f0dde8;
  background-color: #fff;
}

/* 4. 정보 영역 */
.iro-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 20px;
}

.iro-name {
  font-size: 78px;
  font-weight: 900;
  color: #d77ca7;
  margin: 0;
  line-height: 1;
}

.iro-en {
  font-size: 24px;
  letter-spacing: 0.2em; /* 자간을 넓혀 고급스럽게 */
  color: #c99ab2;
  margin: 12px 0 35px 15px; /* IRO를 안쪽으로 밀기 */
  font-weight: 800;
}

.iro-meta {
  font-size: 17px;
  line-height: 2.3; /* 줄 간격을 시원하게 벌려 가독성 확보 */
  color: #8f7183;
}

.iro-meta div {
  margin-bottom: 8px; /* 각 정보 줄 사이 간격 */
}

/* [중요] 나마콜 등 강조 포인트: 형광펜 삭제, 글자 색상만 변경 */
.iro-meta strong {
  color: #C97CA8; /* 요청하신 컬러코드 적용 */
  font-weight: 900;
  /* 형광펜 배경색 삭제 */
}

/* 5. 하단 인스타 및 버튼 */
.iro-bottom {
  margin-top: 40px; /* 정보 뭉치와 아이콘 사이 간격 */
}

.iro-sns img {
  width: 100px; /* 원하셨던 큼직한 100px 아이콘 */
  height: 100px;
  display: block;
}

.iro-actions {
  display: flex;
  gap: 15px;
  margin-top: 25px;
}

.iro-btn {
  padding: 13px 26px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.iro-btn.pink {
  border: 2px solid #ff6fa5;
  color: #ff6fa5;
  background: #fff;
}

.iro-btn.purple {
  border: 2px solid #a892f0;
  color: #a892f0;
  background: #fff;
}

.iro-btn:hover {
  transform: translateY(-2px);
}

@media (max-width: 900px) {
  .iro-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .iro-photo {
    min-height: 420px;
  }

  .iro-name {
    font-size: 56px;
  }

  .iro-en {
    font-size: 18px;
  }

  .iro-sns img {
    width: 76px;
    height: 76px;
  }
}
</style>
</head>
