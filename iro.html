<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이로 | Lumibelle</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .iro-page-wrap {
      max-width: 1280px;
      margin: 0 auto;
    }

    .iro-title {
      text-align: center;
      margin: 28px 0 22px;
    }

    .iro-title h2 {
      margin: 0;
      color: #d77ca7;
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
    }

    .iro-title p {
      margin: 10px 0 0;
      color: #c99ab2;
      font-size: 16px;
      font-weight: 700;
    }

    .iro-card {
      background: #fff8fb;
      border: 1px solid #f2d8e7;
      border-radius: 32px;
      padding: 48px;
      min-height: 780px;
      box-sizing: border-box;
      margin-bottom: 50px;
    }

    .iro-grid {
      display: grid;
      grid-template-columns: 460px minmax(0, 1fr);
      gap: 42px;
      align-items: flex-start;
    }

    .iro-photo {
      width: 100%;
      max-width: 460px;
      aspect-ratio: 2 / 3;
      border-radius: 28px;
      background-image: url('iro.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid #f0dde8;
      background-color: #fff;
      box-sizing: border-box;
    }

    .iro-info-section {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding-top: 18px;
    }

    .iro-name-section {
      margin-bottom: 26px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      text-align: left;
    }

    .iro-name {
      font-size: 82px;
      font-weight: 900;
      color: #d77ca7;
      margin: 0;
      line-height: 0.95;
    }

    .iro-en {
  font-size: 20px;
  letter-spacing: 0.24em;
  color: #c99ab2;
  margin-top: 12px;
  font-weight: 800;
  width: 100%;
  text-align: center;
}

    .iro-meta {
      width: 100%;
      max-width: 720px;
      font-size: 17px;
      line-height: 2.15;
      color: #8f7183;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .iro-meta strong {
      color: #c97ca8;
      font-weight: 900;
    }

    .iro-bottom {
      margin-top: 34px;
    }

    .iro-sns {
      margin-bottom: 24px;
      display: inline-block;
    }

    .iro-sns a {
      display: inline-block;
      width: 84px;
      height: 84px;
      line-height: 0;
      border-radius: 50%;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .iro-sns a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 111, 165, 0.18);
      opacity: 0.92;
    }

    .iro-sns img {
      width: 84px;
      height: 84px;
      display: block;
    }

    .iro-actions {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .iro-btn {
      min-width: 156px;
      height: 68px;
      padding: 0 28px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      writing-mode: horizontal-tb;
      text-orientation: initial;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .iro-btn.pink {
      border: 2px solid #ff6fa5;
      color: #ff6fa5;
    }

    .iro-btn.purple {
      border: 2px solid #a892f0;
      color: #a892f0;
    }

    .iro-btn.pink:hover {
      transform: translateY(-2px);
      background: #ff6fa5;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(255, 111, 165, 0.22);
    }

    .iro-btn.purple:hover {
      transform: translateY(-2px);
      background: #a892f0;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(168, 146, 240, 0.22);
    }

    @media (max-width: 900px) {
      .iro-card {
        padding: 36px 28px;
        min-height: auto;
      }

      .iro-grid {
        grid-template-columns: 1fr;
        gap: 28px;
        text-align: center;
      }

      .iro-photo {
        max-width: 430px;
        margin: 0 auto;
      }

      .iro-info-section {
        align-items: center;
        padding-top: 0;
      }

      .iro-name-section {
        align-items: center;
        text-align: center;
      }

      .iro-name {
        font-size: 58px;
      }

      .iro-en {
        font-size: 20px;
        margin-top: 10px;
      }

      .iro-meta {
        text-align: center;
      }

      .iro-sns {
        display: block;
      }

      .iro-sns a {
        margin: 0 auto;
      }

      .iro-actions {
        justify-content: center;
      }

      .iro-btn {
        min-width: 120px;
        height: auto;
        padding: 14px 24px;
      }
    }

    @media (max-width: 640px) {
      .iro-title h2 {
        font-size: 44px;
      }

      .iro-card {
        padding: 24px;
        border-radius: 24px;
      }

      .iro-photo {
        max-width: 100%;
        border-radius: 22px;
      }

      .iro-name {
        font-size: 46px;
      }

      .iro-en {
        font-size: 18px;
        letter-spacing: 0.2em;
      }

      .iro-meta {
        font-size: 15px;
        line-height: 2;
      }

      .iro-actions {
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }

      .iro-btn {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
