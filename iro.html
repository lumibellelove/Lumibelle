<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>

<style>
body{font-family:sans-serif;background:#fffafc;margin:0}

/* 이름 */
.iro-name{
  font-size:72px;
  font-weight:900;
  text-align:center;
  margin-top:40px;
  color:#d77ca7;
  transition:all .3s;
}

.iro-name.voice-active{
  color:#B2DEFF;
  text-shadow:
    0 0 10px rgba(178,222,255,.6),
    0 0 20px rgba(178,222,255,.4),
    0 0 40px rgba(178,222,255,.2);
}

/* 보이스 버튼 */
.iro-voice{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:30px auto;
  padding:14px 26px;
  border-radius:999px;
  border:2px solid #B2DEFF;
  background:#fff;
  color:#B2DEFF;
  font-weight:800;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.iro-voice.playing{
  background:#B2DEFF;
  color:#fff;
}

.iro-sound-bars{
  display:none;
  gap:3px;
}

.iro-sound-bars span{
  width:3px;
  height:12px;
  background:currentColor;
  animation:bars .9s infinite;
}

.iro-voice.playing .iro-sound-bars{
  display:flex;
}

@keyframes bars{
  0%,100%{transform:scaleY(.4)}
  50%{transform:scaleY(1)}
}

/* SNS */
.iro-sns-row{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.iro-sns-item{
  position:relative;
  width:72px;
  height:72px;
  border-radius:50%;
  background:#f4fbff;
  border:1px solid #d8efff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.iro-sns-item img{
  width:72px;
  height:72px;
  filter:
    brightness(0)
    invert(88%)
    sepia(12%)
    saturate(600%)
    hue-rotate(170deg);
  transition:.3s;
}

.iro-sns-item:hover{
  background:#B2DEFF;
}

.iro-sns-item:hover img{
  filter:brightness(0) invert(100%);
  transform:scale(1.1);
}

/* 반짝 */
.iro-sns-item::before{
  content:"✨";
  position:absolute;
  top:6px;
  right:6px;
  opacity:0;
}

.iro-sns-item:hover::before{
  animation:sparkle .7s;
}

@keyframes sparkle{
  0%{opacity:0;transform:scale(.4)}
  50%{opacity:1;transform:scale(1.2)}
  100%{opacity:0;transform:scale(.8) translateY(-10px)}
}

/* 물결 */
.iro-sns-item::after{
  content:"";
  position:absolute;
  inset:50%;
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.6);
  transform:translate(-50%,-50%) scale(0);
}

.iro-sns-item:active::after{
  animation:ripple .6s;
}

@keyframes ripple{
  to{
    transform:translate(-50%,-50%) scale(8);
    opacity:0;
  }
}

.iro-color-point{
  color:#B2DEFF;
  font-weight:900;
}
</style>
</head>

<body>

<h1 class="iro-name">이로</h1>

<!-- 보이스 -->
<div style="text-align:center">
<button class="iro-voice" onclick="playVoice(this)">
  <span class="label">▶ VOICE</span>
  <span class="iro-sound-bars">
    <span></span><span></span><span></span>
  </span>
</button>

<p id="text">버튼을 눌러 이로의 보이스를 들어보세요 ✨</p>

<audio src="voice/IroVoice1.mp3"></audio>
<audio src="voice/IroVoice2.mp3"></audio>
<audio src="voice/IroVoice3.mp3"></audio>
</div>

<!-- 컬러 -->
<p style="text-align:center;margin-top:20px">
담당컬러 :
<span class="iro-color-point">Angel Blue</span>
</p>

<!-- SNS -->
<div class="iro-sns-row">

  <a href="https://www.instagram.com/0w0.irochi/" target="_blank" class="iro-sns-item">
    <img src="img/iro-instagram.png" alt="Instagram">
  </a>

  <a href="#" class="iro-sns-item">
    <img src="img/iro-tiktok.png" alt="TikTok">
  </a>

  <a href="#" class="iro-sns-item">
    <img src="img/iro-x.png" alt="X">
  </a>

</div>

<script>
let audios=document.querySelectorAll("audio")
let last=-1
let current=null
let playing=false

function rand(){
  let i
  do{i=Math.floor(Math.random()*audios.length)}
  while(i===last)
  last=i
  return i
}

function playVoice(btn){
  let name=document.querySelector(".iro-name")
  let label=btn.querySelector(".label")

  if(playing){
    current.pause()
    playing=false
    btn.classList.remove("playing")
    name.classList.remove("voice-active")
    label.textContent="▶ VOICE"
    return
  }

  if(current && current.currentTime>0 && !current.ended){
    current.play()
    playing=true
    btn.classList.add("playing")
    name.classList.add("voice-active")
    label.textContent="⏸ PAUSE"
    return
  }

  let i=rand()
  current=audios[i]
  current.currentTime=0
  current.play()

  playing=true
  btn.classList.add("playing")
  name.classList.add("voice-active")
  label.textContent="⏸ PAUSE"

  current.onended=()=>{
    playing=false
    btn.classList.remove("playing")
    name.classList.remove("voice-active")
    label.textContent="▶ VOICE"
  }
}
</script>

</body>
</html>
