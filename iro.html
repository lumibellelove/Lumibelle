<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>IRO | Lumibelle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', sans-serif;
      background: #fff8fc;
      color: #8d7082;
    }

    .wrap {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* 프로필 영역 */
    .iro-grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 40px;
      margin-top: 60px;
      align-items: center;
    }

    .iro-photo {
      width: 100%;
      aspect-ratio: 2/3;
      border-radius: 28px;
      background-image: url('../img/member/iro/iro.png');
      background-size: cover;
      background-position: center;
      border: 1px solid #f0dde8;
    }

    .iro-name {
      font-size: 70px;
      font-weight: 900;
      color: #d77ca7;
      margin: 0;
    }

    .iro-en {
      font-size: 20px;
      letter-spacing: 0.2em;
      margin-top: 10px;
      color: #c99ab2;
    }

    /* 영상 영역 */
    .iro-movie-section {
      margin-top: 80px;
    }

    .iro-movie-title {
      font-size: 32px;
      font-weight: 900;
      color: #d77ca7;
      margin-bottom: 20px;
    }

    .iro-movie-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .iro-movie-thumb {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #f0dde8;
    }

    .iro-movie-thumb img {
      width: 100%;
      display: block;
    }

    /* 🔥 MORE VIDEO 버튼 */
    .iro-movie-more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .member-more-btn {
      min-width: 240px;
      height: 62px;
      border-radius: 999px;
      background: #f8dce9;
      color: #c97ca8;
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #efc6dc;
      transition: 0.2s;
    }

    .member-more-btn:hover {
      transform: translateY(-2px);
      background: #f4d0e1;
      box-shadow: 0 12px 24px rgba(215,124,167,0.12);
    }

    @media (max-width: 800px) {
      .iro-grid {
        grid-template-columns: 1fr;
      }

      .iro-name {
        font-size: 48px;
      }

      .iro-movie-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="wrap">

  <!-- 프로필 -->
  <div class="iro-grid">
    <div class="iro-photo"></div>

    <div>
      <h1 class="iro-name">IRO</h1>
      <div class="iro-en">이로</div>
    </div>
  </div>

  <!-- 영상 -->
  <div class="iro-movie-section">
    <div class="iro-movie-title">VIDEO</div>

    <div class="iro-movie-box">
      <div class="iro-movie-thumb">
        <img src="../img/member/iro/iro.png">
      </div>

      <div class="iro-movie-thumb">
        <img src="../img/member/iro/iro.png">
      </div>
    </div>

    <!-- 🔥 여기 중요 -->
    <div class="iro-movie-more-wrap">
      <a href="../video.html" class="member-more-btn">
        MORE VIDEO
      </a>
    </div>

  </div>

</div>

</body>
</html>
