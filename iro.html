<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>

<style>

/* 전체 */
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff8fb;
}

.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* 카드 */
.iro-card {
  background: #fff;
  border-radius: 32px;
  border: 1px solid #f2d8e7;
  padding: 50px;
}

/* 레이아웃 */
.iro-grid {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 60px;
  align-items: center;
}

/* 사진 */
.iro-photo {
  width: 100%;
  aspect-ratio: 3 / 4;
  background: url('iro.png') center/cover;
  border-radius: 28px;
}

/* 텍스트 */
.iro-name {
  font-size: 72px;
  color: #d77ca7;
  font-weight: 900;
  margin: 0;
}

.iro-en {
  font-size: 20px;
  letter-spacing: 0.24em;
  color: #c99ab2;
  margin-top: 12px;
  font-weight: 800;
}

.iro-meta {
  margin-top: 20px;
  line-height: 2.2;
  color: #8f7183;
}

.iro-meta strong {
  color: #c97ca8;
}

/* SNS */
.iro-sns-row {
  display: flex;
  gap: 14px;
  margin-top: 20px;
}

.iro-sns-item img {
  width: 64px;
  height: 64px;
}

/* 영상 */
.iro-movie {
  margin-top: 30px;
}

.iro-movie-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.iro-movie-card {
  border-radius: 22px;
  overflow: hidden;
  background: #fff;
  border: 1px solid #f0dde8;
  cursor: pointer;
}

.iro-movie-thumb {
  position: relative;
  aspect-ratio: 16/9;
}

.iro-movie-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.iro-play {
  position: absolute;
  right: 12px;
  bottom: 12px;
  background: #ff6fa5;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.iro-movie-info {
  padding: 12px;
}

.iro-movie-info strong {
  color: #c97ca8;
}

/* MORE */
.iro-more {
  text-align: center;
  margin-top: 20px;
}

.iro-more a {
  background: #f8dce9;
  padding: 14px 40px;
  border-radius: 999px;
  text-decoration: none;
  color: #c97ca8;
  font-weight: 900;
}

/* 버튼 */
.iro-actions {
  margin-top: 30px;
  display: flex;
  gap: 20px;
}

.iro-btn {
  padding: 14px 30px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 800;
}

.pink { border: 2px solid #ff6fa5; color: #ff6fa5; }
.purple { border: 2px solid #a892f0; color: #a892f0; }

/* 모달 */
#videoModal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#videoModal iframe {
  width: 80%;
  height: 60%;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  color:#fff;
  font-size:30px;
  cursor:pointer;
}

/* 모바일 */
@media (max-width:900px){
  .iro-grid{
    grid-template-columns:1fr;
  }
  .iro-movie-grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="wrap">
  <div class="iro-card">

    <div class="iro-grid">

      <div class="iro-photo"></div>

      <div>

        <h1 class="iro-name">이로</h1>
        <div class="iro-en">IRO</div>

        <div class="iro-meta">
          <div><strong>나마콜</strong> · 이로치</div>
          <div><strong>담당 컬러</strong> · Angel Blue</div>
          <div><strong>키워드</strong> · 청량 / 에너지</div>
          <div><strong>캐치프라이즈</strong> · いろんな色の中で、イロチがいちばんでしょ？꒰ঌ ໒꒱</div>
          <div><strong>한마디</strong> · “네 세상의 색(色)을 완전히 바꿔 줄게!”</div>
        </div>

        <!-- SNS -->
        <div class="iro-sns-row">
          <a href="https://www.instagram.com/0w0.irochi/" target="_blank">
            <img src="img/instagram.png">
          </a>
          <img src="img/instagram.png">
          <img src="img/instagram.png">
        </div>

        <!-- 영상 -->
        <div class="iro-movie">

          <div class="iro-movie-grid">

            <div class="iro-movie-card" onclick="openVideo('sEHQNzj_cmc')">
              <div class="iro-movie-thumb">
                <img src="iro.png">
                <div class="iro-play">▶</div>
              </div>
              <div class="iro-movie-info">
                <strong>대표 직캠</strong>
                <div>Click to Play</div>
              </div>
            </div>

            <a href="https://youtu.be/sEHQNzj_cmc" target="_blank" class="iro-movie-card">
              <div class="iro-movie-thumb">
                <img src="iro.png">
                <div class="iro-play">▶</div>
              </div>
              <div class="iro-movie-info">
                <strong>YouTube 이동</strong>
                <div>Watch on YouTube</div>
              </div>
            </a>

          </div>

          <div class="iro-more">
            <a href="iro-video.html">MORE VIDEO</a>
          </div>

        </div>

        <!-- 버튼 -->
        <div class="iro-actions">
          <a href="member.html" class="iro-btn pink">멤버 목록</a>
          <a href="index.html#member" class="iro-btn purple">메인으로</a>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- 모달 -->
<div id="videoModal">
  <div class="close" onclick="closeVideo()">×</div>
  <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
function openVideo(id){
  document.getElementById("videoModal").style.display="flex";
  document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+id+"?autoplay=1";
}
function closeVideo(){
  document.getElementById("videoModal").style.display="none";
  document.getElementById("videoFrame").src="";
}
</script>

</body>
</html>
