<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>
<link rel="stylesheet" href="style.css">

<style>
.iro-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
}

.iro-title {
  text-align: center;
  margin: 28px 0 22px;
}

.iro-title h2 {
  margin: 0;
  color: #d77ca7;
  font-size: 56px;
  font-weight: 900;
}

.iro-title p {
  margin: 10px 0 0;
  color: #c99ab2;
  font-size: 16px;
  font-weight: 700;
}

.iro-card {
  background: #fff8fb;
  border: 1px solid #f2d8e7;
  border-radius: 32px;
  padding: 60px 80px 60px 60px;
  display: flex;
  align-items: center;
  margin-bottom: 50px;
}

.iro-grid {
  display: grid;
  grid-template-columns: minmax(320px, 420px) 180px 1fr;
  gap: 30px;
  width: 100%;
  align-items: center;
}

.iro-photo {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 2 / 3;
  border-radius: 28px;
  background-image: url('iro.png');
  background-size: cover;
  background-position: center;
}

.iro-name-section {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.iro-name {
  font-size: 72px;
  font-weight: 900;
  color: #d77ca7;
  margin: 0;
}

.iro-en {
  font-size: 24px;
  letter-spacing: 0.25em;
  color: #c99ab2;
  margin-top: 10px;
}

.iro-meta {
  font-size: 16px;
  line-height: 2.2;
  color: #8f7183;
  word-break: keep-all;
}

.iro-bottom {
  margin-top: 30px;
}

.iro-sns img {
  width: 80px;
}

.iro-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.iro-btn {
  padding: 12px 22px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
}

.iro-btn.pink {
  border: 2px solid #ff6fa5;
  color: #ff6fa5;
}

.iro-btn.purple {
  border: 2px solid #a892f0;
  color: #a892f0;
}

@media (max-width: 1100px) {
  .iro-grid {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .iro-photo {
    margin: 0 auto;
  }
}
</style>
</head>

<body>

<header>
  <div class="wrap">
    <div class="header-box">
      <div class="logo">
        <h1>Lumibelle</h1>
      </div>
    </div>
  </div>
</header>

<main class="page-shell">
  <div class="wrap iro-page-wrap">

    <div class="iro-title">
      <h2>IRO</h2>
      <p>이로</p>
    </div>

    <section class="iro-card">
      <div class="iro-grid">

        <div class="iro-photo"></div>

        <div class="iro-name-section">
          <h3 class="iro-name">이로</h3>
          <div class="iro-en">IRO</div>
        </div>

        <div>
          <div class="iro-meta">
            <div><strong>나마콜</strong> · 이로치</div>
            <div><strong>담당 컬러</strong> · Angel Blue</div>
            <div><strong>키워드</strong> · 청량 / 에너지</div>
            <div><strong>한마디</strong> · 네 세상의 색을 바꿔줄게!</div>
          </div>

          <div class="iro-bottom">
            <div class="iro-sns">
              <img src="img/instagram.png">
            </div>

            <div class="iro-actions">
              <a href="member.html" class="iro-btn pink">멤버 목록</a>
              <a href="index.html" class="iro-btn purple">메인으로</a>
            </div>
          </div>
        </div>

      </div>
    </section>

  </div>
</main>

<footer>© 2026 Lumibelle</footer>

</body>
</html>
