<style>

/* SNS 동그라미 버튼 */
.sns-buttons {
  display: flex;
  gap: 16px;
  margin-top: 20px;
  justify-content: center;
}

.sns-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;

  background: linear-gradient(180deg, #b2deff, #8fd0ff);
  box-shadow: 0 8px 18px rgba(178, 222, 255, 0.25);

  transition: transform 0.18s ease, opacity 0.18s ease;
}

.sns-btn:hover {
  transform: translateY(-4px);
  opacity: 0.95;
}

.sns-btn img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

/* 하단 버튼 */
.back-group {
  margin-top: 30px;
  display: flex;
  gap: 12px;
  justify-content: center;
}

.back-btn {
  padding: 12px 26px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 800;
  font-size: 14px;
  transition: all 0.2s ease;
}

/* 멤버 목록 */
.back-btn.pink {
  border: 1.5px solid #f0bfd4;
  color: #e27aa9;
  background: #fff;
}

/* 메인으로 */
.back-btn.purple {
  border: 1.5px solid #d4c0f0;
  color: #9f7ae2;
  background: #fff;
}

.back-btn:hover {
  transform: translateY(-2px);
  background: #fff0f7;
}

</style>
</head>
