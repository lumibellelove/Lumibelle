<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>

<style>
body{font-family:sans-serif;background:#fffafc;margin:0}

/* 타이틀 */
.iro-title{text-align:center;margin-top:40px}
.iro-title h2{font-size:56px;color:#d77ca7;margin:0}
.iro-title p{margin-top:10px;color:#c99ab2;transform:translateX(-12px)}

/* 전체 카드 */
.iro-card{
  max-width:1100px;
  margin:40px auto;
  padding:40px;
  border-radius:32px;
  background:#fff8fb;
  border:1px solid #f2d8e7;
}

/* 그리드 */
.iro-grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:40px;
  align-items:center;
}

/* 사진 */
.iro-photo{
  width:100%;
  aspect-ratio:2/3;
  border-radius:28px;
  background:url('iro.png') center/cover;
}

/* 이름 */
.iro-name{
  font-size:72px;
  font-weight:900;
  color:#d77ca7;
  text-align:center;
  transform:translateX(-26px);
}

.iro-name.voice-active{
  color:#B2DEFF;
  text-shadow:
    0 0 4px rgba(255,255,255,.7),
    0 0 10px rgba(178,222,255,.22),
    0 0 18px rgba(178,222,255,.12);
}

/* 영어 */
.iro-en{
  text-align:center;
  letter-spacing:0.2em;
  color:#c99ab2;
  margin-top:10px;
}

/* 버튼 */
.iro-voice{
  display:block;
  margin:20px auto;
  padding:12px 30px;
  border-radius:999px;
  border:2px solid #B2DEFF;
  background:#fff;
  color:#B2DEFF;
  font-weight:800;
  cursor:pointer;
}

.iro-voice.playing{
  background:#B2DEFF;
  color:#fff;
}

/* 상세 박스 (🔥 가로 길이 해결 핵심) */
.iro-detail-block{
  max-width:520px;
  margin:20px auto;
  padding:16px;
  border-radius:20px;
  background:#fff;
  border:1px solid #f3dbe7;
}

/* 상세 내용 */
.iro-detail-row{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:10px;
  font-size:15px;
  margin-bottom:6px;
}

.iro-detail-label{color:#c97ca8;font-weight:900}
.iro-color-point{color:#B2DEFF;font-weight:900}

/* SNS (🔥 작게 + 정리) */
.iro-sns-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.iro-sns-item{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#f4fbff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.iro-sns-item img{
  width:58px;
  height:58px;
}

/* 버튼 */
.iro-actions{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.iro-btn{
  padding:14px 26px;
  border-radius:999px;
  font-weight:800;
  text-decoration:none;
}

.pink{border:2px solid #ff6fa5;color:#ff6fa5}
.purple{border:2px solid #a892f0;color:#a892f0}

</style>
</head>

<body>

<div class="iro-title">
  <h2>IRO</h2>
  <p>이로</p>
</div>

<div class="iro-card">
  <div class="iro-grid">

    <div class="iro-photo"></div>

    <div>

      <h1 class="iro-name">이로</h1>
      <div class="iro-en">IRO</div>

      <button class="iro-voice" onclick="playVoice(this)">▶ VOICE</button>

      <div class="iro-detail-block">
        <div class="iro-detail-row">
          <div class="iro-detail-label">담당 컬러</div>
          <div class="iro-color-point">Angel Blue</div>
        </div>
        <div class="iro-detail-row">
          <div class="iro-detail-label">나마콜</div>
          <div>이로치 👼💎</div>
        </div>
        <div class="iro-detail-row">
          <div class="iro-detail-label">호출 태그</div>
          <div>#이로이로안노요</div>
        </div>
        <div class="iro-detail-row">
          <div class="iro-detail-label">체키 메시</div>
          <div>#이로케맛있다니</div>
        </div>
      </div>

      <!-- SNS 순서: X → 인스타 → 틱톡 -->
      <div class="iro-sns-row">
        <div class="iro-sns-item"><img src="img/iro-x.png"></div>
        <div class="iro-sns-item"><img src="img/iro-instagram.png"></div>
        <div class="iro-sns-item"><img src="img/iro-tiktok.png"></div>
      </div>

      <div class="iro-actions">
        <a href="#" class="iro-btn pink">멤버 목록</a>
        <a href="#" class="iro-btn purple">메인으로</a>
      </div>

    </div>

  </div>
</div>

<script>
let audios=[
  new Audio("voice/IroVoice1.mp3"),
  new Audio("voice/IroVoice2.mp3"),
  new Audio("voice/IroVoice3.mp3")
]

let last=-1
let current=null
let playing=false

function rand(){
  let i
  do{i=Math.floor(Math.random()*audios.length)}
  while(i===last)
  last=i
  return i
}

function playVoice(btn){
  let name=document.querySelector(".iro-name")

  if(playing){
    current.pause()
    playing=false
    btn.classList.remove("playing")
    btn.innerText="▶ VOICE"
    name.classList.remove("voice-active")
    return
  }

  let i=rand()
  current=audios[i]
  current.play()

  playing=true
  btn.classList.add("playing")
  btn.innerText="⏸ PAUSE"
  name.classList.add("voice-active")

  current.onended=()=>{
    playing=false
    btn.classList.remove("playing")
    btn.innerText="▶ VOICE"
    name.classList.remove("voice-active")
  }
}
</script>

</body>
</html>
