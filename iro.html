<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>

<style>
body{font-family:sans-serif;background:#fffafc;margin:0}

/* ===== HEADER ===== */
header{
  background:#fff;
  border-bottom:1px solid #f2d8e7;
  padding:14px 0;
}
.wrap{max-width:1200px;margin:0 auto;padding:0 20px}
.header-box{display:flex;align-items:center;justify-content:space-between}
.logo h1{margin:0;color:#d77ca7}
nav a{margin:0 10px;text-decoration:none;color:#c97ca8;font-weight:700}

/* ===== TITLE ===== */
.iro-title{text-align:center;margin:30px 0}
.iro-title h2{margin:0;color:#d77ca7;font-size:56px}
.iro-title p{margin-top:10px;color:#c99ab2;transform:translateX(-12px)}

/* ===== CARD ===== */
.iro-card{
  max-width:1100px;
  margin:0 auto 40px;
  padding:40px;
  border-radius:32px;
  background:#fff8fb;
  border:1px solid #f2d8e7;
}

.iro-grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:40px;
}

/* ===== IMAGE ===== */
.iro-photo{
  width:100%;
  aspect-ratio:2/3;
  border-radius:28px;
  background:url('iro.png') center/cover;
}

/* ===== NAME ===== */
.iro-name{
  font-size:72px;
  font-weight:900;
  color:#d77ca7;
  text-align:center;
  transform:translateX(-26px);
}

.iro-name.voice-active{
  color:#B2DEFF;
  text-shadow:
    0 0 4px rgba(255,255,255,.7),
    0 0 10px rgba(178,222,255,.22),
    0 0 18px rgba(178,222,255,.12);
}

.iro-en{text-align:center;color:#c99ab2;letter-spacing:0.2em;margin-top:10px}

/* ===== VOICE ===== */
.iro-voice{
  display:block;
  margin:20px auto;
  padding:12px 30px;
  border-radius:999px;
  border:2px solid #B2DEFF;
  background:#fff;
  color:#B2DEFF;
  font-weight:800;
  cursor:pointer;
}
.iro-voice.playing{background:#B2DEFF;color:#fff}

/* ===== KEYWORDS ===== */
.iro-keywords{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0 20px;
}
.iro-keyword{
  border:1px solid #f0dde8;
  padding:6px 14px;
  border-radius:999px;
  color:#c97ca8;
  font-weight:800;
}

/* ===== MESSAGE ===== */
.iro-message{text-align:center;margin-bottom:20px}
.iro-message strong{color:#b86d92;font-size:20px}

/* ===== DETAIL ===== */
.iro-detail-block{
  max-width:520px;
  margin:0 auto;
  padding:16px;
  border-radius:20px;
  background:#fff;
  border:1px solid #f3dbe7;
}

.iro-detail-row{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:10px;
  margin-bottom:6px;
}
.iro-detail-label{color:#c97ca8;font-weight:900}
.iro-color-point{color:#B2DEFF;font-weight:900}

/* ===== SNS ===== */
.iro-sns-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.iro-sns-item{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#f4fbff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.iro-sns-item img{width:58px;height:58px}

/* ===== BUTTONS ===== */
.iro-actions{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}
.iro-btn{
  padding:14px 26px;
  border-radius:999px;
  font-weight:800;
  text-decoration:none;
}
.pink{border:2px solid #ff6fa5;color:#ff6fa5}
.purple{border:2px solid #a892f0;color:#a892f0}

/* ===== MOVIE ===== */
.iro-movie{
  max-width:1100px;
  margin:0 auto 60px;
  padding:30px;
  border-radius:32px;
  background:#fff8fb;
  border:1px solid #f2d8e7;
  text-align:center;
}

iframe{width:100%;aspect-ratio:16/9;border:0}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .iro-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<div class="wrap header-box">
  <div class="logo"><h1>Lumibelle</h1></div>
  <nav>
    <a href="#">TOP</a>
    <a href="#">MEMBER</a>
  </nav>
</div>
</header>

<div class="iro-title">
  <h2>IRO</h2>
  <p>이로</p>
</div>

<div class="iro-card">
<div class="iro-grid">

<div class="iro-photo"></div>

<div>

<h1 class="iro-name">이로</h1>
<div class="iro-en">IRO</div>

<button class="iro-voice" onclick="playVoice(this)">▶ VOICE</button>

<div class="iro-keywords">
  <span class="iro-keyword">#4차원</span>
  <span class="iro-keyword">#맑눈광</span>
  <span class="iro-keyword">#천사같은악마</span>
</div>

<div class="iro-message">
<strong>“네 세상의 색을 완전히 바꿔 줄게!”</strong>
</div>

<div class="iro-detail-block">
  <div class="iro-detail-row"><div class="iro-detail-label">담당 컬러</div><div class="iro-color-point">Angel Blue</div></div>
  <div class="iro-detail-row"><div class="iro-detail-label">나마콜</div><div>이로치 👼💎</div></div>
  <div class="iro-detail-row"><div class="iro-detail-label">호출 태그</div><div>#이로이로안노요</div></div>
  <div class="iro-detail-row"><div class="iro-detail-label">체키 메시</div><div>#이로케맛있다니</div></div>
</div>

<!-- SNS -->
<div class="iro-sns-row">
  <div class="iro-sns-item"><img src="img/iro-x.png"></div>
  <div class="iro-sns-item"><img src="img/iro-instagram.png"></div>
  <div class="iro-sns-item"><img src="img/iro-tiktok.png"></div>
</div>

<div class="iro-actions">
  <a href="#" class="iro-btn pink">멤버 목록</a>
  <a href="#" class="iro-btn purple">메인으로</a>
</div>

</div>
</div>
</div>

<!-- MOVIE -->
<div class="iro-movie">
<h2>MOVIE</h2>
<iframe src="https://www.youtube.com/embed/sEHQNzj_cmc"></iframe>
</div>

<script>
let audios=[
 new Audio("voice/IroVoice1.mp3"),
 new Audio("voice/IroVoice2.mp3"),
 new Audio("voice/IroVoice3.mp3")
]
let current=null,playing=false,last=-1

function rand(){
 let i
 do{i=Math.floor(Math.random()*audios.length)}
 while(i===last)
 last=i
 return i
}

function playVoice(btn){
 let name=document.querySelector(".iro-name")

 if(playing){
  current.pause()
  playing=false
  btn.innerText="▶ VOICE"
  name.classList.remove("voice-active")
  return
 }

 let i=rand()
 current=audios[i]
 current.play()

 playing=true
 btn.innerText="⏸ PAUSE"
 name.classList.add("voice-active")

 current.onended=()=>{
  playing=false
  btn.innerText="▶ VOICE"
  name.classList.remove("voice-active")
 }
}
</script>

</body>
</html>
