<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>
<link rel="stylesheet" href="style.css">

<style>
.iro-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
}

.iro-title {
  text-align: center;
  margin: 28px 0 22px;
}

.iro-title h2 {
  margin: 0;
  color: #d77ca7;
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
}

.iro-title p {
  margin: 10px 0 0;
  color: #c99ab2;
  font-size: 16px;
  font-weight: 700;
}

/* 수정 전: min-height: 600px; 였던 부분을 찾아보세요 (약 35번째 줄) */
.iro-card {
  /* ... 다른 코드들 ... */
  min-height: 720px; /* 숫자를 더 키워 카드 자체를 길게 만듭니다. (취향따라 700~750px 사이 추천) */
  box-sizing: border-box;
}

/* 1. 전체 틀 설정: 상하 중앙 정렬로 변경 */
.iro-grid {
  display: grid;
  grid-template-columns: 500px 1fr; /* 사진 너비 500px, 나머지는 글자 */
  gap: 40px;                        /* 사진과 글자 사이 간격 넓힘 */
  align-items: center;              /* [중요] 위로 몰리는 현상 해결! */
}

/* 2. 사진 영역 */
/* 수정 전: min-height: 520px; 였던 부분을 찾아보세요 (약 45번째 줄) */
.iro-photo {
  /* ... 다른 코드들 ... */
  min-height: 640px; /* 카드를 늘린 만큼, 사진도 길게 만들어 아래로 뻗게 합니다. */
  border: 1px solid #f0dde8;
  background-color: #fff;
}

/* 3. 정보 영역 (이름, 메타데이터 등) */
.iro-info {
  display: flex;
  flex-direction: column;
  justify-content: center; /* 내부 내용들도 세로 가운데 정렬 */
}

.iro-name {
  font-size: 78px;
  font-weight: 900;
  color: #d77ca7;
  margin: 0;
  line-height: 0.95;
}

.iro-en {
  font-size: 22px;
  letter-spacing: 0.18em;
  color: #c99ab2;
  margin: 10px 0 25px; /* 아래 간격을 살짝 더 줌 */
  font-weight: 800;
}

.iro-meta {
  font-size: 16px;
  line-height: 2.2; /* 줄 간격을 더 시원하게 벌림 */
  color: #8f7183;
}

/* 4. 하단 영역 (SNS, 버튼) */
.iro-bottom {
  margin-top: 35px; /* 글자 뭉치와 SNS 아이콘 사이 간격 */
}

.iro-sns img {
  width: 100px;  /* 100으로 변경 */
  height: 100px; /* 여기도 100으로 변경 */
  display: block;
}

.iro-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px; /* 아이콘과 버튼 사이 간격 */
}

.iro-btn {
  padding: 13px 26px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.iro-btn.pink {
  border: 2px solid #ff6fa5;
  color: #ff6fa5;
  background: #fff;
}

.iro-btn.purple {
  border: 2px solid #a892f0;
  color: #a892f0;
  background: #fff;
}

.iro-btn:hover {
  transform: translateY(-2px);
}

@media (max-width: 900px) {
  .iro-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .iro-photo {
    min-height: 420px;
  }

  .iro-name {
    font-size: 56px;
  }

  .iro-en {
    font-size: 18px;
  }

  .iro-sns img {
    width: 76px;
    height: 76px;
  }
}
</style>
</head>
