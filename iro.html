<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>
<link rel="stylesheet" href="style.css">

<style>
.iro-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
}

.iro-title {
  text-align: center;
  margin: 28px 0 22px;
}

.iro-title h2 {
  margin: 0;
  color: #d77ca7;
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
}

.iro-title p {
  margin: 10px 0 0;
  color: #c99ab2;
  font-size: 16px;
  font-weight: 700;
}

/* 1. 카드의 전체 높이를 키웁니다 */
.iro-card {
  background: #fff8fb;
  border: 1px solid #f2d8e7;
  border-radius: 32px;
  padding: 40px; 
  min-height: 750px; /* 카드를 2번처럼 길게 만듭니다 */
  display: flex;
  align-items: center; /* 내부 요소들을 세로 중앙으로 */
  box-sizing: border-box;
}

/* 2. 사진 영역: 높이를 확실히 지정하고 경로 확인 */
.iro-photo {
  width: 500px; /* 가로 고정 */
  height: 650px; /* 높이를 직접 지정해서 영역을 확보합니다 */
  border-radius: 28px;
  background-image: url('iro.png'); /* 파일이 iro.png가 맞는지 다시 확인! */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border: 1px solid #f0dde8;
  background-color: #fff;
}

/* 3. 정보 영역: 중앙으로 몰아넣기 */
.iro-info {
  display: flex;
  flex-direction: column;
  justify-content: center; /* [중요] 이름과 정보들을 세로 중앙으로 모아줍니다 */
  height: 650px; /* 사진 높이와 맞춰줍니다 */
  padding-left: 20px; /* 사진과의 간격 */
}

/* 4. 인스타 아이콘 크기 (100px) */
.iro-sns img {
  width: 100px;
  height: 100px;
  display: block;
}

/* 5. 버튼 간격 조정 */
.iro-bottom {
  margin-top: auto; /* 내용이 많아도 하단에 배치되도록 돕습니다 */
  padding-top: 30px;
}

.iro-sns img {
  width: 100px;  /* 100으로 변경 */
  height: 100px; /* 여기도 100으로 변경 */
  display: block;
}

.iro-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px; /* 아이콘과 버튼 사이 간격 */
}

.iro-btn {
  padding: 13px 26px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.iro-btn.pink {
  border: 2px solid #ff6fa5;
  color: #ff6fa5;
  background: #fff;
}

.iro-btn.purple {
  border: 2px solid #a892f0;
  color: #a892f0;
  background: #fff;
}

.iro-btn:hover {
  transform: translateY(-2px);
}

@media (max-width: 900px) {
  .iro-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .iro-photo {
    min-height: 420px;
  }

  .iro-name {
    font-size: 56px;
  }

  .iro-en {
    font-size: 18px;
  }

  .iro-sns img {
    width: 76px;
    height: 76px;
  }
}
</style>
</head>
