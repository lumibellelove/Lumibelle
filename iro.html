<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>
<link rel="stylesheet" href="style.css">

<style>
.iro-page-wrap {
  max-width: 1280px;
  margin: 0 auto;
}

.iro-title {
  text-align: center;
  margin: 28px 0 22px;
}

.iro-title h2 {
  margin: 0;
  color: #d77ca7;
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
}

.iro-title p {
  margin: 10px 0 0;
  color: #c99ab2;
  font-size: 16px;
  font-weight: 700;
}

/* 1. 카드의 전체 높이 및 오른쪽 여백 확보 */
.iro-card {
  background: #fff8fb;
  border: 1px solid #f2d8e7;
  border-radius: 32px;
  padding: 60px 100px; /* 오른쪽 여백을 100px로 더 늘려 답답함 해소 */
  min-height: 850px; 
  display: flex;
  align-items: center; 
  box-sizing: border-box;
}

/* 2. 전체 그리드 설정: 오른쪽 빈 여백 비중을 0.6까지 대폭 확대 */
.iro-grid {
  display: grid;
  /* 사진 500px / 글자 영역 0.4 / 오른쪽 빈 공간 0.6 비율 */
  grid-template-columns: 500px 0.4fr 0.6fr; 
  gap: 80px; /* 사진과 글자 사이 간격도 더 시원하게 띄움 */
  width: 100%;
  align-items: center;
}

/* 3. 사진 영역 */
.iro-photo {
  width: 500px;
  height: 750px; 
  border-radius: 28px;
  background-image: url('iro.png'); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border: 1px solid #f0dde8;
  background-color: #fff;
}

/* 4. 정보 영역 */
.iro-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 10px;
}

/* 이름과 영문을 감싸는 박스를 중앙 정렬 */
.iro-name-wrap {
  display: flex;
  flex-direction: column;
  align-items: center; /* [핵심] 국문/영문을 가로 중앙에 정렬 */
  width: fit-content;
  margin-bottom: 35px;
}

.iro-name {
  font-size: 78px;
  font-weight: 900;
  color: #d77ca7;
  margin: 0;
  line-height: 1;
  text-align: center;
}

.iro-en {
  font-size: 24px;
  letter-spacing: 0.25em; 
  color: #c99ab2;
  /* 밀려 보였던 왼쪽 마진 15px 삭제하고 중앙 정렬 */
  margin: 12px 0 0 0; 
  font-weight: 800;
  text-align: center;
}

.iro-meta {
  font-size: 17px;
  line-height: 2.3;
  color: #8f7183;
}

.iro-meta div {
  margin-bottom: 8px;
}

/* 강조 포인트: 색상만 변경 */
.iro-meta strong {
  color: #C97CA8;
  font-weight: 900;
}

/* 5. 하단 인스타 및 버튼 */
.iro-bottom {
  margin-top: 40px;
}

.iro-sns img {
  width: 100px;
  height: 100px;
  display: block;
}
.iro-actions {
  display: flex;
  gap: 15px;
  margin-top: 25px;
}

.iro-btn {
  padding: 13px 26px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.iro-btn.pink {
  border: 2px solid #ff6fa5;
  color: #ff6fa5;
  background: #fff;
}

.iro-btn.purple {
  border: 2px solid #a892f0;
  color: #a892f0;
  background: #fff;
}

.iro-btn:hover {
  transform: translateY(-2px);
}

@media (max-width: 900px) {
  .iro-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .iro-photo {
    min-height: 420px;
  }

  .iro-name {
    font-size: 56px;
  }

  .iro-en {
    font-size: 18px;
  }

  .iro-sns img {
    width: 76px;
    height: 76px;
  }
}
</style>
</head>
