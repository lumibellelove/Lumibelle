<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이로 | Lumibelle</title>

<style>
body {
  background:#fdf6fa;
  font-family: sans-serif;
}

/* 전체 */
.wrap {
  max-width:1200px;
  margin:0 auto;
}

/* 카드 */
.iro-card {
  background:#fff8fb;
  border-radius:30px;
  padding:50px;
  margin-top:40px;
}

/* 레이아웃 */
.iro-grid {
  display:grid;
  grid-template-columns:460px 1fr;
  gap:40px;
  align-items:stretch;
}

/* 이미지 */
.iro-photo {
  background:url('iro.png') center/cover;
  border-radius:24px;
  height:600px;
}

/* 오른쪽 */
.iro-info {
  display:flex;
  flex-direction:column;
}

/* 이름 */
.iro-name {
  font-size:80px;
  color:#d77ca7;
  margin:0;
}

.iro-en {
  text-align:center;
  margin-top:10px;
  letter-spacing:5px;
  color:#c99ab2;
}

/* 텍스트 */
.iro-meta {
  margin-top:20px;
  line-height:2;
  color:#8f7183;
}

.iro-meta strong {
  color:#c97ca8;
}

/* 하단 고정 */
.iro-bottom {
  margin-top:auto;
}

/* SNS */
.iro-sns {
  display:flex;
  gap:14px;
  margin-top:30px;
}

.iro-sns div {
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff6fa5,#ff8ec7);
}

/* 버튼 */
.iro-btn-wrap {
  display:flex;
  gap:16px;
  margin-top:30px;
}

.iro-btn {
  padding:15px 30px;
  border-radius:999px;
  font-weight:700;
}

.pink {
  border:2px solid #ff6fa5;
  color:#ff6fa5;
}

.purple {
  border:2px solid #a892f0;
  color:#a892f0;
}

/* ================= */
/* 🎬 영상 */
/* ================= */

.movie {
  margin-top:50px;
  background:#fff8fb;
  padding:40px;
  border-radius:30px;
}

.movie-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.movie-card {
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

/* 썸네일 */
.thumb {
  height:200px;
  background:url('iro.png') center/cover;
  position:relative;
}

/* 재생 버튼 (왼쪽 하단) */
.play {
  position:absolute;
  bottom:12px;
  left:12px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff6fa5,#ff8ec7);
}

/* 텍스트 */
.movie-text {
  padding:15px;
  text-align:center;
}

.more {
  margin:30px auto 0;
  width:200px;
  text-align:center;
  background:#f3c6d9;
  padding:12px;
  border-radius:999px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="iro-card">

<div class="iro-grid">

<div class="iro-photo"></div>

<div class="iro-info">

<h1 class="iro-name">이로</h1>
<div class="iro-en">IRO</div>

<div class="iro-meta">
<strong>나마콜</strong> · 이로치<br>
<strong>담당 컬러</strong> · Angel Blue<br>
<strong>키워드</strong> · 청량 / 에너지<br>
<strong>캐치프라이즈</strong> · いろんな色の中で、イロチがいちばんでしょ？꒰ঌ ໒꒱<br>
<strong>한마디</strong> · “네 세상의 색을 바꿔줄게!”<br>
</div>

<div class="iro-bottom">

<div class="iro-sns">
<div></div>
<div></div>
<div></div>
</div>

<div class="iro-btn-wrap">
<div class="iro-btn pink">멤버 목록</div>
<div class="iro-btn purple">메인으로</div>
</div>

</div>

</div>
</div>
</div>

<!-- 영상 -->
<div class="movie">

<div class="movie-grid">

<div class="movie-card">
<div class="thumb">
<div class="play"></div>
</div>
<div class="movie-text">
대표 직캠
</div>
</div>

<div class="movie-card">
<div class="thumb">
<div class="play"></div>
</div>
<div class="movie-text">
YouTube 이동
</div>
</div>

</div>

<div class="more">MORE VIDEO</div>

</div>

</div>

</body>
</html>
