<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMIBELLE SETLIST</title>

<style>
:root{
  --pink:#ff78b2;
  --pink-deep:#ff59a5;
  --bg:#fff8fb;
  --text:#8a6b7c;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"Noto Sans KR",sans-serif;
  color:var(--text);
}

/* 공통 */
.section{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px;
}

h1,h2,h3{margin:0}

/* LIVE GUIDE */
.live-title{
  text-align:center;
  margin-bottom:30px;
}

.live-title h1{
  color:var(--pink-deep);
  font-size:48px;
  font-weight:900;
}

.live-title p{
  margin-top:10px;
  font-size:14px;
}

/* 안내 카드 */
.guide-box{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.guide-card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  width:300px;
  border:1px solid #f0dde8;
}

/* 곡 탭 */
.song-tabs{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  margin:50px 0;
}

.song-tab{
  padding:16px 24px;
  border-radius:20px;
  border:1px solid #f0dde8;
  cursor:pointer;
  font-weight:700;
}

.song-tab.active{
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  color:#fff;
}

/* 영상 + 정보 */
.song-area{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

@media(max-width:900px){
  .song-area{grid-template-columns:1fr;}
}

.video-box iframe{
  width:100%;
  height:340px;
  border-radius:20px;
}

.info-box{
  background:#fff;
  border-radius:24px;
  padding:30px;
  border:1px solid #f0dde8;
}

.info-box h2{
  color:var(--pink-deep);
  font-size:32px;
}

.info-box p{
  margin-top:10px;
}

/* 버튼 */
.btns{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 18px;
  border-radius:20px;
  border:1px solid #f0dde8;
  cursor:pointer;
}

.btn.main{
  background:var(--pink);
  color:#fff;
  border:none;
}

/* 팝업 */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#fff;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

/* TOP 버튼 */
.top-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--pink);
  color:#fff;
  padding:12px 16px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="section">

<!-- LIVE GUIDE -->
<div class="live-title">
  <h1>LIVE GUIDE</h1>
  <p>공연 전 가볍게 보고 가면 더 재미있어요</p>
</div>

<div class="guide-box">
  <div class="guide-card">처음이면 무리 안 해도 괜찮아요. 박수만 쳐도 충분히 즐길 수 있어요.</div>
  <div class="guide-card">모든 곡을 외울 필요 없어요. 자주 나오는 콜부터 익혀도 좋아요.</div>
  <div class="guide-card">주변 분위기 따라가면 쉬워요. 즐기는 게 제일 중요!</div>
</div>

<!-- 곡 선택 -->
<div class="song-tabs">
  <div class="song-tab active" onclick="changeSong('shukipi')">슈키피!</div>
  <div class="song-tab" onclick="changeSong('canaria')">카나리아</div>
</div>

<!-- 곡 영역 -->
<div class="song-area">

  <!-- 영상 -->
  <div class="video-box">
    <iframe id="videoFrame"
      src="https://www.youtube.com/embed/az9mkI9C2f4"
      allowfullscreen></iframe>
  </div>

  <!-- 정보 -->
  <div class="info-box">
    <h2 id="songTitle">슈키피!</h2>
    <p id="songDesc">참여형 리스폰스 중심 곡</p>

    <div class="btns">
      <div class="btn main">팀 응원</div>
      <div class="btn">초보용</div>
      <div class="btn" onclick="openGuide()">용어 가이드</div>
      <div class="btn" onclick="openLyrics()">가사지</div>
    </div>
  </div>

</div>
</div>

<!-- 용어 팝업 -->
<div id="guideModal" class="modal">
  <div class="modal-content">
    <h3>용어 가이드</h3>
    <p>CALL : 같이 외치는 구호</p>
    <p>MIX : 응원 구호 세트</p>
    <p>CHEER : 박수, 환호</p>
    <p>LIFT : 리프트 포인트</p>
    <button onclick="closeGuide()">닫기</button>
  </div>
</div>

<!-- 가사 팝업 -->
<div id="lyricsModal" class="modal">
  <div class="modal-content">
    <h3>가사</h3>
    <p>가사는 여기에 넣으면 됨</p>
    <button onclick="closeLyrics()">닫기</button>
  </div>
</div>

<!-- TOP -->
<div class="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
function changeSong(type){
  const video=document.getElementById("videoFrame");
  const title=document.getElementById("songTitle");
  const desc=document.getElementById("songDesc");

  if(type==="shukipi"){
    video.src="https://www.youtube.com/embed/az9mkI9C2f4";
    title.innerText="슈키피!";
    desc.innerText="참여형 리스폰스 중심 곡";
  }

  if(type==="canaria"){
    video.src="https://www.youtube.com/embed/VIDEOID"; // 바꿔
    title.innerText="카나리아";
    desc.innerText="따뜻한 감성 응원곡";
  }

  document.querySelectorAll(".song-tab").forEach(el=>el.classList.remove("active"));
  event.target.classList.add("active");
}

/* 팝업 */
function openGuide(){document.getElementById("guideModal").style.display="flex";}
function closeGuide(){document.getElementById("guideModal").style.display="none";}

function openLyrics(){document.getElementById("lyricsModal").style.display="flex";}
function closeLyrics(){document.getElementById("lyricsModal").style.display="none";}
</script>

</body>
</html>
