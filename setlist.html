<!-- 🔥 기존 파일 통째로 이걸로 교체 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumibelle | Setlist</title>

<style>
body{font-family:sans-serif;background:#fff8fb;margin:0}

/* 숨김 */
#guidePanel{display:none}

/* LIVE GUIDE */
.live-guide{
padding:50px;
text-align:center;
}
.live-guide-title{
font-size:64px;
font-weight:900;
color:#ff59a5;
}
.live-guide-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-top:30px;
}
.live-card{
background:#fff;
padding:20px;
border-radius:16px;
font-weight:700;
}

/* SONG */
.song{
cursor:pointer;
padding:20px;
border:1px solid #eee;
margin:10px;
border-radius:12px;
}

/* DETAIL */
.guide{
padding:30px;
background:#fff;
border-radius:20px;
margin:20px;
}

/* MIX 강조 */
.mix{
border:2px solid #ff59a5;
background:#fff0f6;
padding:15px;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- LIVE GUIDE -->
<div class="live-guide">
<div class="live-guide-title">LIVE GUIDE</div>

<div class="live-guide-grid">
<div class="live-card">처음이면 무리 안 해도 괜찮아요.</div>
<div class="live-card">모든 곡을 외울 필요 없어요.</div>
<div class="live-card">분위기 따라가면 충분해요.</div>
</div>
</div>

<!-- SONG LIST -->
<div id="songs"></div>

<!-- DETAIL -->
<div id="guidePanel" class="guide">
<h2 id="title"></h2>
<div id="content"></div>
<button onclick="openLyrics()">가사지</button>
<button onclick="openTerm()">용어 가이드</button>
</div>

<!-- 가사지 -->
<div id="lyricsModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;">
<div style="background:#fff;margin:100px auto;padding:20px;width:300px">
<h3>가사지</h3>
<p id="lyricsText">가사지 준비중</p>
<button onclick="closeLyrics()">닫기</button>
</div>
</div>

<!-- 용어 -->
<div id="termModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;">
<div style="background:#fff;margin:100px auto;padding:20px;width:300px">
<h3>용어 가이드</h3>
<p>CALL / MIX 등 설명 그대로 유지</p>
<button onclick="closeTerm()">닫기</button>
</div>
</div>

<script>
const songs=[
{
name:"슈키피",
content:`
<div>00:00 - 00:15 오프닝</div>
<div>콜: 시작 같이</div>

<div class="mix">
🔥 MIX 타이밍<br>
후렴 직전 짧게 1회
</div>
`
},
{
name:"카나리아",
content:`
<div>00:00 - 00:20 인트로</div>
<div>감상 위주</div>
`
}
]

const list=document.getElementById("songs")
songs.forEach((s,i)=>{
const div=document.createElement("div")
div.className="song"
div.innerText=s.name
div.onclick=()=>{
document.getElementById("guidePanel").style.display="block"
document.getElementById("title").innerText=s.name
document.getElementById("content").innerHTML=s.content
window.scrollTo({top:500,behavior:"smooth"})
}
list.appendChild(div)
})

function openLyrics(){
document.getElementById("lyricsModal").style.display="block"
}
function closeLyrics(){
document.getElementById("lyricsModal").style.display="none"
}

function openTerm(){
document.getElementById("termModal").style.display="block"
}
function closeTerm(){
document.getElementById("termModal").style.display="none"
}
</script>

</body>
</html>
