<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumibel | Setlist</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ff59a5;
  --bg:#fff8fb;
  --line:#f2d9e5;
  --text:#7f6877;
}

body{
  margin:0;
  font-family:"Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.site-header{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--line);
  z-index:100;
}

.header-inner{
  max-width:1100px;
  margin:auto;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-logo{
  width:48px;
}

.brand-text{
  font-weight:900;
  color:var(--pink);
}

.gnb a{
  margin-left:12px;
  font-size:13px;
  font-weight:800;
  color:#a07c90;
  text-decoration:none;
}

/* TITLE */
.page-title{
  padding:30px 20px 10px;
  font-size:26px;
  font-weight:900;
}

/* SONG CARD */
.song-nav{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  padding:20px;
}

.song-btn{
  background:#fff;
  padding:18px;
  border-radius:20px;
  border:1px solid var(--line);
  cursor:pointer;
  transition:.2s;
}

.song-btn strong{
  display:block;
  font-size:18px;
}

.song-btn span{
  font-size:13px;
  color:#a07c90;
}

.song-btn.active{
  border:2px solid var(--pink);
  box-shadow:0 10px 25px rgba(255,89,165,.15);
}

.song-btn:active{
  transform:scale(0.97);
}

/* CONTENT */
.content{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.song-content{display:none;}
.song-content.active{display:block;}

.video{
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  margin-bottom:20px;
}

.video iframe{
  width:100%;
  height:100%;
  border:0;
}

.box{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

.title{
  font-weight:900;
  margin-bottom:6px;
}

/* AUDIO */
audio{
  width:100%;
  margin-bottom:20px;
}

/* EXTRA */
.extra-area{
  margin-top:20px;
}

/* TOP BTN */
.top-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:var(--pink);
  color:#fff;
  font-size:20px;
  display:none;
}

/* MOBILE */
@media(max-width:768px){
  .song-nav{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <img src="img/logo.png" class="brand-logo">
      <div class="brand-text">Lumibel</div>
    </div>
    <nav class="gnb">
      <a href="index.html">HOME</a>
      <a href="setlist.html">SETLIST</a>
    </nav>
  </div>
</header>

<div class="page-title">SETLIST</div>

<!-- SONG LIST -->
<div class="song-nav">
  <div class="song-btn active" onclick="showSong('star',this)">
    <strong>Stardust Magical</strong>
    <span>현장형 가이드</span>
  </div>

  <div class="song-btn" onclick="showSong('story',this)">
    <strong>스토리베리러브</strong>
    <span>가사 기반</span>
  </div>

  <div class="song-btn" onclick="showSong('sukipi',this)">
    <strong>슈키피</strong>
    <span>콜 중심</span>
  </div>

  <div class="song-btn" onclick="showSong('canaria',this)">
    <strong>카나리아</strong>
    <span>믹스 + 콜</span>
  </div>
</div>

<div class="content">

<!-- STAR -->
<div id="star" class="song-content active">
  <div class="box">영상 없음 / 현장 반응형</div>

  <audio controls>
    <source src="audio/stardust.mp3">
  </audio>

  <div class="box">
    <div class="title">응원</div>
    후렴에서 환호
  </div>

  <div class="extra-area"></div>
</div>

<!-- STORY -->
<div id="story" class="song-content">
  <div class="box">영상 없음 / 오리지널곡</div>

  <audio controls>
    <source src="audio/storyberrylove.mp3">
  </audio>

  <div class="box">
    <div class="title">CALL</div>
    달콤 / 두근 / 행복 / 좋아!
  </div>

  <div class="extra-area"></div>
</div>

<!-- SUKIPI -->
<div id="sukipi" class="song-content">
  <div class="video">
    <iframe src="https://www.youtube.com/embed/az9mkI9C2f4"></iframe>
  </div>

  <audio controls>
    <source src="audio/sukipi.mp3">
  </audio>

  <div class="box">
    <div class="title">CALL</div>
    스키피! 스키피!
  </div>

  <div class="extra-area"></div>
</div>

<!-- CANARIA -->
<div id="canaria" class="song-content">
  <div class="video">
    <iframe src="https://www.youtube.com/embed/bAxU3DizH90"></iframe>
  </div>

  <audio controls>
    <source src="audio/canaria.mp3">
  </audio>

  <div class="box">
    <div class="title">MIX</div>
    타이가 파이어 사이버 파이버 다이버 바이버 저저
  </div>

  <div class="extra-area"></div>
</div>

</div>

<button class="top-btn" id="topBtn">↑</button>

<script>
function showSong(id,el){
  document.querySelectorAll('.song-content').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.song-btn').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');

  window.scrollTo({top:0,behavior:'smooth'});
}

/* top btn */
const btn=document.getElementById("topBtn");
window.onscroll=()=>{
  btn.style.display=window.scrollY>200?"block":"none";
}
btn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
</script>

</body>
</html>
