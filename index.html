<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumibelle</title>
  <style>
    /* 1. 기본 초기화 */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fffafc;
      font-family: 'Pretendard', sans-serif; /* 폰트가 없다면 기본 고딕 */
    }

    main.page-shell { flex: 1; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    /* 2. 히어로 배너 (슬라이드쇼) */
    .hero-banner {
      position: relative;
      margin-top: 18px;
      border: 1px solid #f2d8e7;
      border-radius: 32px;
      overflow: hidden;
      min-height: 560px;
      box-shadow: 0 8px 24px rgba(232, 191, 211, 0.12);
      background: #000;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      z-index: 1;
    }
    .slide.active { opacity: 1; z-index: 1; }

    .hero-inner {
      position: relative;
      z-index: 2;
      padding: 86px 60px 96px 80px;
      max-width: 650px;
    }

    .hero-kor, .hero-sub, .hero-desc {
      text-align: left;
      text-shadow: 1px 1px 4px rgba(255, 255, 255, 0.8);
    }

    .hero-logo {
      font-size: 96px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #f5539f;
      margin: 0;
      text-shadow: -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff;
    }

    .hero-sub { margin-top: 8px; color: #de8fb6; font-size: 28px; font-weight: 800; }
    .hero-desc { margin-top: 28px; color: #8f7183; font-size: 17px; line-height: 2; }

    /* 3. 섹션 헤딩 */
    .section-heading { text-align: center; margin: 38px 0 20px; }
    .section-heading h2 { margin: 0; color: #d77ca7; font-size: 62px; font-weight: 900; font-family: serif; }
    .section-heading p { margin: 10px 0 0; color: #c99ab2; font-size: 18px; font-weight: 800; }

    /* 4. 멤버 그리드 */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .member-card {
      background: #fff5fb;
      border: 1px solid #f2d8e7;
      border-radius: 28px;
      padding: 10px 10px 16px;
      box-shadow: 0 8px 24px rgba(232, 191, 211, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .member-card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(0,0,0,0.12); }

    /* 멤버 컬러 커스텀 */
    .mariring { background: #fff0f6; }
    .lulu { background: #fff6f9; }
    .iro { background: #f4faff; }
    .luna { background: #f7f2ff; }

    .member-name-bar {
      border-radius: 0 0 999px 999px;
      color: #fff;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      padding: 14px 10px;
      margin-bottom: 12px;
    }
    .mariring .member-name-bar { background: #ff59a5; }
    .lulu .member-name-bar { background: linear-gradient(180deg, #FFB8D3 0%, #FFD9E8 100%); }
    .iro .member-name-bar { background: #8ECDF2; }
    .luna .member-name-bar { background: #9F6DE0; }

    .member-photo { width: 100%; height: 360px; background: #fff; border-radius: 22px; overflow: hidden; margin-bottom: 16px; border: 1px solid #f0dde8; }
    .member-photo img { width: 100%; height: 100%; object-fit: cover; }

    .member-btn {
      display: flex;
      width: 100%;
      justify-content: center;
      padding: 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 900;
      color: #fff;
      transition: all 0.2s;
    }
    .member-btn.mariring { background: #f35aa0; }
    .member-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

    /* 5. 뉴스 & 스케줄 */
    .home-grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 34px; }
    .home-card { background: #fff5fb; border: 1px solid #f2d8e7; border-radius: 28px; overflow: hidden; }
    .home-card-head { padding: 30px; text-align: center; }
    .home-card-head h3 { font-size: 44px; color: #d77ca7; margin: 0; font-weight: 900; }

    .news-item, .schedule-item {
      display: grid;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid #f2d8e7;
      text-decoration: none;
      transition: background 0.2s;
    }
    .news-item { grid-template-columns: 110px 90px 1fr 20px; }
    .schedule-item { grid-template-columns: 125px 165px 1fr auto; }
    .news-item:hover, .schedule-item:hover { background: #fff0f7; }

    .more-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 40px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff7eb3, #ff5fa5);
      color: #fff;
      text-decoration: none;
      font-weight: 900;
    }

    /* 반응형 */
    @media (max-width: 1100px) {
      .member-grid { grid-template-columns: repeat(2, 1fr); }
      .home-grid-top { grid-template-columns: 1fr; }
    }
    @media (max-width: 780px) {
      .member-grid { grid-template-columns: 1fr; }
      .hero-logo { font-size: 60px; }
      .news-item, .schedule-item { grid-template-columns: 1fr; gap: 10px; }
    }
  </style>
</head>
<body>

  <main class="page-shell">
    <div class="wrap">
      <section class="hero-banner">
        <div class="slide active" style="background-image: url('hero.png');"></div>
        <div class="slide" style="background-image: url('hero2.png');"></div>
        <div class="slide" style="background-image: url('hero3.png');"></div>
        <div class="hero-inner">
          <div class="hero-kor">빛나는 미소의 소녀들</div>
          <h1 class="hero-logo">Lumibelle</h1>
          <div class="hero-sub">✦ 루미벨 ✦</div>
          <p class="hero-desc">한국에서 활동하고 있는 왕도 아이돌 그룹입니다.<br>여러분의 일상으로 더 반짝반짝해져…♡</p>
        </div>
      </section>

      <section class="section-heading">
        <h2>MEMBER</h2>
        <p>멤버 소개</p>
      </section>
      <section class="member-grid">
        <div class="member-card mariring">
          <div class="member-name-bar">MARIRING</div>
          <div class="member-photo"><img src="mari_photo.png" alt="마리링"></div>
          <div class="member-btn mariring">자세히 보기</div>
        </div>
        </section>

      <section class="home-grid-top">
        <div class="home-card">
          <div class="home-card-head"><h3>NEWS</h3><p>공지사항</p></div>
          <div class="news-list">
            <a href="#" class="news-item">
              <div class="news-date">2026.07.12</div>
              <div><span style="background:#ff4fa3; color:#fff; padding:4px 8px; border-radius:10px; font-size:12px;">NEW</span></div>
              <div class="news-title">루미벨 데뷔라이브 안내</div>
              <div>›</div>
            </a>
          </div>
          <div style="text-align:center; padding-bottom:20px;"><a href="#" class="more-btn">뉴스 더보기</a></div>
        </div>
        
        <div class="home-card">
          <div class="home-card-head"><h3>SCHEDULE</h3><p>스케줄</p></div>
          <div class="schedule-list">
            <div class="schedule-item">
              <div style="color:#ff5fa5; font-weight:900;">07.12(土)</div>
              <div style="font-weight:800;">상상마당@홍대</div>
              <div class="news-title">루미벨 데뷔라이브</div>
              <a href="#" style="border:1px solid #ff7eb3; color:#ff7eb3; padding:5px 12px; border-radius:20px; text-decoration:none; font-size:12px;">TICKET</a>
            </div>
          </div>
          <div style="text-align:center; padding-bottom:20px;"><a href="#" class="more-btn">스케줄 더보기</a></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    setInterval(() => {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }, 5000);
  </script>
</body>
</html>
