<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Lumibelle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section>
  <div class="wrap">
    <div class="bottom-layout">

      <!-- FANNAME -->
      <div class="box fanname-box">
        <h3>FANNAME</h3>
        <p class="sub">팬네임</p>

        <img src="fanname.png" class="fanname-img">

        <h4>Lumina (루미나)</h4>
        <p>
          ‘빛나는 존재’라는 의미를 담은<br>
          Lumibelle의 팬네임입니다.<br><br>
          Lumibelle과 함께 반짝이는 존재라는<br>
          뜻을 가지고 있어요…♡
        </p>
      </div>

      <!-- 오른쪽 -->
      <div class="right-column">

        <!-- INFO -->
        <div class="box info-box">
          <h3>INFO</h3>
          <p class="sub">안내</p>

          <div class="info-links">
            <a href="#">처음 오신 분</a>
            <a href="#">티켓 안내</a>
            <a href="#">FAQ</a>
            <a href="#">문의하기</a>
          </div>
        </div>

        <!-- FOLLOW -->
        <div class="box follow-box">
          <h3>FOLLOW US</h3>
          <p class="sub">SNS</p>

          <div class="sns">
            <a href="#">X</a>
            <a href="#">IG</a>
            <a href="#">TT</a>
            <a href="#">YT</a>
          </div>
        </div>

      </div>
    </div>

    <div class="footer-copy">
      © 2026 Lumibelle All Rights Reserved.
    </div>

  </div>
</section>

</body>
</html>
