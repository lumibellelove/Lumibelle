<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumibelle Official</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="wrap">
    <h1 style="text-align:center; color:#ff6fa5;">Lumibelle</h1>
  </div>
</header>

<!-- ===== NEWS / SCHEDULE ===== -->
<section>
  <div class="wrap" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">

    <!-- NEWS -->
    <div class="box">
      <div class="box-head">
        <h3>NEWS</h3>
        <p>공지사항</p>
      </div>
      <p style="text-align:center;">업데이트 예정</p>
    </div>

    <!-- SCHEDULE -->
    <div class="box">
      <div class="box-head">
        <h3>SCHEDULE</h3>
        <p>스케줄</p>
      </div>
      <p style="text-align:center;">일정 준비중</p>
    </div>

  </div>
</section>

<!-- ===== FANNAME ===== -->
<section>
  <div class="wrap">
    <div class="box fanname-box">

      <div class="box-head">
        <h3>FANNAME</h3>
        <p>팬네임</p>
      </div>

      <div class="fanname-content">
        <img src="fanname.png" class="fanname-img">

        <h4>Lumina (루미나)</h4>

        <p>
          ‘빛나는 존재’라는 의미를 담은<br>
          Lumibelle의 팬네임입니다.<br><br>
          Lumibelle과 함께 반짝이는 존재라는<br>
          뜻을 가지고 있어요…♡
        </p>
      </div>

    </div>
  </div>
</section>

<!-- ===== INFO + FOLLOW ===== -->
<section>
  <div class="wrap">
    <div class="bottom-box footer-merged">

      <div class="footer-columns">

        <!-- INFO -->
        <div class="footer-info">
          <h3>INFO</h3>
          <p class="sub">안내</p>

          <div class="info-links">
            <a href="#">처음 오신 분</a>
            <a href="#">티켓 안내</a>
            <a href="#">FAQ</a>
            <a href="#">문의하기</a>
          </div>
        </div>

        <!-- FOLLOW -->
        <div class="footer-follow">
          <h3>FOLLOW US</h3>
          <p class="sub">SNS</p>

          <div class="sns">
            <a>X</a>
            <a>IG</a>
            <a>TT</a>
            <a>YT</a>
          </div>
        </div>

      </div>

      <div class="footer-copy">
        © 2026 Lumibelle All Rights Reserved.
      </div>

    </div>
  </div>
</section>

</body>
</html>
