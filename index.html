<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumibelle</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffafc;
}

/* ===== HERO ===== */
.hero-banner {
  position: relative;
  border-radius: 32px;
  overflow: hidden;
  margin: 20px;
  min-height: 600px;
  background: linear-gradient(180deg,#f9eefd,#ece7ff);
}

.hero-banner::before {
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,#fff 0 2px,transparent 3px),
    radial-gradient(circle at 70% 40%,#fff 0 2px,transparent 3px);
  opacity:.6;
}

.hero-inner {
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100%;
}

.hero-copy {
  padding:80px 50px;
}

.hero-logo {
  font-size:90px;
  font-weight:900;
  color:#ff5aa7;
}

.hero-sub {
  font-size:26px;
  color:#d98bb3;
}

.hero-desc {
  margin-top:20px;
  color:#8f7183;
}

/* ===== MEMBER ===== */
.member-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:20px;
}

.member-card {
  background:#fff5fb;
  border-radius:24px;
  padding:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  transition:.2s;
}

.member-card:hover {
  transform:translateY(-6px);
}

.member-name-bar {
  border-radius:0 0 999px 999px;
  text-align:center;
  padding:12px;
  color:#fff;
  font-weight:900;
}

.mariring { background:#ff59a5; }
.lulu { background:linear-gradient(#FFC0D7,#FFD9E8); }
.iro { background:#8ECDF2; }
.luna { background:#9F6DE0; }

.member-btn {
  display:block;
  text-align:center;
  padding:10px;
  border-radius:999px;
  color:#fff;
  text-decoration:none;
  margin-top:10px;
}

</style>
</head>

<body>

<section class="hero-banner">
  <div class="hero-inner">
    <div class="hero-copy">
      <h1 class="hero-logo">Lumibelle</h1>
      <div class="hero-sub">✦ 루미벨 ✦</div>
      <div class="hero-desc">
        반짝이는 아이돌 그룹
      </div>
    </div>
  </div>
</section>

<section class="member-grid">

<div class="member-card">
  <div class="member-name-bar mariring">MARIRING</div>
  <a class="member-btn mariring">자세히보기</a>
</div>

<div class="member-card">
  <div class="member-name-bar lulu">LULU</div>
  <a class="member-btn lulu">자세히보기</a>
</div>

<div class="member-card">
  <div class="member-name-bar iro">IRO</div>
  <a class="member-btn iro">자세히보기</a>
</div>

<div class="member-card">
  <div class="member-name-bar luna">LUNA</div>
  <a class="member-btn luna">자세히보기</a>
</div>

</section>

</body>
</html>
