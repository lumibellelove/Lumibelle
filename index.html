<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LUMIBELLE</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff7fb;
}

/* HEADER */
.site-header{
  padding:20px;
  background:#fff0f6;
  border-radius:20px;
  margin:20px;
}

/* NAV */
.main-nav{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

/* ROW */
.nav-row{
  display:flex;
  justify-content:center;
  gap:26px;
  flex-wrap:nowrap;
}

/* LINKS */
.main-nav a{
  text-decoration:none;
  font-size:14px;
  font-weight:800;
  color:#c77a9f;
  position:relative;
  transition:0.25s ease;
}

/* HOVER */
.main-nav a:hover{
  color:#ff59a5;
}

/* UNDERLINE */
.main-nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:2px;
  background:linear-gradient(90deg,#ff59a5,#ffc0d7);
  border-radius:999px;
  transition:0.25s ease;
}

.main-nav a:hover::after{
  width:100%;
}

/* HOME highlight */
.main-nav a.home{
  background:#ffe6f2;
  padding:6px 12px;
  border-radius:12px;
  color:#ff59a5;
}

/* MOBILE */
@media (max-width:768px){
  .nav-row{
    flex-wrap:wrap;
    gap:14px;
  }
  .main-nav a{
    font-size:13px;
  }
}
</style>
</head>

<body>

<header class="site-header">

<nav class="main-nav">

<div class="nav-row">
<a href="#" class="home">HOME</a>
<a href="#">NEWS</a>
<a href="#">MEMBER</a>
<a href="#">SCHEDULE</a>
<a href="#">MUSIC</a>
</div>

<div class="nav-row">
<a href="#">CHEER</a>
<a href="#">GALLERY</a>
<a href="#">CONTENT</a>
<a href="#">GAME</a>
<a href="#">STORY</a>
<a href="#">EVENT</a>
</div>

</nav>

</header>

</body>
</html>
