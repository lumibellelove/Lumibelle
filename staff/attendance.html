<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>STAFF ATTENDANCE | Lumibelle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=SUIT:wght@500;600;700;800;900&display=swap');
:root{
  --bg:#fff7fb;--card:#fff;--soft:#fff0f7;--purple:#f7efff;--line:#f2d8e7;
  --pink:#ff5fa8;--pink2:#d77ca7;--text:#7f6a77;--muted:#b28ea2;
  --lav:#a88cff;--gold:#ffb75f;--green:#31a963;--shadow:0 12px 28px rgba(232,191,211,.16);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%}
body{
  font-family:"SUIT","Noto Sans KR",system-ui,sans-serif;color:var(--text);
  background:
    radial-gradient(circle at 12% 8%, rgba(255,192,215,.34) 0%, rgba(255,192,215,0) 28%),
    radial-gradient(circle at 88% 18%, rgba(202,167,255,.22) 0%, rgba(202,167,255,0) 26%),
    linear-gradient(180deg,#fffafc 0%,#fff0f7 100%);
}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit}
.wrap{width:min(920px,calc(100% - 28px));margin:0 auto;padding:18px 0 44px}
.hero,.card,.record-card{border:1px solid var(--line);background:rgba(255,255,255,.86);box-shadow:var(--shadow);border-radius:30px}
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#fff0f7 0%,#f7efff 100%);padding:38px 32px 32px}
.hero::after{content:"✦";position:absolute;right:28px;top:24px;color:rgba(255,95,168,.24);font-size:38px;animation:floatStar 3s ease-in-out infinite}
@keyframes floatStar{0%,100%{transform:translateY(0) rotate(0);opacity:.55}50%{transform:translateY(-6px) rotate(12deg);opacity:1}}
.eyebrow{display:inline-flex;min-height:30px;padding:0 13px;align-items:center;justify-content:center;border-radius:999px;background:#fff;border:1px solid #f0bfd4;color:var(--pink2);font-size:12px;font-weight:1000;letter-spacing:.04em}
h1{margin:14px 0 8px;font-family:"Cormorant Garamond",serif;font-size:68px;line-height:.88;font-weight:700;color:var(--pink);text-shadow:0 1px 0 rgba(255,255,255,.98),0 0 10px rgba(255,120,178,.18)}
.hero p,.card p{font-size:14px;line-height:1.75;font-weight:800;color:#8f7183;margin:10px 0 0}
.top-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.btn{min-height:46px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;text-align:center;padding:0 16px;font-size:14px;font-weight:1000;transition:.16s ease;border:0;cursor:pointer}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;box-shadow:0 8px 18px rgba(255,95,165,.22)}
.btn-sub{background:#fff;color:var(--pink2);border:1px solid #f0bfd4;box-shadow:0 4px 10px rgba(255,95,165,.08)}
.btn-in{background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;box-shadow:0 8px 18px rgba(255,95,165,.22)}
.btn-out{background:linear-gradient(180deg,#ffd27e,#ffb75f);color:#fff;box-shadow:0 8px 18px rgba(255,183,95,.22)}
.grid{display:grid;grid-template-columns:.95fr 1.05fr;gap:16px;margin-top:16px}
.card{padding:22px}
.card h2{margin:0 0 14px;color:var(--pink2);font-size:25px;line-height:1.2;font-weight:1000}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:grid;gap:7px;margin-bottom:12px}
label{font-size:13px;font-weight:1000;color:#9a7187}
input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:18px;padding:14px 15px;outline:none;transition:.2s ease;font-size:15px;font-weight:800}
textarea{min-height:92px;resize:vertical;line-height:1.65}
input:focus,select:focus,textarea:focus{border-color:#f4a4ca;box-shadow:0 0 0 4px rgba(255,121,181,.12)}
.big-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.big-actions .btn{min-height:64px;font-size:18px}
.status{display:none;margin-top:12px;padding:13px 14px;border-radius:18px;font-size:13px;line-height:1.6;font-weight:900;background:#fff0f7;color:#d77ca7}
.status.show{display:block}
.status.err{background:#fff2e8;color:#c87536}
.status.ok{background:#e9fff0;color:#21864a}
.record-list{display:grid;gap:10px;max-height:590px;overflow:auto;padding-right:3px}
.record-card{padding:15px;border-radius:22px;box-shadow:0 8px 18px rgba(255,95,165,.08)}
.record-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.record-title{font-weight:1000;color:#d77ca7;font-size:14px;line-height:1.4}
.record-time{font-size:11px;color:#b28ea2;font-weight:900;white-space:nowrap}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{display:inline-flex;min-height:25px;align-items:center;justify-content:center;padding:0 9px;border-radius:999px;background:#fff0f7;color:#d77ca7;border:1px solid #f0bfd4;font-size:11px;font-weight:1000}
.badge.out{background:#fff8ef;color:#c87536;border-color:#f4d7c5}
.memo{font-size:14px;line-height:1.75;color:#7f6a77;font-weight:800;white-space:pre-wrap}
.note-box{margin-top:12px;padding:13px 15px;border-radius:18px;background:#fff8ef;border:1px solid #f4d7c5;color:#a36b33;font-size:12.5px;line-height:1.65;font-weight:850}
.footer{text-align:center;padding:24px 16px 36px;color:#c6a2b4;font-size:13px;font-weight:800}
@media(max-width:820px){.grid{grid-template-columns:1fr}h1{font-size:56px}}
@media(max-width:520px){.wrap{width:calc(100% - 22px)}.hero,.card{border-radius:24px;padding:20px}h1{font-size:48px}.form-grid,.big-actions{grid-template-columns:1fr}.top-actions .btn{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="eyebrow">STAFF ATTENDANCE</div>
    <h1>Staff<br>Check</h1>
    <p>스탭 출석/퇴근 기록 페이지입니다.<br>출석/퇴근 버튼을 누르면 구글시트 staff_attendance 탭에 기록됩니다.</p>
    <div class="top-actions">
      <a class="btn btn-sub" href="index.html">스탭 허브로</a>
      <a class="btn btn-sub" href="talk.html">스탭 메모톡</a>
      <button class="btn btn-sub" id="btnRefresh" type="button">기록 새로고침</button>
    </div>
  </section>

  <section class="grid">
    <article class="card">
      <h2>출석 / 퇴근 체크</h2>

      <div class="form-grid">
        <div class="field">
          <label for="staffName">스탭명</label>
          <input id="staffName" placeholder="스탭명 / 닉네임">
        </div>
        <div class="field">
          <label for="role">담당 역할</label>
          <select id="role">
            <option value="공통">공통</option>
            <option value="입장">입장</option>
            <option value="물판">물판</option>
            <option value="특전회">특전회</option>
            <option value="책임자">책임자</option>
            <option value="촬영 보조">촬영 보조</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="memo">메모</label>
        <textarea id="memo" placeholder="예: 1부 입장 담당 / 물판 지원 / 중간 합류 / 조기 퇴근 사유"></textarea>
      </div>

      <div class="big-actions">
        <button class="btn btn-in" id="btnIn" type="button">출석 체크</button>
        <button class="btn btn-out" id="btnOut" type="button">퇴근 체크</button>
      </div>

      <div class="status" id="statusBox"></div>

      <div class="note-box">
        ※ 스탭명은 한 번 입력하면 이 기기에 저장됩니다.<br>
        ※ 출석/퇴근 기록은 현장 운영 확인용입니다.<br>
        ※ 실수로 잘못 눌렀다면 스탭 메모톡에 정정 메모를 남겨 주세요.
      </div>
    </article>

    <article class="card">
      <h2>최근 출퇴근 기록</h2>
      <div class="record-list" id="recordList"></div>
    </article>
  </section>
</div>

<div class="footer">© 2026 Lumibelle Staff Attendance</div>

<script>
const ATTENDANCE_API_URL = "https://script.google.com/macros/s/AKfycbwc5lPckPsc4cjcT6ODph5ANIsGEgpRAESgYuxUj0tPQpP51X-nDWrI5qcXqK57epjO/exec";
const STAFF_NAME_KEY = "lb_staff_name";
const LOCAL_KEY = "lb_staff_attendance_cache_v1";

const $ = (id) => document.getElementById(id);
let records = [];

function safe(v){
  if(v === null || v === undefined || v === "") return "";
  return String(v).replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

function showStatus(text, type="ok"){
  const box = $("statusBox");
  box.textContent = text;
  box.className = "status show " + (type === "err" ? "err" : "ok");
}

function jsonp(params){
  return new Promise((resolve, reject) => {
    const cbName = "__lumi_att_cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
    params.callback = cbName;

    const qs = Object.keys(params).map(k => encodeURIComponent(k) + "=" + encodeURIComponent(params[k])).join("&");
    const script = document.createElement("script");
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("요청 시간이 초과됐어요."));
    }, 15000);

    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error("API 호출에 실패했어요."));
    };

    script.src = ATTENDANCE_API_URL + "?" + qs;
    document.body.appendChild(script);
  });
}

async function saveAttendance(actionType){
  const staff = $("staffName").value.trim();
  const role = $("role").value;
  const memo = $("memo").value.trim();

  if(!staff){
    showStatus("스탭명을 입력해 주세요.", "err");
    $("staffName").focus();
    return;
  }

  localStorage.setItem(STAFF_NAME_KEY, staff);
  showStatus(actionType + " 저장 중...");

  try{
    const res = await jsonp({
      action:"attendance_add",
      staff,
      role,
      actionType,
      memo
    });

    if(!res || !res.ok) throw new Error(res && res.error ? res.error : "저장 실패");

    showStatus(actionType + " 저장 완료!");
    $("memo").value = "";
    await refreshRecords();
  }catch(err){
    showStatus("저장 실패: " + (err.message || err), "err");
  }
}

async function refreshRecords(){
  try{
    const res = await jsonp({action:"attendance_list", limit:"80"});
    if(!res || !res.ok) throw new Error(res && res.error ? res.error : "불러오기 실패");
    records = Array.isArray(res.items) ? res.items : [];
    localStorage.setItem(LOCAL_KEY, JSON.stringify(records));
    renderRecords();
  }catch(err){
    showStatus("기록 불러오기 실패. 이 기기의 임시 기록을 표시해요.", "err");
    try{
      records = JSON.parse(localStorage.getItem(LOCAL_KEY) || "[]");
    }catch(e){
      records = [];
    }
    renderRecords();
  }
}

function renderRecords(){
  const list = $("recordList");

  if(!records.length){
    list.innerHTML = `<div class="record-card"><p>아직 출퇴근 기록이 없어요.</p></div>`;
    return;
  }

  list.innerHTML = records.map(r => {
    const isOut = r.action === "퇴근";
    return `
      <div class="record-card">
        <div class="record-head">
          <div class="record-title">${safe(r.staff)} · ${safe(r.action)}</div>
          <div class="record-time">${safe(r.time)}</div>
        </div>
        <div class="meta">
          <span class="badge ${isOut ? "out" : ""}">${safe(r.action)}</span>
          <span class="badge">${safe(r.role || "공통")}</span>
        </div>
        <div class="memo">${safe(r.memo || "-")}</div>
      </div>
    `;
  }).join("");
}

$("btnIn").addEventListener("click", () => saveAttendance("출석"));
$("btnOut").addEventListener("click", () => saveAttendance("퇴근"));
$("btnRefresh").addEventListener("click", refreshRecords);

$("staffName").value = localStorage.getItem(STAFF_NAME_KEY) || "";

refreshRecords();
</script>
</body>
</html>
