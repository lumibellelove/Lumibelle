<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루미벨 스탭</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff7fb;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(255,95,168,0.15);
}

h1{
  margin:0 0 10px;
}

.field{
  margin-bottom:12px;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #eee;
}

textarea{
  min-height:80px;
}

.member{
  display:flex;
  gap:8px;
}

.member span{
  background:#fff0f7;
  border:1px solid #f3d9e7;
  border-radius:12px;
  padding:12px;
  color:#ff5fa8;
  font-weight:bold;
}

.quick{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.quick button{
  padding:10px;
  border-radius:12px;
  border:none;
  background:#fff0f7;
  color:#ff5fa8;
  font-weight:bold;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.btn-primary{
  background:#ff5fa8;
  color:white;
  border:none;
  padding:14px;
  border-radius:14px;
}

.btn-secondary{
  background:#fff;
  border:1px solid #ddd;
  padding:14px;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h1>포인트 적립기</h1>

<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSdkBI418UPiPPEqF0YxEQ1_yvRD9ex-6pXkB9fXyV66f1TxpQ/formResponse"
method="POST"
target="hidden_iframe">

<!-- 스탭 -->
<div class="field">
<select id="staff">
<option value="">스탭 선택</option>
<option>마리링</option>
<option>루루</option>
<option>이로</option>
<option>루나</option>
</select>
</div>

<!-- 회원번호 -->
<div class="field">
<div class="member">
<span>LB-</span>
<input id="member" placeholder="001">
</div>
</div>

<!-- 구분 -->
<div class="field">
<select id="type" name="entry.668276280">
<option value="적립">적립</option>
<option value="사용">사용</option>
</select>
</div>

<!-- 포인트 -->
<div class="field">
<input id="point" name="entry.1489084345" placeholder="포인트">
</div>

<!-- 메모 -->
<div class="field">
<textarea id="memo" name="entry.377436320"></textarea>
</div>

<!-- 빠른 버튼 -->
<div class="quick">
<button type="button" onclick="add(1)">+1</button>
<button type="button" onclick="add(2)">+2</button>
<button type="button" onclick="add(3)">+3</button>
<button type="button" onclick="add(5)">+5</button>
<button type="button" onclick="add(10)">+10</button>
<button type="button" onclick="use100()">사용100</button>
</div>

<!-- 숨김 -->
<input type="hidden" name="entry.517609756" id="staffHidden">
<input type="hidden" name="entry.1501139250" id="memberHidden">

<div class="actions">
<button class="btn-primary">저장</button>
<button type="button" class="btn-secondary" onclick="resetForm()">초기화</button>
</div>

<div class="actions">
<a class="btn-secondary"
href="https://docs.google.com/spreadsheets/d/1Os_YlqM5yY1owd2a4jS4QdQDeTubu1yuuKI4ownDqh8/edit?usp=sharing"
target="_blank">기록 보기</a>
</div>

</form>

</div>
</div>

<!-- 🔥 엑박 방지 -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
const staff = document.getElementById("staff");
const member = document.getElementById("member");
const point = document.getElementById("point");
const type = document.getElementById("type");
const memo = document.getElementById("memo");

function add(num){
  type.value = "적립";
  point.value = (Number(point.value)||0) + num;
}

function use100(){
  type.value = "사용";
  point.value = 100;
  if(!memo.value) memo.value="포인트 사용";
}

document.getElementById("form").addEventListener("submit", e=>{
  if(!staff.value || !member.value || !point.value){
    e.preventDefault();
    alert("입력 확인해줘");
    return;
  }

  document.getElementById("staffHidden").value = staff.value;
  document.getElementById("memberHidden").value = "LB-" + member.value;

  setTimeout(()=>{
    point.value="";
    memo.value="";
    member.focus();
  },300);
});

function resetForm(){
  point.value="";
  memo.value="";
}
</script>

</body>
</html>
