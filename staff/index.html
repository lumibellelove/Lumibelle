<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>루미벨 스탭 페이지</title>
  <style>
    :root{
      --bg1:#fff8fc;
      --bg2:#fffdfd;
      --panel:rgba(255,255,255,.92);
      --line:#f3d9e7;
      --text:#7d5c6d;
      --soft:#b992a7;
      --pink:#ff79b5;
      --pink-deep:#ff5fa8;
      --shadow:0 18px 40px rgba(255,95,168,.12);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Noto Sans KR",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,185,220,.22), transparent 35%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .hidden{display:none !important;}

    .gate-box{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .gate-card,
    .card{
      background:var(--panel);
      backdrop-filter:blur(10px);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .gate-card{
      width:min(100%,420px);
      padding:28px 22px;
      text-align:center;
    }

    .gate-sub,
    .head .sub{
      font-size:12px;
      letter-spacing:.18em;
      color:var(--pink-deep);
      font-weight:700;
    }

    .gate-sub{margin-bottom:10px;}

    .gate-card h1{
      margin:0 0 10px;
      font-size:28px;
      color:#8a6377;
    }

    .gate-card p{
      margin:0 0 18px;
      font-size:14px;
      line-height:1.6;
      color:var(--soft);
    }

    .wrap{
      width:min(100%, 620px);
      margin:0 auto;
      padding:28px 18px 40px;
    }

    .head{
      padding:26px 22px 18px;
      background:linear-gradient(135deg, rgba(255,138,194,.22), rgba(255,95,168,.10));
      border-bottom:1px solid var(--line);
    }

    .head .sub{
      margin-bottom:8px;
    }

    .head h1{
      margin:0;
      font-size:28px;
      line-height:1.2;
      color:#8a6377;
    }

    .head p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--soft);
      line-height:1.6;
    }

    form{
      padding:20px;
      display:grid;
      gap:14px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    label{
      font-size:13px;
      font-weight:700;
      color:#9a7187;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:14px 15px;
      font:inherit;
      outline:none;
      transition:.2s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#f4a4ca;
      box-shadow:0 0 0 4px rgba(255,121,181,.12);
    }

    textarea{
      min-height:88px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .quick{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:6px;
    }

    .chip{
      padding:12px 8px;
      border-radius:14px;
      border:1px solid #f3d9e7;
      background:#fff;
      color:#ff5fa8;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
      transition:all .2s ease;
    }

    .chip:hover{
      background:#fff0f7;
      border-color:#f4a4ca;
      transform:translateY(-1px);
    }

    .chip.use{
      color:#a0617f;
      background:#fff7fb;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:4px;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:15px 16px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--pink),var(--pink-deep));
      color:#fff;
      box-shadow:0 12px 24px rgba(255,95,168,.22);
    }

    .btn-secondary{
      background:#fff;
      color:#a26f87;
      border:1px solid var(--line);
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .note{
      padding:0 20px 20px;
      color:#b08ba0;
      font-size:12px;
      line-height:1.7;
    }

    .status{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      display:none;
    }

    .status.show{display:block}
    .status.ok{
      background:#fff7fb;
      border:1px solid #f4cade;
      color:#a0617f;
    }

    .status.error{
      background:#fff7f7;
      border:1px solid #f3caca;
      color:#b45d6e;
    }

    .gate-error{
      display:none;
      margin:12px 0 0;
      color:#b45d6e;
      font-size:13px;
    }

    iframe{display:none}

    @media (max-width:520px){
      .head h1,
      .gate-card h1{
        font-size:24px;
      }

      .row,
      .actions{
        grid-template-columns:1fr;
      }

      .quick{
        grid-template-columns:repeat(2,1fr);
      }
    }
  </style>
</head>
<body>

  <!-- 비밀번호 입장 -->
  <div id="gate" class="gate-box">
    <div class="gate-card">
      <div class="gate-sub">LUMIBELLE STAFF</div>
      <h1>스탭 전용 입장</h1>
      <p>비밀번호를 입력하면 스탭 페이지가 열려요.</p>

      <input
        id="passwordInput"
        type="password"
        placeholder="비밀번호 입력"
      />

      <button
        id="loginBtn"
        class="btn btn-primary"
        type="button"
        style="width:100%; margin-top:12px;"
      >
        입장하기
      </button>

      <p id="gateError" class="gate-error">비밀번호가 맞지 않아.</p>
    </div>
  </div>

  <!-- 실제 스탭 페이지 -->
  <div id="staffPage" class="hidden">
    <div class="wrap">
      <div class="card">
        <div class="head">
          <div class="sub">LUMIBELLE STAFF</div>
          <h1>포인트 처리</h1>
          <p>회원번호를 입력하고 적립 또는 사용을 기록하세요.</p>
        </div>

        <form id="staffForm"
              action="https://docs.google.com/forms/d/e/1FAIpQLSdkBI418UPiPPEqF0YxEQ1_yvRD9ex-6pXkB9fXyV66f1TxpQ/formResponse"
              method="POST"
              target="hidden_iframe">

          <div class="row">
            <div class="field">
              <label for="staffName">스탭 이름</label>
              <input
                id="staffName"
                name="entry.517609756"
                type="text"
                placeholder="예: 마리링 / 루루 / 이로"
                required
              />
            </div>

            <div class="field">
              <label for="memberId">회원번호</label>
              <input
                id="memberId"
                name="entry.1501139250"
                type="text"
                placeholder="예: LB-001"
                required
              />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="type">구분</label>
              <select id="type" name="entry.668276280" required>
                <option value="적립" selected>적립</option>
                <option value="사용">사용</option>
              </select>
            </div>

            <div class="field">
              <label for="point">포인트</label>
              <input
                id="point"
                name="entry.1489084345"
                type="number"
                min="1"
                step="1"
                placeholder="예: 1"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="memo">메모</label>
            <textarea
              id="memo"
              name="entry.377436320"
              placeholder="예: 굿즈 구매 / 포인트 사용 / 현장 응대"
            ></textarea>
          </div>

          <div class="field">
            <label>빠른 입력</label>
            <div class="quick">
              <button type="button" class="chip" data-type="적립" data-point="1">+1</button>
              <button type="button" class="chip" data-type="적립" data-point="2">+2</button>
              <button type="button" class="chip" data-type="적립" data-point="3">+3</button>
              <button type="button" class="chip" data-type="적립" data-point="5">+5</button>
              <button type="button" class="chip" data-type="적립" data-point="10">+10</button>
              <button type="button" class="chip use" data-type="사용" data-point="100">사용 100</button>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">저장하기</button>
            <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
          </div>
        </form>

        <div class="note">
          ※ 적립 버튼은 구분과 포인트를 함께 채워줘요.<br />
          ※ 사용 100 버튼은 구분이 자동으로 ‘사용’으로 바뀌어요.<br />
          ※ 폼 질문 순서나 항목명을 바꾸면 entry 번호를 다시 확인해야 해요.
        </div>
      </div>

      <div id="statusBox" class="status"></div>
    </div>
  </div>

  <iframe name="hidden_iframe" id="hidden_iframe"></iframe>

  <script>
    const STAFF_PASSWORD = "lmb0712";

    const gate = document.getElementById("gate");
    const staffPage = document.getElementById("staffPage");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const gateError = document.getElementById("gateError");

    const form = document.getElementById("staffForm");
    const staffNameInput = document.getElementById("staffName");
    const memberInput = document.getElementById("memberId");
    const typeInput = document.getElementById("type");
    const pointInput = document.getElementById("point");
    const memoInput = document.getElementById("memo");
    const statusBox = document.getElementById("statusBox");
    const resetBtn = document.getElementById("resetBtn");
    const chips = document.querySelectorAll(".chip");

    function openStaffPage() {
      gate.classList.add("hidden");
      staffPage.classList.remove("hidden");
      setTimeout(() => {
        staffNameInput.focus();
      }, 50);
    }

    function checkPassword() {
      const input = passwordInput.value.trim();

      if (input === STAFF_PASSWORD) {
        sessionStorage.setItem("lb_staff_auth", "yes");
        gateError.style.display = "none";
        openStaffPage();
      } else {
        gateError.style.display = "block";
      }
    }

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function fillQuickAction(chip) {
      const selectedType = chip.dataset.type;
      const selectedPoint = chip.dataset.point;

      typeInput.value = selectedType;
      pointInput.value = selectedPoint;

      if (selectedType === "사용") {
        if (!memoInput.value.trim()) {
          memoInput.value = "포인트 사용";
        }
      }
    }

    loginBtn.addEventListener("click", checkPassword);

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        checkPassword();
      }
    });

    chips.forEach(chip => {
      chip.addEventListener("click", () => {
        fillQuickAction(chip);
      });
    });

    typeInput.addEventListener("change", () => {
      if (typeInput.value === "사용" && pointInput.value === "") {
        pointInput.value = 100;
      }
      if (typeInput.value === "사용" && !memoInput.value.trim()) {
        memoInput.value = "포인트 사용";
      }
    });

    form.addEventListener("submit", (e) => {
      if (!staffNameInput.value.trim()) {
        e.preventDefault();
        showStatus("스탭 이름을 입력해줘.", "error");
        return;
      }

      if (!memberInput.value.trim()) {
        e.preventDefault();
        showStatus("회원번호를 입력해줘.", "error");
        return;
      }

      if (!typeInput.value) {
        e.preventDefault();
        showStatus("구분을 선택해줘.", "error");
        return;
      }

      if (!pointInput.value || Number(pointInput.value) < 1) {
        e.preventDefault();
        showStatus("포인트를 1 이상 입력해줘.", "error");
        return;
      }

      if (typeInput.value === "사용" && Number(pointInput.value) !== 100) {
        const ok = confirm("사용 포인트가 100이 아니야. 그대로 저장할까?");
        if (!ok) {
          e.preventDefault();
          showStatus("사용 포인트를 다시 확인해줘.", "error");
          return;
        }
      }

      const savedStaffName = staffNameInput.value.trim();

      setTimeout(() => {
        showStatus("저장 완료! 다음 입력 진행해줘.", "ok");
        form.reset();
        staffNameInput.value = savedStaffName;
        typeInput.value = "적립";
        memberInput.focus();
      }, 500);
    });

    resetBtn.addEventListener("click", () => {
      const savedStaffName = staffNameInput.value.trim();
      form.reset();
      staffNameInput.value = savedStaffName;
      typeInput.value = "적립";
      statusBox.className = "status";
      statusBox.textContent = "";
      memberInput.focus();
    });

    window.addEventListener("load", () => {
      if (sessionStorage.getItem("lb_staff_auth") === "yes") {
        openStaffPage();
      }
    });
  </script>
</body>
</html>
