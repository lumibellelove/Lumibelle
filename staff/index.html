<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>루미벨 스탭 페이지</title>
  <style>
    *{
      box-sizing:border-box;
    }

    :root{
      --bg1:#fff8fc;
      --bg2:#fffdfd;
      --panel:rgba(255,255,255,.95);
      --line:#f3d9e7;
      --text:#7d5c6d;
      --soft:#b992a7;
      --pink:#ff79b5;
      --pink-deep:#ff5fa8;
      --shadow:0 18px 40px rgba(255,95,168,.12);
      --radius:24px;
    }

    body{
      margin:0;
      font-family:"Noto Sans KR", system-ui, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,185,220,.22), transparent 35%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .hidden{
      display:none !important;
    }

    .gate-box{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .gate-card,
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .gate-card{
      width:min(100%,420px);
      padding:28px 22px;
      text-align:center;
    }

    .gate-sub,
    .head .sub{
      font-size:12px;
      letter-spacing:.18em;
      color:var(--pink-deep);
      font-weight:700;
    }

    .gate-sub{
      margin-bottom:10px;
    }

    .gate-card h1{
      margin:0 0 10px;
      font-size:28px;
      color:#8a6377;
    }

    .gate-card p{
      margin:0 0 18px;
      font-size:14px;
      line-height:1.6;
      color:var(--soft);
    }

    .gate-error{
      display:none;
      margin:12px 0 0;
      color:#b45d6e;
      font-size:13px;
    }

    .wrap{
      width:min(100%,760px);
      margin:0 auto;
      padding:28px 18px 40px;
    }

    .head{
      padding:26px 22px 18px;
      background:linear-gradient(135deg, rgba(255,138,194,.22), rgba(255,95,168,.10));
      border-bottom:1px solid var(--line);
    }

    .head .sub{
      margin-bottom:8px;
    }

    .head h1{
      margin:0;
      font-size:28px;
      line-height:1.2;
      color:#8a6377;
    }

    .head p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--soft);
      line-height:1.6;
    }

    form{
      padding:20px;
      display:grid;
      gap:14px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    label{
      font-size:13px;
      font-weight:700;
      color:#9a7187;
    }

    input, select, textarea, button, a{
      font:inherit;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:14px 15px;
      outline:none;
      transition:.2s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#f4a4ca;
      box-shadow:0 0 0 4px rgba(255,121,181,.12);
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .member{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .member-prefix{
      flex:0 0 auto;
      padding:14px 16px;
      border-radius:16px;
      background:#fff0f7;
      border:1px solid #f3d9e7;
      color:#ff5fa8;
      font-weight:800;
      min-width:64px;
      text-align:center;
    }

    .member input{
      flex:1;
      min-width:0;
    }

    .quick{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:6px;
    }

    .chip{
      padding:12px 8px;
      border-radius:14px;
      border:1px solid #f3d9e7;
      background:#fff0f7;
      color:#ff5fa8;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:all .2s ease;
    }

    .chip:hover{
      background:#ffe7f3;
      border-color:#f4a4ca;
      transform:translateY(-1px);
    }

    .chip.use{
      background:#fff7fb;
      color:#a0617f;
    }

    .actions,
    .sub-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .sub-actions.single{
      grid-template-columns:1fr;
    }

    .btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      border:none;
      border-radius:18px;
      padding:15px 16px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--pink),var(--pink-deep));
      color:#fff;
      box-shadow:0 12px 24px rgba(255,95,168,.22);
    }

    .btn-secondary{
      background:#fff;
      color:#a26f87;
      border:1px solid var(--line);
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .note{
      padding:0 20px 20px;
      color:#b08ba0;
      font-size:12px;
      line-height:1.75;
    }

    .status{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      display:none;
    }

    .status.show{
      display:block;
    }

    .status.ok{
      background:#fff7fb;
      border:1px solid #f4cade;
      color:#a0617f;
    }

    .status.error{
      background:#fff7f7;
      border:1px solid #f3caca;
      color:#b45d6e;
    }

    iframe{
      display:none;
    }

    @media (max-width:640px){
      .head h1,
      .gate-card h1{
        font-size:24px;
      }

      .row,
      .actions,
      .sub-actions{
        grid-template-columns:1fr;
      }

      .quick{
        grid-template-columns:repeat(2,1fr);
      }
    }
  </style>
</head>
<body>

  <div id="gate" class="gate-box">
    <div class="gate-card">
      <div class="gate-sub">LUMIBELLE STAFF</div>
      <h1>스탭 전용 입장</h1>
      <p>비밀번호를 입력하면 스탭 페이지가 열려요.</p>

      <input id="passwordInput" type="password" placeholder="비밀번호 입력" />

      <button id="loginBtn" class="btn btn-primary" type="button" style="margin-top:12px;">
        입장하기
      </button>

      <p id="gateError" class="gate-error">비밀번호가 맞지 않아.</p>
    </div>
  </div>

  <div id="staffPage" class="hidden">
    <div class="wrap">
      <div class="card">
        <div class="head">
          <div class="sub">LUMIBELLE STAFF</div>
          <h1>포인트 적립기</h1>
          <p>스탭 선택은 유지되고, 회원번호는 숫자만 입력하면 돼요.</p>
        </div>

      <form id="staffForm">
          method="POST"
          target="hidden_iframe"
        >
          <input type="hidden" name="entry.517609756" id="staffHidden" />
          <input type="hidden" name="entry.1501139250" id="memberHidden" />

          <div class="row">
            <div class="field">
              <label for="staffSelect">스탭 선택</label>
              <select id="staffSelect" required>
                <option value="">스탭 선택</option>
                <option value="마리링">마리링</option>
                <option value="루루">루루</option>
                <option value="이로">이로</option>
                <option value="루나">루나</option>
              </select>
            </div>

            <div class="field">
              <label for="memberInput">회원번호</label>
              <div class="member">
                <div class="member-prefix">LB-</div>
                <input
                  id="memberInput"
                  type="text"
                  placeholder="001"
                  autocomplete="off"
                  required
                />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="type">구분</label>
              <select id="type" name="entry.668276280" required>
                <option value="적립" selected>적립</option>
                <option value="사용">사용</option>
              </select>
            </div>

            <div class="field">
              <label for="point">포인트</label>
              <input
                id="point"
                name="entry.1489084345"
                type="number"
                min="1"
                step="1"
                placeholder="포인트"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="memo">메모</label>
            <textarea
              id="memo"
              name="entry.377436320"
              placeholder="메모"
            ></textarea>
          </div>

          <div class="field">
            <label>빠른 입력</label>
            <div class="quick">
              <button type="button" class="chip" data-add="1">+1</button>
              <button type="button" class="chip" data-add="2">+2</button>
              <button type="button" class="chip" data-add="3">+3</button>
              <button type="button" class="chip" data-add="5">+5</button>
              <button type="button" class="chip" data-add="10">+10</button>
              <button type="button" class="chip use" id="use100Btn">사용100</button>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit">저장</button>
            <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
          </div>

          <div class="sub-actions">
            <a
              class="btn btn-secondary"
              href="https://docs.google.com/spreadsheets/d/1Os_YlqM5yY1owd2a4jS4QdQDeTubu1yuuKI4ownDqh8/edit?usp=sharing"
              target="_blank"
              rel="noopener noreferrer"
            >
              기록 보기
            </a>
            <button type="button" class="btn btn-secondary" id="logoutBtn">스탭 변경</button>
          </div>
        </form>

        <div class="note">
          ※ 적립 버튼은 누적돼요. 예: +1 → +1 → +3 = 5<br />
          ※ 사용100 버튼은 구분이 자동으로 ‘사용’으로 바뀌어요.<br />
          ※ 스탭 선택은 한 번 하면 유지돼요.
        </div>
      </div>

      <div id="statusBox" class="status"></div>
    </div>
  </div>

  <iframe name="hidden_iframe"></iframe>

  <script>
    const STAFF_PASSWORD = "lmb0712";
    const STAFF_NAME_KEY = "lb_staff_name";

    const gate = document.getElementById("gate");
    const staffPage = document.getElementById("staffPage");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const gateError = document.getElementById("gateError");

    const form = document.getElementById("staffForm");
    const staffSelect = document.getElementById("staffSelect");
    const staffHidden = document.getElementById("staffHidden");
    const memberInput = document.getElementById("memberInput");
    const memberHidden = document.getElementById("memberHidden");
    const typeInput = document.getElementById("type");
    const pointInput = document.getElementById("point");
    const memoInput = document.getElementById("memo");
    const resetBtn = document.getElementById("resetBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusBox = document.getElementById("statusBox");
    const quickButtons = document.querySelectorAll(".chip[data-add]");
    const use100Btn = document.getElementById("use100Btn");

    staffSelect.value = localStorage.getItem(STAFF_NAME_KEY) || "";

    staffSelect.addEventListener("change", () => {
      localStorage.setItem(STAFF_NAME_KEY, staffSelect.value);
    });

    function openStaffPage() {
      gate.classList.add("hidden");
      staffPage.classList.remove("hidden");
      setTimeout(() => {
        if (staffSelect.value) {
          memberInput.focus();
        } else {
          staffSelect.focus();
        }
      }, 50);
    }

    function checkPassword() {
      const input = passwordInput.value.trim();

      if (input === STAFF_PASSWORD) {
        sessionStorage.setItem("lb_staff_auth", "yes");
        gateError.style.display = "none";
        openStaffPage();
      } else {
        gateError.style.display = "block";
      }
    }

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    loginBtn.addEventListener("click", checkPassword);

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        checkPassword();
      }
    });

    quickButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        typeInput.value = "적립";
        pointInput.value = (Number(pointInput.value) || 0) + Number(btn.dataset.add);
      });
    });

    use100Btn.addEventListener("click", () => {
      typeInput.value = "사용";
      pointInput.value = 100;
      if (!memoInput.value.trim()) {
        memoInput.value = "포인트 사용";
      }
    });

    typeInput.addEventListener("change", () => {
      if (typeInput.value === "사용" && !pointInput.value) {
        pointInput.value = 100;
      }
      if (typeInput.value === "사용" && !memoInput.value.trim()) {
        memoInput.value = "포인트 사용";
      }
    });

  form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const staff = staffSelect.value;
  const member = memberInput.value.trim();
  const type = typeInput.value;
  const point = pointInput.value;
  const memo = memoInput.value;

  if (!staff || !member || !point) {
    showStatus("입력 확인해줘", "error");
    return;
  }

  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbzMf1Kxtzz1KbqoqoQOOSbzcRyomYaQZd32ls9-hDDtuc5YR4hVPjp5LHLpAy0fpsDv/exec", {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        staff: staff,
        memberId: "LB-" + member,
        type: type,
        point: point,
        memo: memo
      })
    });

    const text = await response.text();
    console.log("앱스크립트 응답:", response.status, text);

    if (!response.ok || text.trim() !== "ok") {
      throw new Error("시트 저장 응답이 정상이 아님");
    }

    showStatus("저장 완료!", "ok");

  } catch (err) {
    console.error(err);
    showStatus("저장 실패", "error");
  }
});

    resetBtn.addEventListener("click", () => {
      pointInput.value = "";
      memoInput.value = "";
      typeInput.value = "적립";
      memberInput.value = "";
      statusBox.className = "status";
      statusBox.textContent = "";
      memberInput.focus();
    });

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(STAFF_NAME_KEY);
      sessionStorage.removeItem("lb_staff_auth");
      location.reload();
    });

    window.addEventListener("load", () => {
      if (sessionStorage.getItem("lb_staff_auth") === "yes") {
        openStaffPage();
      }
    });
  </script>
</body>
</html>
