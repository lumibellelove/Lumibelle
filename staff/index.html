<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumibelle Staff</title>

  <style>
    body{
      margin:0;
      font-family:"Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,#fff8fc,#fffdfd);
      color:#7d5c6d;
    }

    .wrap{
      width:min(100%,500px);
      margin:0 auto;
      padding:30px 16px;
    }

    .card{
      background:#fff;
      border-radius:20px;
      padding:20px;
      box-shadow:0 10px 25px rgba(255,95,168,.15);
    }

    h1{margin:0 0 10px}
    p{margin:0 0 20px}

    input,select,textarea{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #eee;
      margin-bottom:10px;
      font:inherit;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#ff79b5,#ff5fa8);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .chip{
      width:23%;
      margin:2px;
      padding:10px;
      border-radius:10px;
      border:1px solid #eee;
      background:#fff;
      cursor:pointer;
    }

    .hidden{display:none}
  </style>
</head>

<body>

<!-- 🔒 비밀번호 화면 -->
<div id="gate" class="wrap">
  <div class="card">
    <h1>스탭 전용</h1>
    <p>비밀번호 입력</p>

    <input id="pw" type="password" placeholder="비밀번호"/>
    <button onclick="login()">입장</button>
  </div>
</div>

<!-- 🌸 실제 스탭 페이지 -->
<div id="staff" class="wrap hidden">
  <div class="card">
    <h1>포인트 처리</h1>
    <p>회원번호 입력 후 적립</p>

    <form id="form"
      action="https://docs.google.com/forms/d/e/1FAIpQLSdkBI418UPiPPEqF0YxEQ1_yvRD9ex-6pXkB9fXyV66f1TxpQ/formResponse"
      method="POST"
      target="hidden_iframe">

      <input name="entry.1501139250" placeholder="회원번호 (LB-001)" required>

      <select name="entry.668276280" required>
        <option value="">선택</option>
        <option value="적립">적립</option>
        <option value="사용">사용</option>
      </select>

      <input name="entry.1489084345" type="number" placeholder="포인트" required>

      <textarea name="entry.377436320" placeholder="메모"></textarea>

      <div>
        <button type="button" class="chip" onclick="setPoint(1)">+1</button>
        <button type="button" class="chip" onclick="setPoint(2)">+2</button>
        <button type="button" class="chip" onclick="setPoint(3)">+3</button>
        <button type="button" class="chip" onclick="setPoint(5)">+5</button>
      </div>

      <button type="submit">저장하기</button>
    </form>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
const PASSWORD = "lmb0712"; // 🔑 여기 바꿔

function login(){
  const pw = document.getElementById("pw").value;
  if(pw === PASSWORD){
    sessionStorage.setItem("staff","yes");
    document.getElementById("gate").style.display="none";
    document.getElementById("staff").classList.remove("hidden");
  }else{
    alert("비밀번호 틀림");
  }
}

function setPoint(n){
  document.querySelector('input[type="number"]').value = n;
}

window.onload = ()=>{
  if(sessionStorage.getItem("staff")==="yes"){
    document.getElementById("gate").style.display="none";
    document.getElementById("staff").classList.remove("hidden");
  }
}
</script>

</body>
</html>
