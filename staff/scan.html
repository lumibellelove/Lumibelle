<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lumibelle Staff Check-in</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SUIT:wght@600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; overflow-x:hidden; }
    body {
      min-height:100vh;
      font-family:"SUIT","Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,#fffafc 0%,#fff0f7 100%);
      color:#7f6a77;
      padding:10px;
    }
    .wrap { width:100%; max-width:560px; margin:0 auto; }
    .hero {
      background:linear-gradient(135deg,#fff0f7,#f7efff);
      border:1px solid #f2d8e7;
      border-radius:24px;
      padding:22px 14px;
      text-align:center;
      box-shadow:0 8px 22px rgba(232,191,211,.18);
    }
    .hero small { display:block; color:#ff5fa8; font-size:12px; font-weight:900; margin-bottom:8px; }
    h1 { margin:0; color:#ff5fa8; font-size:32px; line-height:1.12; font-weight:900; }
    .hero p { margin:12px 0 0; color:#8f7183; font-size:13px; line-height:1.6; font-weight:800; }
    .card {
      margin-top:12px;
      background:#fff;
      border:1px solid #f2d8e7;
      border-radius:22px;
      padding:12px;
      box-shadow:0 8px 20px rgba(255,95,165,.08);
      overflow:hidden;
    }
    button {
      width:100%;
      min-height:50px;
      border:0;
      border-radius:999px;
      font-family:inherit;
      font-size:14px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-align:center;
      padding:0 12px;
      line-height:1.2;
    }
    .scan { background:linear-gradient(180deg,#78d6ff,#4fc3ff); color:#fff; box-shadow:0 8px 18px rgba(79,195,255,.25); }
    .pink { background:linear-gradient(180deg,#ff7eb3,#ff5fa5); color:#fff; box-shadow:0 8px 18px rgba(255,95,165,.22); }
    .purple { background:linear-gradient(180deg,#bca7ff,#a88cff); color:#fff; box-shadow:0 8px 18px rgba(168,140,255,.22); }
    .sub { background:#fff0f7; color:#d77ca7; border:1px solid #f0bfd4; }
    .reader-box {
      display:none;
      margin-top:12px;
      padding:10px;
      border-radius:18px;
      border:1px solid #f2d8e7;
      background:#fff7fb;
      overflow:hidden;
    }
    .reader-box.on { display:block; }
    #reader { width:100%; max-width:100%; border-radius:14px; overflow:hidden; background:#fff; }
    label { display:block; margin:14px 0 8px; color:#d77ca7; font-size:15px; font-weight:900; }
    input {
      width:100%;
      min-height:50px;
      border:1px solid #f0bfd4;
      border-radius:16px;
      padding:0 14px;
      font-size:17px;
      font-weight:900;
      color:#7f6a77;
      outline:none;
    }
    input:focus { border-color:#ff8ac2; box-shadow:0 0 0 4px rgba(255,138,194,.14); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .wide { grid-column:1 / -1; }
    .msg {
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      background:#fff0f7;
      color:#d77ca7;
      font-size:13px;
      font-weight:900;
      line-height:1.6;
      text-align:center;
      word-break:break-word;
    }
    .msg.ok { background:#e9fff0; color:#21864a; }
    .msg.err { background:#fff2e8; color:#d36b36; }
    .list { display:grid; gap:10px; margin-top:12px; }
    .result-btn {
      width:100%;
      min-height:auto;
      border-radius:18px;
      background:linear-gradient(180deg,#fffafd,#fff4fa);
      border:1px solid #f2d8e7;
      color:#7f6a77;
      padding:14px;
      display:block;
      text-align:left;
      box-shadow:none;
    }
    .result-btn strong { display:block; color:#d77ca7; font-size:15px; margin-bottom:6px; }
    .result-btn p { margin:4px 0; font-size:12.5px; line-height:1.45; font-weight:800; }
    .result-btn b { color:#d77ca7; }
    .detail {
      margin-top:12px;
      border:1px solid #f2d8e7;
      border-radius:20px;
      padding:12px;
      background:#fffafd;
    }
    .line {
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #f2d8e7;
      font-size:13.5px;
    }
    .line:last-child { border-bottom:0; }
    .line strong { color:#d77ca7; flex:0 0 auto; }
    .line span { text-align:right; font-weight:900; word-break:break-word; }
    .status {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      font-size:12.5px;
      font-weight:900;
    }
    .ok-pill { background:#e5f8eb; color:#208846; }
    .wait-pill { background:#fff7d6; color:#9c7a00; }
    .gray-pill { background:#f0edf0; color:#8a7b85; }
    .bad-pill { background:#ffe6e6; color:#c84242; }
    .note { margin:12px 0 0; text-align:center; font-size:11.5px; line-height:1.6; color:#b28ea2; font-weight:700; }
    @media (max-width:360px) {
      .grid { grid-template-columns:1fr; }
      .wide { grid-column:auto; }
      h1 { font-size:28px; }
      .line { flex-direction:column; }
      .line span { text-align:left; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <small>STAFF ONLY</small>
      <h1>Lumibelle<br>Check-in</h1>
      <p>스캔 후에도 페이지 이동 없이<br>이 화면에서 바로 조회해요.</p>
    </section>

    <section class="card">
      <button class="scan" type="button" onclick="startScan()">QR 스캔 시작</button>

      <div id="readerBox" class="reader-box">
        <div id="reader"></div>
        <button class="sub" type="button" style="margin-top:10px;" onclick="stopScan()">스캔 닫기</button>
      </div>

      <label for="q">검색어</label>
      <input id="q" placeholder="예: 1180 / 김민지 / 닉네임 / 8648">

      <div class="grid">
        <button class="pink" type="button" onclick="searchTicket()">예약번호</button>
        <button class="purple" type="button" onclick="searchLumi()">LB- ID</button>
        <button class="sub wide" type="button" onclick="searchRaw()">입금자명/닉네임 조회</button>
      </div>

      <div id="msg" class="msg">QR을 스캔하거나 직접 입력해 주세요.</div>
      <div id="results"></div>

      <p class="note">
        ※ QR에는 개인정보가 아닌 예약번호만 들어 있습니다.<br>
        ※ 이번 버전은 스캔 인식 즉시 조회를 먼저 실행하고, 카메라는 뒤에서 닫아요.
      </p>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwJRbaZDXnquhBTYaa4R1Onaq0pkDLUWPip0pjzoAcdkcUVNYCCZ2wHWtzCyQLZ0sboJQ/exec";

    let qr = null;
    let running = false;
    let scanLocked = false;
    let selectedTicketId = "";

    function msg(text, cls) {
      const el = document.getElementById("msg");
      el.className = "msg" + (cls ? " " + cls : "");
      el.innerHTML = text;
    }

    function clean(v) {
      return String(v || "").trim().toUpperCase().replace(/\s+/g, "");
    }

    function ticket(v) {
      v = clean(v);
      try {
        const url = new URL(v);
        const id = url.searchParams.get("id");
        if (id) v = clean(id);
      } catch(e) {}
      if (/^\d{4}$/.test(v)) return "LBT-0712-" + v;
      return v;
    }

    function lumi(v) {
      v = clean(v);
      if (/^\d{4}$/.test(v)) return "LB-" + v;
      if (/^LB\d{4}$/.test(v)) return "LB-" + v.replace("LB", "");
      return v;
    }

    function jsonp(params) {
      return new Promise(function(resolve, reject) {
        const cbName = "__lumibelle_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        params.callback = cbName;

        const qs = Object.keys(params)
          .map(function(k){ return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]); })
          .join("&");

        const script = document.createElement("script");
        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("요청 시간이 초과됐어요."));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cbName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("API 호출에 실패했어요."));
        };

        script.src = API_URL + "?" + qs;
        document.body.appendChild(script);
      });
    }

    function searchTicket() {
      const value = ticket(document.getElementById("q").value);
      if (!value) return msg("예약번호를 입력해 주세요.", "err");
      document.getElementById("q").value = value;
      search(value);
    }

    function searchLumi() {
      const value = lumi(document.getElementById("q").value);
      if (!value) return msg("루미ID 숫자 4자리를 입력해 주세요.", "err");
      document.getElementById("q").value = value;
      search(value);
    }

    function searchRaw() {
      const value = String(document.getElementById("q").value || "").trim();
      if (!value) return msg("입금자명, 닉네임, 예약번호, 루미ID 중 하나를 입력해 주세요.", "err");
      search(value);
    }

    async function search(value) {
      selectedTicketId = "";
      document.getElementById("results").innerHTML = "";
      msg("조회 중이에요...", "");

      try {
        const res = await jsonp({ action: "search", q: value });

        if (!res.ok) {
          msg("조회 오류: " + escapeHtml(res.error || "알 수 없는 오류"), "err");
          return;
        }

        if (!res.found || !res.items || !res.items.length) {
          msg("예약 정보를 찾을 수 없어요.", "err");
          return;
        }

        if (res.items.length === 1) {
          renderDetail(res.items[0]);
        } else {
          renderList(res.items);
        }
      } catch (e) {
        msg(escapeHtml(e.message || e), "err");
      }
    }

    function renderList(items) {
      msg("검색 결과가 " + items.length + "건 있어요.<br>메아테와 닉네임을 확인하고 선택해 주세요.", "ok");
      let html = '<div class="list">';

      items.forEach(function(item, index) {
        html += '<button class="result-btn" type="button" onclick="selectFromList(' + index + ')">';
        html += '<strong>' + escapeHtml(item.depositor || "-") + ' / ' + escapeHtml(item.nickname || "-") + '</strong>';
        html += '<p><b>메아테</b> ' + escapeHtml(item.meate || "-") + '</p>';
        html += '<p><b>예약번호</b> ' + escapeHtml(item.ticketId || "-") + '</p>';
        html += '<p><b>루미ID</b> ' + escapeHtml(item.lumiId || "-") + '</p>';
        html += '<p><b>결제</b> ' + escapeHtml(item.paymentStatus || "-") + ' / <b>입장</b> ' + escapeHtml(item.entryStatus || "-") + '</p>';
        html += '</button>';
      });

      html += '</div>';
      window.__searchItems = items;
      document.getElementById("results").innerHTML = html;
    }

    function selectFromList(index) {
      const item = window.__searchItems && window.__searchItems[index];
      if (item) renderDetail(item);
    }

    function statusClass(value) {
      if (value === "입금확인완료" || value === "입장완료") return "ok-pill";
      if (value === "입금확인대기") return "wait-pill";
      if (value === "미입장") return "gray-pill";
      return "bad-pill";
    }

    function renderDetail(data) {
      selectedTicketId = data.ticketId || "";

      const payClass = statusClass(data.paymentStatus);
      const entryClass = statusClass(data.entryStatus);

      let button = "";

      if (data.entryStatus === "입장완료") {
        button = '<div class="msg ok">이미 입장완료 처리된 예약이에요.<br>입장시간: ' + escapeHtml(data.entryTime || "-") + '</div>';
      } else if (data.paymentStatus !== "입금확인완료") {
        button = '<div class="msg err">아직 입금확인완료가 아니에요.<br>현장 확인 후 처리해 주세요.</div><button class="pink" type="button" style="margin-top:10px;" onclick="checkin()">그래도 입장완료 처리</button>';
      } else {
        button = '<button class="pink" type="button" style="margin-top:10px;" onclick="checkin()">입장완료 처리</button>';
      }

      const html =
        '<div class="detail">' +
        row("예약번호", data.ticketId) +
        row("루미ID", data.lumiId) +
        row("닉네임", data.nickname) +
        row("입금자명", data.depositor) +
        row("메아테", data.meate) +
        row("티켓", data.ticketType) +
        row("결제상태", '<span class="status ' + payClass + '">' + escapeHtml(data.paymentStatus || "-") + '</span>', true) +
        row("입장상태", '<span class="status ' + entryClass + '">' + escapeHtml(data.entryStatus || "-") + '</span>', true) +
        row("입장시간", data.entryTime || "-") +
        button +
        '</div>';

      msg("예약 정보를 찾았어요.", "ok");
      document.getElementById("results").innerHTML = html;
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function row(label, value, raw) {
      return '<div class="line"><strong>' + label + '</strong><span>' + (raw ? value : escapeHtml(value || "-")) + '</span></div>';
    }

    async function checkin() {
      if (!selectedTicketId) return msg("예약번호를 찾지 못했어요.", "err");
      if (!confirm("이 예약을 입장완료 처리할까요?")) return;

      msg("입장완료 처리 중이에요...", "");

      try {
        const res = await jsonp({ action: "checkin", ticketId: selectedTicketId });

        if (!res.ok) {
          msg("입장 처리 오류: " + escapeHtml(res.error || "알 수 없는 오류"), "err");
          return;
        }

        msg("입장완료 처리됐어요.", "ok");
        renderDetail(res.item);
      } catch (e) {
        msg(escapeHtml(e.message || e), "err");
      }
    }

    function startScan() {
      scanLocked = false;
      document.getElementById("readerBox").classList.add("on");

      if (running) return;

      if (typeof Html5Qrcode === "undefined") {
        msg("QR 스캔 기능을 불러오지 못했어요. 인터넷 연결을 확인해 주세요.", "err");
        return;
      }

      qr = new Html5Qrcode("reader");

      qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 230, height: 230 } },
        function(decodedText) {
          if (scanLocked) return;
          scanLocked = true;

          const value = ticket(decodedText);
          document.getElementById("q").value = value;
          msg("QR 인식 완료!<br>" + escapeHtml(value) + "<br>조회 중이에요...", "ok");

          // 중요: 모바일에서 stop() Promise가 멈추는 경우가 있어서,
          // 카메라를 닫기 전에 먼저 조회를 실행해요.
          search(value);

          setTimeout(function() {
            stopScan();
          }, 250);
        },
        function() {}
      ).then(function() {
        running = true;
        msg("카메라가 켜졌어요. 팬의 QR을 비춰주세요.", "ok");
      }).catch(function() {
        running = false;
        msg("카메라를 열 수 없어요. 브라우저 카메라 권한을 허용해 주세요.", "err");
      });
    }

    function stopScan() {
      document.getElementById("readerBox").classList.remove("on");

      if (qr && running) {
        return qr.stop().then(function() {
          qr.clear();
          running = false;
        }).catch(function() {
          running = false;
        });
      }

      return Promise.resolve();
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function(m) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m];
      });
    }

    document.getElementById("q").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        searchTicket();
      }
    });
  </script>
</body>
</html>
