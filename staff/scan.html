<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lumibelle Staff Scan</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SUIT:wght@600;700;800;900&display=swap');

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      font-family: "SUIT", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #fffafc 0%, #fff0f7 100%);
      color: #7f6a77;
    }

    body { padding: 10px; }

    .wrap {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #fff0f7, #f7efff);
      border: 1px solid #f2d8e7;
      border-radius: 24px;
      padding: 22px 14px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(232,191,211,.18);
    }

    .hero small {
      display: block;
      color: #ff5fa8;
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 12px;
    }

    h1 {
      margin: 0;
      color: #ff5fa8;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
    }

    .hero p {
      margin: 12px 0 0;
      font-size: 13px;
      line-height: 1.6;
      font-weight: 800;
      color: #8f7183;
    }

    .card {
      margin-top: 12px;
      background: #fff;
      border: 1px solid #f2d8e7;
      border-radius: 22px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(255,95,165,.08);
      overflow: hidden;
    }

    button, a.btn {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-align: center;
      padding: 0 12px;
      line-height: 1.2;
    }

    .scan {
      background: linear-gradient(180deg, #78d6ff, #4fc3ff);
      color: white;
      box-shadow: 0 8px 18px rgba(79,195,255,.25);
    }

    .pink {
      background: linear-gradient(180deg, #ff7eb3, #ff5fa5);
      color: white;
      box-shadow: 0 8px 18px rgba(255,95,165,.22);
    }

    .purple {
      background: linear-gradient(180deg, #bca7ff, #a88cff);
      color: white;
      box-shadow: 0 8px 18px rgba(168,140,255,.22);
    }

    .green {
      background: linear-gradient(180deg, #6edb91, #31b765);
      color: white;
      box-shadow: 0 8px 18px rgba(49,183,101,.22);
    }

    .sub {
      background: #fff0f7;
      color: #d77ca7;
      border: 1px solid #f0bfd4;
    }

    .reader-box {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid #f2d8e7;
      background: #fff7fb;
      overflow: hidden;
    }

    .reader-box.on { display: block; }

    #reader {
      width: 100%;
      max-width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    .msg {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: #fff0f7;
      color: #d77ca7;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.6;
      text-align: center;
      word-break: break-word;
    }

    .msg.ok { background: #e9fff0; color: #21864a; }
    .msg.err { background: #fff2e8; color: #d36b36; }

    .open-box {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 18px;
      background: #f8fff9;
      border: 1px solid #ccefd7;
    }

    .open-box.on { display: block; }

    .found {
      margin: 0 0 10px;
      color: #21864a;
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      line-height: 1.6;
      word-break: break-word;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      color: #d77ca7;
      font-size: 15px;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 50px;
      border: 1px solid #f0bfd4;
      border-radius: 16px;
      padding: 0 14px;
      font-size: 17px;
      font-weight: 900;
      color: #7f6a77;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .wide { grid-column: 1 / -1; }

    .note {
      margin: 12px 0 0;
      text-align: center;
      font-size: 11.5px;
      line-height: 1.6;
      color: #b28ea2;
      font-weight: 700;
    }

    .raw-link {
      display: block;
      margin-top: 10px;
      color: #8d75c9;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
      word-break: break-all;
      text-align: center;
    }

    @media (max-width: 360px) {
      .grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <small>STAFF ONLY</small>
      <h1>Lumibelle<br>QR Scan</h1>
      <p>QR을 스캔하거나<br>번호/이름/닉네임으로 빠르게 조회해요.</p>
    </section>

    <section class="card">
      <button class="scan" type="button" onclick="startScan()">QR 스캔 시작</button>

      <div id="readerBox" class="reader-box">
        <div id="reader"></div>
        <button class="sub" type="button" style="margin-top:10px;" onclick="stopScan()">스캔 닫기</button>
      </div>

      <div id="openBox" class="open-box">
        <p id="foundText" class="found">조회 준비 완료</p>
        <a id="openLink" class="btn green" href="#" target="_blank" rel="noopener">입장확인 페이지 열기</a>
        <button class="sub" type="button" style="margin-top:8px;" onclick="copyLink()">링크 복사</button>
        <a id="rawLink" class="raw-link" href="#" target="_blank" rel="noopener"></a>
      </div>

      <label for="q">수동 입력</label>
      <input id="q" placeholder="예: 1180 / 김민지 / 닉네임 / 8648">

      <div class="grid">
        <button class="pink" type="button" onclick="prepareTicket()">예약번호</button>
        <button class="purple" type="button" onclick="prepareLumi()">LB- ID</button>
        <button class="sub wide" type="button" onclick="prepareSearch()">입금자명/닉네임 조회</button>
      </div>

      <div id="msg" class="msg">QR을 스캔하거나 직접 입력해 주세요.</div>

      <p class="note">
        ※ 버튼을 눌렀는데 이동이 안 되면, 아래에 뜨는 주소를 길게 눌러 새 탭으로 열어주세요.<br>
        ※ QR에는 개인정보가 아닌 예약번호만 들어 있습니다.
      </p>
    </section>
  </div>

  <script>
    const CHECKIN_URL = "https://script.google.com/macros/s/AKfycbzan2-YWU9W7q5YKFN_gf7z7uYaWQlTGvrXcpTzobXPDfi3ZX969ARWsFb6VoExTyRHDA/exec";

    let qr = null;
    let running = false;
    let currentUrl = "";

    function msg(text, cls) {
      const el = document.getElementById("msg");
      el.className = "msg" + (cls ? " " + cls : "");
      el.innerHTML = text;
    }

    function clean(v) {
      return String(v || "").trim().toUpperCase().replace(/\s+/g, "");
    }

    function ticket(v) {
      v = clean(v);

      try {
        const url = new URL(v);
        const id = url.searchParams.get("id");
        if (id) v = clean(id);
      } catch(e) {}

      if (/^\d{4}$/.test(v)) return "LBT-0712-" + v;
      return v;
    }

    function lumi(v) {
      v = clean(v);
      if (/^\d{4}$/.test(v)) return "LB-" + v;
      if (/^LB\d{4}$/.test(v)) return "LB-" + v.replace("LB", "");
      return v;
    }

    function href(v) {
      return CHECKIN_URL + "?id=" + encodeURIComponent(v);
    }

    function showOpen(v, label) {
      if (!v) {
        msg("조회할 값을 찾지 못했어요.", "err");
        return;
      }

      currentUrl = href(v);

      document.getElementById("q").value = v;
      document.getElementById("foundText").innerHTML =
        (label || "조회 준비 완료") + "<br>" + escapeHtml(v);

      const openLink = document.getElementById("openLink");
      const rawLink = document.getElementById("rawLink");

      openLink.href = currentUrl;
      rawLink.href = currentUrl;
      rawLink.textContent = currentUrl;

      document.getElementById("openBox").classList.add("on");
      msg("초록 버튼을 눌러 입장확인 페이지를 열어주세요.", "ok");
    }

    function prepareTicket() {
      const v = ticket(document.getElementById("q").value);
      showOpen(v, "예약번호 조회 준비 완료");
    }

    function prepareLumi() {
      const v = lumi(document.getElementById("q").value);
      showOpen(v, "루미ID 조회 준비 완료");
    }

    function prepareSearch() {
      const v = String(document.getElementById("q").value || "").trim();
      showOpen(v, "통합 조회 준비 완료");
    }

    async function copyLink() {
      if (!currentUrl) return;
      try {
        await navigator.clipboard.writeText(currentUrl);
        msg("링크를 복사했어요.", "ok");
      } catch(e) {
        msg("복사가 안 되면 아래 주소를 길게 눌러 복사해 주세요.", "err");
      }
    }

    function startScan() {
      document.getElementById("openBox").classList.remove("on");
      document.getElementById("readerBox").classList.add("on");

      if (running) return;

      if (typeof Html5Qrcode === "undefined") {
        msg("QR 스캔 기능을 불러오지 못했어요. 인터넷 연결을 확인해 주세요.", "err");
        return;
      }

      qr = new Html5Qrcode("reader");

      qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 230, height: 230 } },
        function(decodedText) {
          stopScan().then(function() {
            const v = ticket(decodedText);
            showOpen(v, "QR 인식 완료");
          });
        },
        function() {}
      ).then(function() {
        running = true;
        msg("카메라가 켜졌어요. 팬의 QR을 비춰주세요.", "ok");
      }).catch(function() {
        running = false;
        msg("카메라를 열 수 없어요. 브라우저 카메라 권한을 허용해 주세요.", "err");
      });
    }

    function stopScan() {
      document.getElementById("readerBox").classList.remove("on");

      if (qr && running) {
        return qr.stop().then(function() {
          qr.clear();
          running = false;
        }).catch(function() {
          running = false;
        });
      }

      return Promise.resolve();
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function(m) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m];
      });
    }

    document.getElementById("q").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        prepareTicket();
      }
    });
  </script>
</body>
</html>
