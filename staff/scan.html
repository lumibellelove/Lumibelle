<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lumibelle Staff Check-in</title>

  <!-- QR libraries -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=SUIT:wght@600;700;800;900&display=swap');

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;width:100%;overflow-x:hidden}

    body{
      min-height:100vh;
      font-family:"SUIT","Noto Sans KR",sans-serif;
      background:
        radial-gradient(circle at 12% 8%,rgba(255,192,215,.30) 0%,rgba(255,192,215,0) 28%),
        radial-gradient(circle at 88% 18%,rgba(202,167,255,.20) 0%,rgba(202,167,255,0) 26%),
        linear-gradient(180deg,#fffafc 0%,#fff0f7 100%);
      color:#7f6a77;
      padding:10px;
    }

    .wrap{width:100%;max-width:560px;margin:0 auto}

    .hero{
      background:linear-gradient(135deg,#fff0f7,#f7efff);
      border:1px solid #f2d8e7;
      border-radius:24px;
      padding:22px 14px;
      text-align:center;
      box-shadow:0 8px 22px rgba(232,191,211,.18);
    }

    .hero small{display:block;color:#ff5fa8;font-size:12px;font-weight:900;margin-bottom:8px}
    h1{margin:0;color:#ff5fa8;font-size:32px;line-height:1.12;font-weight:900}
    .hero p{margin:12px 0 0;color:#8f7183;font-size:13px;line-height:1.6;font-weight:800}

    .card{
      margin-top:12px;
      background:#fff;
      border:1px solid #f2d8e7;
      border-radius:22px;
      padding:12px;
      box-shadow:0 8px 20px rgba(255,95,165,.08);
      overflow:hidden;
    }

    button,label.file-btn{
      width:100%;
      min-height:50px;
      border:0;
      border-radius:999px;
      font-family:inherit;
      font-size:14px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-align:center;
      padding:0 12px;
      line-height:1.2;
      text-decoration:none;
    }

    .scan{background:linear-gradient(180deg,#78d6ff,#4fc3ff);color:#fff;box-shadow:0 8px 18px rgba(79,195,255,.25)}
    .pink{background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;box-shadow:0 8px 18px rgba(255,95,165,.22)}
    .purple{background:linear-gradient(180deg,#bca7ff,#a88cff);color:#fff;box-shadow:0 8px 18px rgba(168,140,255,.22)}
    .sub{background:#fff0f7;color:#d77ca7;border:1px solid #f0bfd4}

    .reader-box{
      display:none;
      margin-top:12px;
      padding:10px;
      border-radius:18px;
      border:1px solid #f2d8e7;
      background:#fff7fb;
      overflow:hidden;
    }

    .reader-box.on{display:block}

    #reader{
      width:100%;
      max-width:100%;
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }

    .photo-box{
      margin-top:12px;
      padding:10px;
      border-radius:18px;
      border:1px solid #f2d8e7;
      background:#fff7fb;
      display:none;
    }

    .photo-box.on{display:block}

    #preview{
      width:100%;
      max-height:320px;
      object-fit:contain;
      border-radius:14px;
      background:#fff;
      display:none;
      margin-top:10px;
    }

    input[type="file"]{display:none}

    label.text-label{display:block;margin:14px 0 8px;color:#d77ca7;font-size:15px;font-weight:900}

    input[type="text"]{
      width:100%;
      min-height:50px;
      border:1px solid #f0bfd4;
      border-radius:16px;
      padding:0 14px;
      font-size:17px;
      font-weight:900;
      color:#7f6a77;
      outline:none;
    }

    input[type="text"]:focus{
      border-color:#ff8ac2;
      box-shadow:0 0 0 4px rgba(255,138,194,.14);
    }

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .wide{grid-column:1 / -1}

    .msg{
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      background:#fff0f7;
      color:#d77ca7;
      font-size:13px;
      font-weight:900;
      line-height:1.6;
      text-align:center;
      word-break:break-word;
    }

    .msg.ok{background:#e9fff0;color:#21864a}
    .msg.err{background:#fff2e8;color:#d36b36}

    .list{display:grid;gap:10px;margin-top:12px}

    .result-btn{
      width:100%;
      min-height:auto;
      border-radius:18px;
      background:linear-gradient(180deg,#fffafd,#fff4fa);
      border:1px solid #f2d8e7;
      color:#7f6a77;
      padding:14px;
      display:block;
      text-align:left;
      box-shadow:none;
    }

    .result-btn strong{display:block;color:#d77ca7;font-size:15px;margin-bottom:6px}
    .result-btn p{margin:4px 0;font-size:12.5px;line-height:1.45;font-weight:800}
    .result-btn b{color:#d77ca7}

    .detail{
      margin-top:12px;
      border:1px solid #f2d8e7;
      border-radius:20px;
      padding:12px;
      background:#fffafd;
    }

    .line{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #f2d8e7;
      font-size:13.5px;
    }

    .line:last-child{border-bottom:0}
    .line strong{color:#d77ca7;flex:0 0 auto}
    .line span{text-align:right;font-weight:900;word-break:break-word}

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      font-size:12.5px;
      font-weight:900;
    }

    .ok-pill{background:#e5f8eb;color:#208846}
    .wait-pill{background:#fff7d6;color:#9c7a00}
    .gray-pill{background:#f0edf0;color:#8a7b85}
    .bad-pill{background:#ffe6e6;color:#c84242}

    .note{margin:12px 0 0;text-align:center;font-size:11.5px;line-height:1.6;color:#b28ea2;font-weight:700}

    @media(max-width:360px){
      .grid{grid-template-columns:1fr}
      .wide{grid-column:auto}
      h1{font-size:28px}
      .line{flex-direction:column}
      .line span{text-align:left}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <small>STAFF ONLY</small>
      <h1>Lumibelle<br>Check-in</h1>
      <p>QR 스캔 / QR 사진 / 수동 조회<br>세 가지 방식으로 입장 확인해요.</p>
    </section>

    <section class="card">
      <button class="scan" type="button" onclick="startLiveScan()">실시간 QR 스캔</button>

      <div id="readerBox" class="reader-box">
        <div id="reader"></div>
        <button class="sub" type="button" style="margin-top:10px;" onclick="stopLiveScan()">스캔 닫기</button>
      </div>

      <div style="height:10px;"></div>

      <label class="file-btn sub" for="qrFile">QR 촬영 / 사진 선택</label>
      <input id="qrFile" type="file" accept="image/*">

      <div id="photoBox" class="photo-box">
        <img id="preview" alt="QR preview">
        <button class="sub" type="button" style="margin-top:10px;" onclick="clearPhoto()">사진 지우기</button>
      </div>

      <label class="text-label" for="q">검색어</label>
      <input id="q" type="text" placeholder="예: 1180 / 김민지 / 닉네임 / 8648">

      <div class="grid">
        <button class="pink" type="button" onclick="searchTicket()">예약번호</button>
        <button class="purple" type="button" onclick="searchLumi()">LB- ID</button>
        <button class="sub wide" type="button" onclick="searchRaw()">입금자명/닉네임 조회</button>
      </div>

      <div id="msg" class="msg">QR을 스캔하거나 직접 입력해 주세요.</div>
      <div id="results"></div>

      <p class="note">
        ※ QR에는 개인정보가 아닌 예약번호만 들어 있습니다.<br>
        ※ 실시간 스캔이 안 되면 QR 촬영/사진 선택 또는 수동 조회를 사용해 주세요.
      </p>
    </section>
  </div>

  <script>
    const API_URL = "https://lumibelle-api.lumibelle-love.workers.dev";

    let selectedTicketId = "";
    let liveScanner = null;
    let liveRunning = false;
    let liveLocked = false;

    function msg(text, cls) {
      const el = document.getElementById("msg");
      el.className = "msg" + (cls ? " " + cls : "");
      el.innerHTML = text;
    }

    function clean(v) {
      return String(v || "").trim().toUpperCase().replace(/\s+/g, "");
    }

    function ticket(v) {
      v = clean(v);
      try {
        const url = new URL(v);
        const id = url.searchParams.get("id");
        if (id) v = clean(id);
      } catch(e) {}
      if (/^\d{4}$/.test(v)) return "LBT-0712-" + v;
      return v;
    }

    function lumi(v) {
      v = clean(v);
      if (/^\d{4}$/.test(v)) return "LB-" + v;
      if (/^LB\d{4}$/.test(v)) return "LB-" + v.replace("LB", "");
      return v;
    }

    function jsonp(params) {
      return new Promise(function(resolve, reject) {
        const cbName = "__lumibelle_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        params.callback = cbName;

        const qs = Object.keys(params).map(function(k) {
          return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
        }).join("&");

        const script = document.createElement("script");
        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("요청 시간이 초과됐어요."));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cbName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("API 호출에 실패했어요."));
        };

        script.src = API_URL + "?" + qs;
        document.body.appendChild(script);
      });
    }

    // ===== live scan: html5-qrcode with BarcodeDetector disabled =====
    function startLiveScan() {
      liveLocked = false;
      document.getElementById("readerBox").classList.add("on");

      if (liveRunning) return;

      if (typeof Html5Qrcode === "undefined") {
        msg("실시간 QR 스캔 기능을 불러오지 못했어요.<br>QR 촬영/사진 선택을 사용해 주세요.", "err");
        return;
      }

      liveScanner = new Html5Qrcode("reader");

      liveScanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0,
          disableFlip: false,
          experimentalFeatures: {
            useBarCodeDetectorIfSupported: false
          }
        },
        function(decodedText) {
          if (liveLocked) return;
          liveLocked = true;

          const value = ticket(decodedText);
          document.getElementById("q").value = value;
          msg("QR 인식 완료!<br>" + escapeHtml(value) + "<br>조회 중이에요...", "ok");

          // stop() 전에 먼저 조회
          search(value);

          // stop 실패는 무시
          setTimeout(function() {
            stopLiveScan();
          }, 200);
        },
        function() {}
      ).then(function() {
        liveRunning = true;
        msg("카메라가 켜졌어요.<br>팬의 QR을 비춰주세요.", "ok");
      }).catch(function() {
        liveRunning = false;
        msg("카메라를 열 수 없어요.<br>QR 촬영/사진 선택 또는 수동 조회를 사용해 주세요.", "err");
      });
    }

    function stopLiveScan() {
      document.getElementById("readerBox").classList.remove("on");

      if (liveScanner && liveRunning) {
        return liveScanner.stop().then(function() {
          liveScanner.clear();
          liveRunning = false;
        }).catch(function() {
          liveRunning = false;
        });
      }

      return Promise.resolve();
    }

    // ===== photo QR: jsQR with downscale =====
    document.getElementById("qrFile").addEventListener("change", function(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      if (typeof jsQR === "undefined") {
        msg("QR 사진 판독 기능을 불러오지 못했어요.<br>수동 조회를 사용해 주세요.", "err");
        return;
      }

      msg("QR 이미지를 읽는 중이에요...", "");
      const reader = new FileReader();

      reader.onload = function(ev) {
        const img = new Image();

        img.onload = function() {
          document.getElementById("photoBox").classList.add("on");
          const preview = document.getElementById("preview");
          preview.src = ev.target.result;
          preview.style.display = "block";

          const canvas = document.createElement("canvas");

          // 모바일 메모리/인식 안정용 다운스케일
          const maxSize = 1800;
          let w = img.naturalWidth || img.width;
          let h = img.naturalHeight || img.height;

          const scale = Math.min(1, maxSize / Math.max(w, h));
          w = Math.max(1, Math.round(w * scale));
          h = Math.max(1, Math.round(h * scale));

          canvas.width = w;
          canvas.height = h;

          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          ctx.drawImage(img, 0, 0, w, h);

          let imageData;

          try {
            imageData = ctx.getImageData(0, 0, w, h);
          } catch (err) {
            msg("이미지를 분석하지 못했어요.<br>수동 조회를 사용해 주세요.", "err");
            return;
          }

          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "attemptBoth"
          });

          if (!code || !code.data) {
            msg("QR을 읽지 못했어요.<br>QR이 크게 보이게 다시 촬영하거나 예약번호 끝 4자리로 조회해 주세요.", "err");
            return;
          }

          const value = ticket(code.data);
          document.getElementById("q").value = value;
          msg("QR 인식 완료!<br>" + escapeHtml(value) + "<br>조회 중이에요...", "ok");
          search(value);
        };

        img.onerror = function() {
          msg("이미지를 불러오지 못했어요.", "err");
        };

        img.src = ev.target.result;
      };

      reader.onerror = function() {
        msg("파일을 읽지 못했어요.", "err");
      };

      reader.readAsDataURL(file);

      // 같은 파일 재선택 가능
      e.target.value = "";
    });

    function clearPhoto() {
      document.getElementById("preview").src = "";
      document.getElementById("preview").style.display = "none";
      document.getElementById("photoBox").classList.remove("on");
    }

    // ===== search =====
    function searchTicket() {
      const value = ticket(document.getElementById("q").value);
      if (!value) return msg("예약번호를 입력해 주세요.", "err");
      document.getElementById("q").value = value;
      search(value);
    }

    function searchLumi() {
      const value = lumi(document.getElementById("q").value);
      if (!value) return msg("루미ID 숫자 4자리를 입력해 주세요.", "err");
      document.getElementById("q").value = value;
      search(value);
    }

    function searchRaw() {
      const value = String(document.getElementById("q").value || "").trim();
      if (!value) return msg("입금자명, 닉네임, 예약번호, 루미ID 중 하나를 입력해 주세요.", "err");
      search(value);
    }

    async function search(value) {
      selectedTicketId = "";
      document.getElementById("results").innerHTML = "";
      msg("조회 중이에요...", "");

      try {
        const res = await jsonp({ action: "search", q: value });

        if (!res.ok) {
          msg("조회 오류: " + escapeHtml(res.error || "알 수 없는 오류"), "err");
          return;
        }

        if (!res.found || !res.items || !res.items.length) {
          msg("예약 정보를 찾을 수 없어요.", "err");
          return;
        }

        if (res.items.length === 1) renderDetail(res.items[0]);
        else renderList(res.items);
      } catch (e) {
        msg(escapeHtml(e.message || e), "err");
      }
    }

    function renderList(items) {
      msg("검색 결과가 " + items.length + "건 있어요.<br>메아테와 닉네임을 확인하고 선택해 주세요.", "ok");

      let html = '<div class="list">';

      items.forEach(function(item, index) {
        html += '<button class="result-btn" type="button" onclick="selectFromList(' + index + ')">';
        html += '<strong>' + escapeHtml(item.depositor || "-") + ' / ' + escapeHtml(item.nickname || "-") + '</strong>';
        html += '<p><b>메아테</b> ' + escapeHtml(item.meate || "-") + '</p>';
        html += '<p><b>예약번호</b> ' + escapeHtml(item.ticketId || "-") + '</p>';
        html += '<p><b>루미ID</b> ' + escapeHtml(item.lumiId || "-") + '</p>';
        html += '<p><b>결제</b> ' + escapeHtml(item.paymentStatus || "-") + ' / <b>입장</b> ' + escapeHtml(item.entryStatus || "-") + '</p>';
        html += '</button>';
      });

      html += '</div>';
      window.__searchItems = items;
      document.getElementById("results").innerHTML = html;
    }

    function selectFromList(index) {
      const item = window.__searchItems && window.__searchItems[index];
      if (item) renderDetail(item);
    }

    function statusClass(value) {
      if (value === "입금확인완료" || value === "입장완료") return "ok-pill";
      if (value === "입금확인대기") return "wait-pill";
      if (value === "미입장") return "gray-pill";
      return "bad-pill";
    }

    function renderDetail(data) {
      selectedTicketId = data.ticketId || "";

      const payClass = statusClass(data.paymentStatus);
      const entryClass = statusClass(data.entryStatus);

      let button = "";

      if (data.entryStatus === "입장완료") {
        button = '<div class="msg ok">이미 입장완료 처리된 예약이에요.<br>입장시간: ' + escapeHtml(data.entryTime || "-") + '</div>';
      } else if (data.paymentStatus !== "입금확인완료") {
        button = '<div class="msg err">아직 입금확인완료가 아니에요.<br>현장 확인 후 처리해 주세요.</div><button class="pink" type="button" style="margin-top:10px;" onclick="checkin()">그래도 입장완료 처리</button>';
      } else {
        button = '<button class="pink" type="button" style="margin-top:10px;" onclick="checkin()">입장완료 처리</button>';
      }

      const html =
        '<div class="detail">' +
        row("예약번호", data.ticketId) +
        row("루미ID", data.lumiId) +
        row("닉네임", data.nickname) +
        row("입금자명", data.depositor) +
        row("메아테", data.meate) +
        row("티켓", data.ticketType) +
        row("결제상태", '<span class="status ' + payClass + '">' + escapeHtml(data.paymentStatus || "-") + '</span>', true) +
        row("입장상태", '<span class="status ' + entryClass + '">' + escapeHtml(data.entryStatus || "-") + '</span>', true) +
        row("입장시간", data.entryTime || "-") +
        button +
        '</div>';

      msg("예약 정보를 찾았어요.", "ok");
      document.getElementById("results").innerHTML = html;
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function row(label, value, raw) {
      return '<div class="line"><strong>' + label + '</strong><span>' + (raw ? value : escapeHtml(value || "-")) + '</span></div>';
    }

    async function checkin() {
      if (!selectedTicketId) return msg("예약번호를 찾지 못했어요.", "err");
      if (!confirm("이 예약을 입장완료 처리할까요?")) return;

      msg("입장완료 처리 중이에요...", "");

      try {
        const res = await jsonp({ action: "checkin", ticketId: selectedTicketId });

        if (!res.ok) {
          msg("입장 처리 오류: " + escapeHtml(res.error || "알 수 없는 오류"), "err");
          return;
        }

        msg("입장완료 처리됐어요.", "ok");
        renderDetail(res.item);
      } catch (e) {
        msg(escapeHtml(e.message || e), "err");
      }
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function(m) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m];
      });
    }

    document.getElementById("q").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        searchTicket();
      }
    });
  </script>
</body>
</html>
