<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>루미벨 스탭 페이지</title>
  <style>
    *{box-sizing:border-box;}

    :root{
      --bg1:#fff8fc;
      --bg2:#fffdfd;
      --panel:rgba(255,255,255,.95);
      --line:#f3d9e7;
      --text:#7d5c6d;
      --soft:#b992a7;
      --pink:#ff79b5;
      --pink-deep:#ff5fa8;
      --shadow:0 18px 40px rgba(255,95,168,.12);
    }

    body{
      margin:0;
      font-family:"Noto Sans KR", system-ui, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,185,220,.22), transparent 35%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .hidden{display:none !important;}

    .gate-box{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .gate-card,
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .gate-card{
      width:min(100%,420px);
      padding:28px 22px;
      text-align:center;
    }

    .gate-sub,
    .head .sub{
      font-size:12px;
      letter-spacing:.18em;
      color:var(--pink-deep);
      font-weight:800;
    }

    .gate-sub{margin-bottom:10px;}

    .gate-card h1{
      margin:0 0 10px;
      font-size:28px;
      color:#8a6377;
    }

    .gate-card p{
      margin:0 0 18px;
      font-size:14px;
      line-height:1.6;
      color:var(--soft);
    }

    .gate-error{
      display:none;
      margin:12px 0 0;
      color:#b45d6e;
      font-size:13px;
    }

    .wrap{
      width:min(100%,680px);
      margin:0 auto;
      padding:30px 16px 44px;
    }

    .head{
      padding:24px 22px 18px;
      background:linear-gradient(135deg, rgba(255,138,194,.22), rgba(255,95,168,.10));
      border-bottom:1px solid var(--line);
    }

    .head .sub{margin-bottom:8px;}

    .head h1{
      margin:0;
      font-size:26px;
      line-height:1.2;
      color:#8a6377;
    }

    .head p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--soft);
      line-height:1.6;
    }

    .mini-bar{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .mini-pill{
      border:1px solid #f3d9e7;
      background:#fff7fb;
      color:#a26f87;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      line-height:1;
    }

    form{
      padding:20px;
      display:grid;
      gap:14px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    label{
      font-size:13px;
      font-weight:800;
      color:#9a7187;
    }

    input, select, textarea, button, a{
      font:inherit;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:18px;
      padding:15px 16px;
      outline:none;
      transition:.2s ease;
      font-size:16px;
    }

    input::placeholder,
    textarea::placeholder{
      color:#b89cad;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#f4a4ca;
      box-shadow:0 0 0 4px rgba(255,121,181,.12);
    }

    textarea{
      min-height:128px;
      resize:vertical;
    }

    .member{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .member-prefix{
      flex:0 0 auto;
      padding:15px 16px;
      border-radius:18px;
      background:#fff0f7;
      border:1px solid #f3d9e7;
      color:#ff5fa8;
      font-weight:800;
      min-width:72px;
      text-align:center;
      font-size:16px;
    }

    .member input{
      flex:1;
      min-width:0;
    }

    .quick{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:6px;
    }

    .chip{
      padding:13px 8px;
      border-radius:16px;
      border:1px solid #f3d9e7;
      background:#fff;
      color:#ff5fa8;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
      transition:all .2s ease;
    }

    .chip:hover{
      background:#ffe7f3;
      border-color:#f4a4ca;
      transform:translateY(-1px);
    }

    .chip.use{
      background:#fff7fb;
      color:#a0617f;
    }

    .actions,
    .sub-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      border:none;
      border-radius:18px;
      padding:16px;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--pink),var(--pink-deep));
      color:#fff;
      box-shadow:0 12px 24px rgba(255,95,168,.22);
    }

    .btn-secondary{
      background:#fff;
      color:#a26f87;
      border:1px solid var(--line);
    }

    .btn:hover{transform:translateY(-1px);}

    .note{
      padding:0 20px 20px;
      color:#b08ba0;
      font-size:12px;
      line-height:1.85;
    }

    .status{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      display:none;
    }

    .status.show{display:block;}

    .status.ok{
      background:#fff7fb;
      border:1px solid #f4cade;
      color:#a0617f;
    }

    .status.error{
      background:#fff7f7;
      border:1px solid #f3caca;
      color:#b45d6e;
    }

    iframe{display:none;}

    @media (max-width:640px){
      .head h1,
      .gate-card h1{font-size:24px;}
      .row,
      .actions,
      .sub-actions{grid-template-columns:1fr;}
      .quick{grid-template-columns:repeat(2,1fr);}
      .wrap{width:min(100%,640px); padding:20px 12px 36px;}
    }
  </style>
</head>
<body>

  <div id="gate" class="gate-box">
    <div class="gate-card">
      <div class="gate-sub">LUMIBELLE STAFF</div>
      <h1>스탭 전용 입장</h1>
      <p>비밀번호를 입력하면 스탭 페이지가 열려요.</p>

      <input id="passwordInput" type="password" placeholder="비밀번호 입력" />

      <button id="loginBtn" class="btn btn-primary" type="button" style="margin-top:12px;">
        입장하기
      </button>

      <p id="gateError" class="gate-error">비밀번호가 맞지 않아.</p>
    </div>
  </div>

  <div id="staffPage" class="hidden">
    <div class="wrap">
      <div class="card">
        <div class="head">
          <div class="sub">LUMIBELLE STAFF</div>
          <h1>포인트 적립기</h1>
          <p>스탭 선택은 유지되고, 회원번호는 숫자만 입력하면 돼요.</p>

          <div class="mini-bar">
            <div class="mini-pill">입력 확인 필수</div>
            <div class="mini-pill">실수 시 재입력 처리</div>
            <div class="mini-pill">구글폼 자동 기록</div>
          </div>
        </div>

        <form
          id="staffForm"
          action="https://docs.google.com/forms/d/e/1FAIpQLScpXbqtkyGdzxHrOovb4X8RpCb4Tw8fq8uXOBG8uWcqvShbCw/formResponse"
          method="POST"
          target="hidden_iframe"
        >
          <div class="row">
            <div class="field">
              <label for="staffSelect">스탭 선택</label>
              <select id="staffSelect" name="entry.1058201571" required>
                <option value="">스탭 선택</option>
                <option value="마리링">마리링</option>
                <option value="루루">루루</option>
                <option value="이로">이로</option>
                <option value="루나">루나</option>
              </select>
            </div>

            <div class="field">
              <label for="memberInput">회원번호</label>
              <div class="member">
                <div class="member-prefix">LB-</div>
                <input
                  id="memberInput"
                  name="entry.1210333147"
                  type="text"
                  placeholder="예: 001"
                  autocomplete="off"
                  inputmode="numeric"
                  pattern="[0-9]+"
                  required
                />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="type">구분</label>
              <select id="type" name="entry.1858622901" required>
                <option value="적립" selected>적립</option>
                <option value="사용">사용</option>
              </select>
            </div>

            <div class="field">
              <label for="point">포인트</label>
              <input
                id="point"
                name="entry.29331453"
                type="number"
                min="1"
                step="1"
                placeholder="예: 1"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="memo">메모</label>
            <textarea
              id="memo"
              name="entry.1484560740"
              placeholder="예: 굿즈 구매 / 포인트 사용 / 현장 응대"
            ></textarea>
          </div>

          <div class="field">
            <label>빠른 입력</label>
            <div class="quick">
              <button type="button" class="chip" data-add="1">+1</button>
              <button type="button" class="chip" data-add="2">+2</button>
              <button type="button" class="chip" data-add="3">+3</button>
              <button type="button" class="chip" data-add="5">+5</button>
              <button type="button" class="chip" data-add="10">+10</button>
              <button type="button" class="chip use" id="use100Btn">사용 100</button>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit">저장하기</button>
            <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
          </div>

          <div class="sub-actions">
            <a
              class="btn btn-secondary"
              id="recordViewBtn"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              기록 보기
            </a>
            <button type="button" class="btn btn-secondary" id="logoutBtn">스탭 변경</button>
          </div>
        </form>

        <div class="note">
          ※ 적립 버튼은 누적돼요. 예: +1 → +1 → +3 = 5<br />
          ※ 사용 100 버튼은 구분이 자동으로 ‘사용’으로 바뀌어요.<br />
          ※ 스탭 이름은 한 번 선택하면 유지돼요.<br />
          ※ 실수한 경우 반대 내용으로 다시 입력해서 맞춰주세요.
        </div>
      </div>

      <div id="statusBox" class="status"></div>
    </div>
  </div>

  <iframe name="hidden_iframe"></iframe>

  <script>
    const STAFF_PASSWORD = "lmb0712";
    const STAFF_NAME_KEY = "lb_staff_name";

    // 응답 시트 링크가 생기면 여기만 바꿔주면 돼요.
    const RECORD_SHEET_URL = "https://docs.google.com/spreadsheets/d/1u8JbMyiDndtB4vmtBmEeBLlE4DmAMUfR73Lu2zAGXlc/edit?usp=sharing";

    const gate = document.getElementById("gate");
    const staffPage = document.getElementById("staffPage");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const gateError = document.getElementById("gateError");

    const form = document.getElementById("staffForm");
    const staffSelect = document.getElementById("staffSelect");
    const memberInput = document.getElementById("memberInput");
    const typeInput = document.getElementById("type");
    const pointInput = document.getElementById("point");
    const memoInput = document.getElementById("memo");
    const resetBtn = document.getElementById("resetBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const recordViewBtn = document.getElementById("recordViewBtn");
    const statusBox = document.getElementById("statusBox");
    const quickButtons = document.querySelectorAll(".chip[data-add]");
    const use100Btn = document.getElementById("use100Btn");
    const hiddenIframe = document.querySelector('iframe[name="hidden_iframe"]');

    let submitStarted = false;
    let firstIframeLoad = true;

    recordViewBtn.href = RECORD_SHEET_URL;
    staffSelect.value = localStorage.getItem(STAFF_NAME_KEY) || "";

    staffSelect.addEventListener("change", () => {
      localStorage.setItem(STAFF_NAME_KEY, staffSelect.value);
    });

    function openStaffPage() {
      gate.classList.add("hidden");
      staffPage.classList.remove("hidden");
      setTimeout(() => {
        if (staffSelect.value) memberInput.focus();
        else staffSelect.focus();
      }, 50);
    }

    function checkPassword() {
      const input = passwordInput.value.trim();
      if (input === STAFF_PASSWORD) {
        sessionStorage.setItem("lb_staff_auth", "yes");
        gateError.style.display = "none";
        openStaffPage();
      } else {
        gateError.style.display = "block";
      }
    }

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    loginBtn.addEventListener("click", checkPassword);

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkPassword();
    });

    quickButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        typeInput.value = "적립";
        pointInput.value = (Number(pointInput.value) || 0) + Number(btn.dataset.add);
      });
    });

    use100Btn.addEventListener("click", () => {
      typeInput.value = "사용";
      pointInput.value = 100;
      if (!memoInput.value.trim()) memoInput.value = "포인트 사용";
    });

    typeInput.addEventListener("change", () => {
      if (typeInput.value === "사용" && !pointInput.value) pointInput.value = 100;
    });

    form.addEventListener("submit", (e) => {
      const member = memberInput.value.trim();

      if (!staffSelect.value || !member || !pointInput.value) {
        e.preventDefault();
        showStatus("입력을 확인해줘.", "error");
        return;
      }

      if (!/^\d+$/.test(member)) {
        e.preventDefault();
        showStatus("회원번호는 숫자만 입력해줘.", "error");
        memberInput.focus();
        return;
      }

      if (typeInput.value === "사용" && !memoInput.value.trim()) {
        e.preventDefault();
        showStatus("사용일 때는 메모를 입력해줘.", "error");
        memoInput.focus();
        return;
      }

      if (!confirm("이대로 저장할까요?")) {
        e.preventDefault();
        return;
      }

      submitStarted = true;
      showStatus("저장 중...", "ok");
    });

    hiddenIframe.addEventListener("load", () => {
      if (firstIframeLoad) {
        firstIframeLoad = false;
        return;
      }

      if (!submitStarted) return;
      submitStarted = false;

      showStatus("저장 완료! 구글폼으로 전송됐어요.", "ok");
      pointInput.value = "";
      memoInput.value = "";
      typeInput.value = "적립";
      memberInput.value = "";
      memberInput.focus();
    });

    resetBtn.addEventListener("click", () => {
      pointInput.value = "";
      memoInput.value = "";
      typeInput.value = "적립";
      memberInput.value = "";
      statusBox.className = "status";
      statusBox.textContent = "";
      memberInput.focus();
    });

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(STAFF_NAME_KEY);
      sessionStorage.removeItem("lb_staff_auth");
      location.reload();
    });

    recordViewBtn.addEventListener("click", (e) => {
      if (RECORD_SHEET_URL === "#") {
        e.preventDefault();
        showStatus("기록 보기 버튼은 응답 시트 링크를 넣은 뒤 사용할 수 있어요.", "error");
      }
    });

    window.addEventListener("load", () => {
      if (sessionStorage.getItem("lb_staff_auth") === "yes") openStaffPage();
    });
  </script>
</body>
</html>
