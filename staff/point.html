<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 적립기</title>
<style>
body{
  font-family:sans-serif;
  background:#fff7fb;
  padding:20px;
}
.wrap{
  max-width:500px;
  margin:auto;
}
input, select, textarea, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
}
button{
  background:#ff5fa8;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.status{
  margin-top:10px;
  padding:10px;
}
</style>
</head>
<body>

<div class="wrap">
  <h2>포인트 적립기</h2>

  <form
    id="pointForm"
    action="https://script.google.com/macros/s/AKfycbzMf1Kxtzz1KbqoqoQOOSbzcRyomYaQZd32ls9-hDDtuc5YR4hVPjp5LHLpAy0fpsDv/exec"
    method="POST"
    target="hidden_iframe"
  >
    <select name="staff" id="staff" required>
      <option value="">스탭 선택</option>
      <option value="마리링">마리링</option>
      <option value="루루">루루</option>
      <option value="이로">이로</option>
      <option value="루나">루나</option>
    </select>

    <input name="memberId" id="memberId" placeholder="회원번호 (예: LB-001)" required>
    
    <select name="type" id="type" required>
      <option value="적립">적립</option>
      <option value="사용">사용</option>
    </select>

    <input name="point" id="point" type="number" placeholder="포인트" required>

    <textarea name="memo" id="memo" placeholder="메모"></textarea>

    <button type="submit">저장</button>
  </form>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <div id="status" class="status"></div>
</div>

<script>
const form = document.getElementById("pointForm");
const statusEl = document.getElementById("status");

form.addEventListener("submit", () => {
  statusEl.innerText = "저장 중...";
  statusEl.style.color = "#a0617f";

  setTimeout(() => {
    statusEl.innerText = "저장 완료!";
    statusEl.style.color = "green";
    form.reset();
  }, 1200);
});
</script>

</body>
</html>
