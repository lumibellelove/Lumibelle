<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포인트 적립기</title>
<style>
body{
  font-family:sans-serif;
  background:#fff7fb;
  padding:20px;
}
.wrap{
  max-width:500px;
  margin:auto;
}
input, select, textarea, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  background:#ff5fa8;
  color:white;
  border:none;
  font-weight:bold;
}
.status{
  margin-top:10px;
  padding:10px;
}
</style>
</head>
<body>

<div class="wrap">
  <h2>포인트 적립기</h2>

  <select id="staff">
    <option value="">스탭 선택</option>
    <option>마리링</option>
    <option>루루</option>
    <option>이로</option>
    <option>루나</option>
  </select>

  <input id="member" placeholder="회원번호 (예: 001)">

  <select id="type">
    <option value="적립">적립</option>
    <option value="사용">사용</option>
  </select>

  <input id="point" type="number" placeholder="포인트">

  <textarea id="memo" placeholder="메모"></textarea>

  <button onclick="save()">저장</button>

  <div id="status" class="status"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzMf1Kxtzz1KbqoqoQOOSbzcRyomYaQZd32ls9-hDDtuc5YR4hVPjp5LHLpAy0fpsDv/exec";

async function save(){
  const staff = document.getElementById("staff").value;
  const member = document.getElementById("member").value;
  const type = document.getElementById("type").value;
  const point = document.getElementById("point").value;
  const memo = document.getElementById("memo").value;

  if(!staff || !member || !point){
    setStatus("입력 확인해줘", true);
    return;
  }

  try{
    const res = await fetch(URL,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"
      },
      body: JSON.stringify({
        staff: staff,
        memberId: "LB-" + member,
        type: type,
        point: point,
        memo: memo
      })
    });

    const text = await res.text();

    if(text.trim() !== "ok"){
      throw new Error("저장 안됨");
    }

    setStatus("저장 완료!");
    
  }catch(e){
    setStatus("저장 실패", true);
  }
}

function setStatus(msg, error=false){
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = error ? "red" : "green";
}
</script>

</body>
</html>
