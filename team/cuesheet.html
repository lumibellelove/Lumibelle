
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Team Cue Sheet | Lumibelle</title><style>@import url('https://fonts.googleapis.com/css2?family=SUIT:wght@500;700;800;900&display=swap');*{box-sizing:border-box}body{margin:0;font-family:SUIT,sans-serif;background:#fff7fb;color:#7f6a77}.wrap{width:min(1000px,calc(100% - 24px));margin:auto;padding:20px 0 60px}.card{background:#fff;border:1px solid #f2d8e7;border-radius:26px;padding:20px;box-shadow:0 10px 24px rgba(232,191,211,.14);margin-bottom:12px}h1,h2{color:#d77ca7}.row{display:grid;grid-template-columns:70px 1fr 90px 1fr 1fr 1fr 42px;gap:8px;margin:8px 0}input,select,textarea{width:100%;border:1px solid #f2d8e7;border-radius:16px;padding:12px;font:inherit;font-weight:800}button{border:0;border-radius:999px;background:#ff5fa8;color:#fff;padding:12px 16px;font-weight:900}button.sub{background:#fff;color:#d77ca7;border:1px solid #f0bfd4}.actions{display:flex;gap:8px;flex-wrap:wrap}.preview{white-space:pre-wrap;line-height:1.7;background:#fff0f7;border-radius:18px;padding:14px;font-weight:800}@media(max-width:760px){.row{grid-template-columns:1fr}}</style></head><body><div class="wrap"><section class="card"><h1>팀 큐시트 작성</h1><p>이로가 준 예시처럼 NO / Title / Duration / Sound / 요청사항 형식으로 뽑는 1차 버전입니다.</p><div class="actions"><button onclick="add('SE')">+ SE</button><button onclick="add('SONG')">+ 곡</button><button onclick="add('MC')">+ MC</button><button class="sub" onclick="render()">미리보기</button></div></section><section class="card" id="rows"></section><section class="card"><h2>미리보기</h2><div class="preview" id="out"></div></section></div><script>let rows=JSON.parse(localStorage.getItem('teamCueRows')||'[]');function add(t){rows.push({type:t,title:t==='MC'?'MC':'',duration:t==='MC'?'':'00:00',sound:'무선 마이크 2대',req:''});save();draw()}function save(){localStorage.setItem('teamCueRows',JSON.stringify(rows))}function draw(){document.getElementById('rows').innerHTML=rows.map((r,i)=>`<div class="row"><select onchange="rows[${i}].type=this.value;save()"><option ${r.type==='SE'?'selected':''}>SE</option><option ${r.type==='SONG'?'selected':''}>SONG</option><option ${r.type==='MC'?'selected':''}>MC</option><option ${r.type==='ENCORE'?'selected':''}>ENCORE</option></select><input placeholder="Title" value="${r.title}" oninput="rows[${i}].title=this.value;save()"><input placeholder="Duration" value="${r.duration}" oninput="rows[${i}].duration=this.value;save()"><input value="${r.sound}" oninput="rows[${i}].sound=this.value;save()"><textarea placeholder="요청사항" oninput="rows[${i}].req=this.value;save()">${r.req}</textarea><input placeholder="비고" value="${r.note||''}" oninput="rows[${i}].note=this.value;save()"><button class="sub" onclick="rows.splice(${i},1);save();draw();render()">×</button></div>`).join('')||'<p>+ 버튼으로 구간을 추가해 주세요.</p>'}function render(){document.getElementById('out').textContent='NO.\tTitle\tDuration\tSound\t요청사항\n'+rows.map((r,i)=>`${i+1}\t${r.title}\t${r.duration}\t${r.sound}\t${r.req||''}`).join('\n')+'\n\n* SE 제외 전곡 곡 제목 말하면 재생 부탁드립니다.'}draw();render();</script></body></html>
