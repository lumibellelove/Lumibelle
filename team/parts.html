
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Parts | Lumibelle</title><style>body{font-family:system-ui,sans-serif;background:#fff7fb;color:#7f6a77;margin:0}.wrap{width:min(900px,calc(100% - 24px));margin:auto;padding:22px 0}.card{background:white;border:1px solid #f2d8e7;border-radius:24px;padding:20px;margin:10px 0}h1{color:#ff5fa8}.row{display:grid;grid-template-columns:1fr 120px 1fr 40px;gap:8px;margin:8px 0}textarea,input,select{width:100%;padding:12px;border:1px solid #f2d8e7;border-radius:16px}button{border:0;border-radius:999px;background:#ff5fa8;color:white;padding:12px 16px;font-weight:900}.out{white-space:pre-wrap;line-height:1.7;background:#fff0f7;border-radius:18px;padding:14px}@media(max-width:760px){.row{grid-template-columns:1fr}}</style></head><body><div class="wrap"><section class="card"><h1>파트 분배 / 가사</h1><input id="song" placeholder="곡명"><button onclick="add()">라인 추가</button><button onclick="render()">미리보기</button></section><section class="card" id="rows"></section><section class="card"><div class="out" id="out"></div></section></div><script>let rows=JSON.parse(localStorage.getItem('partsRows')||'[]');function save(){localStorage.setItem('partsRows',JSON.stringify(rows))}function add(){rows.push({lyric:'',member:'마리링',note:''});save();draw()}function draw(){document.getElementById('rows').innerHTML=rows.map((r,i)=>`<div class="row"><textarea oninput="rows[${i}].lyric=this.value;save()">${r.lyric}</textarea><select onchange="rows[${i}].member=this.value;save()"><option>마리링</option><option>루루</option><option>이로</option><option>루나</option><option>전체</option></select><input placeholder="대형/메모" value="${r.note}" oninput="rows[${i}].note=this.value;save()"><button onclick="rows.splice(${i},1);save();draw();render()">×</button></div>`).join('')||'<p>라인을 추가해 주세요.</p>'}function render(){document.getElementById('out').textContent='['+(song.value||'곡명')+']\n'+rows.map(r=>`${r.member}: ${r.lyric}${r.note?' // '+r.note:''}`).join('\n')}draw();render();</script></body></html>
