<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Member Checklist | Lumibelle</title><style>body{font-family:system-ui,sans-serif;background:#fff7fb;color:#7f6a77;margin:0}.wrap{width:min(760px,calc(100% - 24px));margin:auto;padding:22px 0}.card{background:white;border:1px solid #f2d8e7;border-radius:24px;padding:20px;margin:10px 0}h1{color:#ff5fa8}.item{display:grid;grid-template-columns:32px 1fr;gap:8px;padding:10px;border-bottom:1px solid #f2d8e7;font-weight:800}input[type=text]{width:100%;padding:12px;border:1px solid #f2d8e7;border-radius:16px}button{border:0;border-radius:999px;background:#ff5fa8;color:white;padding:12px 16px;font-weight:900}</style></head><body><div class="wrap"><section class="card"><h1>멤버 준비물 체크리스트</h1><input id="txt" placeholder="준비물 추가"><button onclick="add()">추가</button></section><section class="card" id="list"></section></div><script>let list=JSON.parse(localStorage.getItem('memberSimpleChecklist')||'[]');if(!list.length)list=['숙박지','화장품, 속눈썹, 글루','얼굴 스티커','헤어 장식','싸인 받침대','물판 가방','양치도구 / 입냄새 제거제','포스카 or 네임펜','고데기'];function save(){localStorage.setItem('memberSimpleChecklist',JSON.stringify(list))}function add(){if(txt.value.trim()){list.push(txt.value.trim());txt.value='';save();draw()}}function draw(){list.innerHTML='';document.getElementById('list').innerHTML=list.map((x,i)=>`<label class="item"><input type="checkbox"> <span>${x}</span></label>`).join('')}draw();</script></body></html>
