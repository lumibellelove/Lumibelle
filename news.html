<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News | Lumibelle</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .news-list-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .news-list-box {
      background: #fff5fb;
      border: 1px solid #f2d8e7;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(232, 191, 211, 0.12);
    }

    .news-row {
      display: grid;
      grid-template-columns: 170px 140px 1fr 40px;
      align-items: center;
      gap: 20px;
      padding: 26px 30px;
      border-bottom: 1px solid #f2d8e7;
      text-decoration: none;
      background: #fff5fb;
      transition: background 0.18s ease;
    }

    .news-row:last-child {
      border-bottom: none;
    }

    .news-row:hover {
      background: #fff0f7;
    }

    .news-date {
      font-size: 18px;
      color: #9b7d90;
      font-weight: 500;
    }

    .news-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 88px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .badge-new {
      background: #ffe7f1;
      color: #de77a7;
      border-color: #f3bfd5;
    }

    .badge-info {
      background: #fbe8f4;
      color: #c97ca8;
      border-color: #efc6dc;
    }

    .badge-media {
      background: #eaf4ff;
      color: #73a1da;
      border-color: #c7def8;
    }

    .badge-live {
      background: #eaf4ff;
      color: #73a1da;
      border-color: #c7def8;
    }

    .badge-debut {
      background: #f4ebff;
      color: #9f74d1;
      border-color: #dcc8fa;
    }

    .news-title-text {
      font-size: 22px;
      line-height: 1.5;
      color: #846f81;
      font-weight: 500;
    }

    .news-arrow {
      font-size: 24px;
      color: #d8a0bc;
      font-weight: 700;
      text-align: right;
    }

    .news-more-wrap {
      text-align: center;
      margin-top: 30px;
    }

    .news-more-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 320px;
      padding: 20px 32px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f38abd 0%, #ed7fb5 100%);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(237, 127, 181, 0.22);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .news-more-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    @media (max-width: 900px) {
      .news-row {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 22px 20px;
      }

      .news-title-text {
        font-size: 18px;
      }

      .news-arrow {
        display: none;
      }

      .news-more-btn {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>

        <div class="logo">

        </div>
        <nav>
          <a href="index.html"><b>TOP</b><span>トップ</span></a>

          <a href="fanname.html"><b>FANNAME</b><span>ファンネーム</span></a>
          <a href="info.html"><b>INFO</b><span>インフォメーション</span></a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <div class="wrap">
      <div class="page-title">
        <h2>NEWS</h2>

      </div>

      <div class="news-list-wrap">
        <div class="news-list-box">

            <div class="news-date">2026.07.12</div>

          <a href="#" class="news-row">

        <div class="news-more-wrap">

</html>
