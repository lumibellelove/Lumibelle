<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News | Lumibelle</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .news-list-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .news-list-box {
      background: #fff5fb;
      border: 1px solid #f2d8e7;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(232, 191, 211, 0.12);
    }

    .year-label {
      padding: 20px 30px;
      font-weight: 800;
      color: #d77ca7;
      font-size: 18px;
    }

    .news-row {
      display: grid;
      grid-template-columns: 120px 140px 1fr 30px;
      align-items: center;
      gap: 16px;
      padding: 22px 26px;
      border-bottom: 1px solid #f2d8e7;
      text-decoration: none;
      background: #fff5fb;
      transition: 0.2s;
    }

    .news-row:hover {
      background: #fff0f7;
    }

    .news-row.latest {
      background: #fff0f7;
      box-shadow: inset 0 0 0 2px #ffd6ea;
    }

    .news-date {
      font-weight: 700;
      color: #9b7d90;
    }

    .news-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .badge-debut {
      background: #f4ebff;
      color: #9f74d1;
      border-color: #dcc8fa;
    }

    .badge-live {
      background: #eaf4ff;
      color: #73a1da;
      border-color: #c7def8;
    }

    .badge-info {
      background: #fbe8f4;
      color: #c97ca8;
      border-color: #efc6dc;
    }

    .badge-media {
      background: #eaf4ff;
      color: #73a1da;
      border-color: #c7def8;
    }

    .badge-new {
      background: #ff4fa3;
      color: #fff;
      border-color: #ff4fa3;
      margin-left: 6px;
    }

    .news-title {
      font-size: 18px;
      color: #846f81;
      font-weight: 700;
      line-height: 1.5;
    }

    .arrow {
      text-align: right;
      color: #d8a0bc;
      font-size: 20px;
    }

    @media (max-width: 768px) {
      .news-row {
        grid-template-columns: 1fr;
      }

      .arrow {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="header-box">
        <div class="top-bow">🎀</div>
        <div class="logo">
          <h1>Lumibelle</h1>
          <p>ルミベル</p>
        </div>
        <nav>
          <a href="index.html"><b>TOP</b><span>トップ</span></a>
          <a href="news.html" class="current"><b>NEWS</b><span>お知らせ</span></a>
          <a href="member.html"><b>MEMBER</b><span>メンバー紹介</span></a>
          <a href="schedule.html"><b>SCHEDULE</b><span>スケジュール</span></a>
          <a href="fanname.html"><b>FANNAME</b><span>ファンネーム</span></a>
          <a href="info.html"><b>INFO</b><span>インフォメーション</span></a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <div class="wrap">
      <div class="page-title">
        <h2>NEWS</h2>
        <p>お知らせ</p>
      </div>

      <div class="news-list-wrap">
        <div class="news-list-box">
          <div class="year-label">2026</div>

          <a href="news-debut.html" class="news-row latest">
            <div class="news-date">07.12</div>
            <div>
              <span class="news-badge badge-debut">DEBUT</span>
              <span class="news-badge badge-new">NEW</span>
            </div>
            <div class="news-title">루미벨 데뷔라이브 안내</div>
            <div class="arrow">›</div>
          </a>

          <a href="news-big-event.html" class="news-row">
            <div class="news-date">10.18</div>
            <div>
              <span class="news-badge badge-live">LIVE</span>
            </div>
            <div class="news-title">빅 이벤트 라이브 예정 안내</div>
            <div class="arrow">›</div>
          </a>

          <a href="#" class="news-row">
            <div class="news-date">05.01</div>
            <div>
              <span class="news-badge badge-info">INFO</span>
            </div>
            <div class="news-title">굿즈 관련 안내 예정</div>
            <div class="arrow">›</div>
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer>© 2026 Lumibelle All Rights Reserved.</footer>
</body>
</html>
