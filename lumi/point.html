<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMI ID</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff7fb;
}

/* 전체 */
.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

/* 카드 */
.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(255,95,168,0.15);
  margin-bottom:16px;
}

/* 프로필 */
.profile{
  display:flex;
  align-items:center;
  gap:16px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff8ac2;
}

.name{
  font-size:18px;
  font-weight:bold;
}

.point{
  font-size:14px;
  color:#ff5fa8;
}

/* 게이지 */
.bar{
  margin-top:10px;
  height:10px;
  background:#ffe6f1;
  border-radius:10px;
  overflow:hidden;
}

.bar-fill{
  width:60%;
  height:100%;
  background:linear-gradient(90deg,#ff8ac2,#ff5fa8);
}

/* 업적 */
.badge-list{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.badge{
  min-width:70px;
  height:70px;
  background:#fff0f7;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* 메뉴 */
.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.menu a{
  text-decoration:none;
  background:#ffe6f1;
  padding:14px;
  border-radius:14px;
  text-align:center;
  color:#ff5fa8;
  font-weight:600;
}

/* 메시지 */
.msg{
  background:#fff0f7;
  padding:12px;
  border-radius:14px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- 프로필 -->
  <div class="card">
    <div class="profile">
      <img src="img/member/mariring/mariring-01.webp">
      <div>
        <div class="name">마리링</div>
        <div class="point">현재 포인트: 1200P</div>
      </div>
    </div>

    <div class="bar">
      <div class="bar-fill"></div>
    </div>
    <small>다음 등급까지 300P 남음</small>
  </div>

  <!-- 업적 -->
  <div class="card">
    <h3>업적</h3>
    <div class="badge-list">
      <div class="badge">★</div>
      <div class="badge">★</div>
      <div class="badge">★</div>
    </div>
  </div>

  <!-- 메뉴 -->
  <div class="card">
    <div class="menu">
      <a href="#">프로필</a>
      <a href="#">프레임</a>
      <a href="#">칭호</a>
      <a href="#">우편함</a>
      <a href="#">메시지</a>
      <a href="#">기록</a>
    </div>
  </div>

  <!-- 메시지 -->
  <div class="card">
    <h3>최근 메시지</h3>
    <div class="msg">마리링: 오늘도 와줘서 고마워 💕</div>
    <div class="msg">루루: 다음 공연 기대해!</div>
  </div>

</div>

</body>
</html>
