<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMI ID</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(180deg,#fff8fb,#ffeef6);
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(255,95,168,0.15);
  margin-bottom:16px;
}

.profile{
  display:flex;
  align-items:center;
  gap:16px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff8ac2;
  background:#fff;
}

.point{
  color:#ff5fa8;
  font-weight:700;
  line-height:1.6;
}

.bar{
  margin-top:10px;
  height:10px;
  background:#ffe6f1;
  border-radius:10px;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff8ac2,#ff5fa8);
}

#nextText{
  display:block;
  margin-top:8px;
}

.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.menu a{
  text-decoration:none;
  background:#ffe6f1;
  padding:14px;
  border-radius:14px;
  text-align:center;
  color:#ff5fa8;
  font-weight:700;
}

.msg{
  background:#fff0f7;
  padding:12px;
  border-radius:14px;
  margin-bottom:8px;
}

.locked{
  opacity:0.38;
  filter:blur(2px);
}

.profile-select{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-top:18px;
  padding-bottom:4px;
}

.profile-select img{
  width:60px;
  height:60px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid transparent;
  object-fit:cover;
  background:#fff;
}

.profile-select img.active{
  border:2px solid #ff5fa8;
}

.section-title{
  font-size:16px;
  font-weight:800;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <div class="profile">
      <img id="mainProfile" src="profile/mariring-01.webp" alt="프로필 이미지">
      <div class="point" id="pointText"></div>
    </div>

    <div class="bar">
      <div class="bar-fill" id="barFill"></div>
    </div>

    <small id="nextText"></small>

    <div class="profile-select" id="profileSelect"></div>
  </div>

  <div class="card">
    <div class="section-title">MENU</div>
    <div class="menu">
      <a href="profile.html">프로필</a>
      <a href="frame.html">프레임</a>
      <a href="badge.html">업적</a>
      <a href="point.html">포인트</a>
      <a href="letter.html">우편함</a>
      <a href="message.html">메시지</a>
    </div>
  </div>

  <div class="card">
    <div class="section-title">최근 메시지</div>
    <div class="msg">마리링: 오늘도 와줘서 고마워 💕</div>
    <div class="msg">루루: 다음 공연 기대해!</div>
    <div class="msg locked" id="iroMsg">🔒 이로 (선으로 이어지면 만날 수 있어)</div>
    <div class="msg locked" id="lunaMsg">🔒 루나 (빛을 나누면 만날 수 있어)</div>
  </div>

</div>

<script>
const point = 32;

let level = 1;
let title = "점을 찍은 루미나 🌱";
let prev = 0;
let next = 10;

if(point >= 100){
  level = 5;
  title = "구원의 별, 루미나 👑";
  prev = 100;
  next = 100;
}else if(point >= 60){
  level = 4;
  title = "빛을 나누는 루미나 💖";
  prev = 60;
  next = 100;
}else if(point >= 30){
  level = 3;
  title = "선으로 이어진 루미나 ✨";
  prev = 30;
  next = 60;
}else if(point >= 10){
  level = 2;
  title = "길을 비추는 루미나 💕";
  prev = 10;
  next = 30;
}

let percent = ((point - prev) / (next - prev)) * 100;
if(level === 5) percent = 100;

document.getElementById("pointText").innerText = `Lv.${level} ${title} · ${point}P`;
document.getElementById("barFill").style.width = percent + "%";

if(level === 5){
  document.getElementById("nextText").innerText = "체인 서사의 완성 👑";
}else{
  document.getElementById("nextText").innerText = `다음 단계까지 ${next - point}P 남음`;
}

if(level >= 3){
  const iro = document.getElementById("iroMsg");
  iro.classList.remove("locked");
  iro.innerText = "이로: 이제 우리가 이어졌네 💙";
}

if(level >= 4){
  const luna = document.getElementById("lunaMsg");
  luna.classList.remove("locked");
  luna.innerText = "루나: …기다리고 있었어 🌙";
}

const profiles = [
  "mariring-01.webp",
  "mariring-02.webp",
  "mariring-03.webp"
];

const profileBasePath = "profile/";
const container = document.getElementById("profileSelect");
const main = document.getElementById("mainProfile");

let saved = localStorage.getItem("lumiProfile") || profiles[0];
main.src = profileBasePath + saved;

profiles.forEach(file => {
  const img = document.createElement("img");
  img.src = profileBasePath + file;
  img.alt = "프로필 선택";

  if(file === saved) img.classList.add("active");

  img.onclick = () => {
    main.src = profileBasePath + file;
    localStorage.setItem("lumiProfile", file);

    document.querySelectorAll(".profile-select img").forEach(i => {
      i.classList.remove("active");
    });

    img.classList.add("active");
  };

  container.appendChild(img);
});
</script>

</body>
</html>
