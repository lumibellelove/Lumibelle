<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMI ID</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(180deg,#fff8fb,#ffeef6);
}

/* 전체 */
.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

/* 카드 */
.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(255,95,168,0.15);
  margin-bottom:16px;
}

/* 프로필 */
.profile{
  display:flex;
  align-items:center;
  gap:16px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff8ac2;
}

.name{
  font-size:18px;
  font-weight:bold;
}

.point{
  font-size:14px;
  color:#ff5fa8;
}

/* 게이지 */
.bar{
  margin-top:10px;
  height:10px;
  background:#ffe6f1;
  border-radius:10px;
  overflow:hidden;
}

.bar-fill{
  width:65%;
  height:100%;
  background:linear-gradient(90deg,#ff8ac2,#ff5fa8);
}

/* 메뉴 */
.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.menu a{
  text-decoration:none;
  background:#ffe6f1;
  padding:14px;
  border-radius:14px;
  text-align:center;
  color:#ff5fa8;
  font-weight:600;
  transition:0.2s;
}

.menu a:hover{
  transform:translateY(-3px);
}

/* 메시지 */
.msg{
  background:#fff0f7;
  padding:12px;
  border-radius:14px;
  margin-bottom:8px;
}

/* 제목 */
.title{
  font-size:16px;
  margin-bottom:10px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- 프로필 -->
  <div class="card">
    <div class="profile">
      <img src="../img/member/mariring/mariring-01.webp">
      <div>
        <div class="name">마리링</div>
        <div class="point">Lv.3 · 1200P</div>
      </div>
    </div>

    <div class="bar">
      <div class="bar-fill"></div>
    </div>
    <small>다음 등급까지 300P 남음</small>
  </div>

  <!-- 메뉴 -->
  <div class="card">
    <div class="title">MENU</div>
    <div class="menu">
      <a href="profile.html">프로필</a>
      <a href="frame.html">프레임</a>
      <a href="badge.html">업적</a>
      <a href="point.html">포인트</a>
      <a href="letter.html">우편함</a>
      <a href="message.html">메시지</a>
    </div>
  </div>

  <!-- 최근 메시지 -->
  <div class="card">
    <div class="title">최근 메시지</div>
     <div class="msg">마리링: 오늘도 와줘서 고마워 💕</div>
  <div class="msg">루루: 다음 공연 기대해!</div>
</div>

</div>

<script>
const point = 1200;

let level = 1;

if(point >= 3500) level = 5;
else if(point >= 2000) level = 4;
else if(point >= 1000) level = 3;
else if(point >= 500) level = 2;

let next = 0;
if(level === 1) next = 500 - point;
else if(level === 2) next = 1000 - point;
else if(level === 3) next = 2000 - point;
else if(level === 4) next = 3500 - point;
else next = 0;

let percent = 0;
if(level === 1) percent = (point / 500) * 100;
else if(level === 2) percent = ((point-500)/500)*100;
else if(level === 3) percent = ((point-1000)/1000)*100;
else if(level === 4) percent = ((point-2000)/1500)*100;
else percent = 100;

document.querySelector(".point").innerText = `Lv.${level} · ${point}P`;
document.querySelector(".bar-fill").style.width = percent + "%";
document.querySelector(".next-text").innerText = `다음 등급까지 ${next}P 남음`;
</script>

</body>
</html>
</body>
</html>
