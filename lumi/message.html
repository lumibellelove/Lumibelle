<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMI MESSAGE</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(180deg,#fff8fb,#ffeef6);
  color:#6f5868;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:18px;
  padding-bottom:90px;
}

.top-nav{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:14px;
}

.top-nav a{
  text-decoration:none;
  text-align:center;
  padding:10px 8px;
  border-radius:999px;
  background:#fff;
  color:#ff5fa8;
  font-size:13px;
  font-weight:800;
  box-shadow:0 6px 16px rgba(255,95,168,.12);
}

.phone{
  background:#fff;
  border:1px solid #f2d8e7;
  border-radius:28px;
  box-shadow:0 14px 35px rgba(255,95,168,.18);
  overflow:hidden;
}

.phone-head{
  padding:18px;
  background:linear-gradient(135deg,#ff8ac2,#ff5fa8);
  color:#fff;
  text-align:center;
}

.phone-head h1{
  margin:0;
  font-size:22px;
}

.phone-head p{
  margin:6px 0 0;
  font-size:13px;
  opacity:.9;
}

.member-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:12px;
  background:#fff7fb;
  border-bottom:1px solid #f2d8e7;
}

.member-tabs button{
  border:none;
  border-radius:999px;
  padding:10px 6px;
  background:#fff;
  color:#c483a5;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(255,95,168,.08);
}

.member-tabs button.active{
  background:#ff5fa8;
  color:#fff;
}

.chat{
  min-height:420px;
  padding:18px;
  background:
    radial-gradient(circle at 20% 10%,rgba(255,192,215,.22),transparent 25%),
    linear-gradient(180deg,#fffafd,#fff5fb);
}

.bubble{
  max-width:78%;
  padding:11px 13px;
  border-radius:18px;
  margin-bottom:8px;
  line-height:1.55;
  font-size:14px;
  animation:pop .18s ease;
}

.member{
  background:#fff;
  border:1px solid #f2d8e7;
  color:#735c6a;
  border-bottom-left-radius:6px;
}

.me{
  margin-left:auto;
  background:linear-gradient(135deg,#ff8ac2,#ff5fa8);
  color:#fff;
  border-bottom-right-radius:6px;
}

@keyframes pop{
  from{transform:translateY(5px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.choices{
  padding:14px;
  background:#fff;
  border-top:1px solid #f2d8e7;
  display:grid;
  gap:8px;
}

.choices button{
  border:none;
  border-radius:16px;
  padding:13px;
  background:#ffe6f1;
  color:#ff5fa8;
  font-weight:800;
  cursor:pointer;
  text-align:left;
}

.choices button:hover{
  background:#ffd8ea;
}

.reset-btn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:999px;
  padding:12px;
  background:#fff;
  color:#c483a5;
  font-weight:800;
  box-shadow:0 6px 16px rgba(255,95,168,.1);
}

.notice{
  margin-top:12px;
  text-align:center;
  color:#b48a9f;
  font-size:12px;
  line-height:1.6;
}

@media(max-width:520px){
  .top-nav{
    grid-template-columns:repeat(2,1fr);
  }

  .member-tabs{
    grid-template-columns:repeat(2,1fr);
  }

  .bubble{
    max-width:86%;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top-nav">
    <a href="../index.html">🏠 홈</a>
    <a href="../schedule.html">🎤 라이브장</a>
    <a href="../gamezone/">🎮 오락실</a>
    <a href="#">💬 뒷풀이</a>
  </div>

  <div class="phone">
    <div class="phone-head">
      <h1>LUMI MESSAGE</h1>
      <p>루미벨에게서 메시지가 도착했어요</p>
    </div>

    <div class="member-tabs">
      <button class="active" onclick="loadChat('mariring', this)">마리링</button>
      <button onclick="loadChat('lulu', this)">루루</button>
      <button onclick="loadChat('iro', this)">이로</button>
      <button onclick="loadChat('luna', this)">루나</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="choices" id="choices"></div>
  </div>

  <button class="reset-btn" onclick="resetChat()">대화 다시 보기</button>

  <div class="notice">
    ※ 현재는 데모 대화입니다.<br>
    추후 레벨, 업적, 이벤트에 따라 새로운 메시지가 열릴 예정이에요.
  </div>

</div>

let current = "mariring";

function addBubble(text, type="member"){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function loadChat(member, btn){
  current = member;

  document.querySelectorAll(".member-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const chat = document.getElementById("chat");
  const choices = document.getElementById("choices");

  chat.innerHTML = "";
  choices.innerHTML = "";

  chats[member].start.forEach((line, i)=>{
    setTimeout(()=>addBubble(line), i * 250);
  });

  setTimeout(()=>renderChoices(member), chats[member].start.length * 260);
}

function renderChoices(member){
  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  chats[member].choices.forEach(choice=>{
    const btn = document.createElement("button");
    btn.innerText = choice.text;
    btn.onclick = ()=>{
      addBubble("나: " + choice.me, "me");
      choices.innerHTML = "";

      choice.reply.forEach((line, i)=>{
        setTimeout(()=>addBubble(line), (i+1) * 350);
      });
    };
    choices.appendChild(btn);
  });
}

function resetChat(){
  const activeBtn = document.querySelector(".member-tabs button.active");
  loadChat(current, activeBtn);
}

window.onload = ()=>{
  loadChat("mariring", document.querySelector(".member-tabs button"));
};

</html>
