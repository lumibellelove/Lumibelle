<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>루미벨 티켓 예매</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#fff7fb;
  padding:20px;
}
.wrap{
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(255,95,168,0.2);
}
input, select, button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  background:#ff5fa8;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
#result{
  margin-top:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrap">
<h2>🎫 루미벨 티켓 예매</h2>

<input type="text" id="name" placeholder="닉네임">
<input type="text" id="phone" placeholder="연락처">

<select id="member">
  <option value="">지명 선택</option>
  <option>마리링</option>
  <option>이로</option>
  <option>LUNAR</option>
  <option>루루</option>
</select>

<button onclick="makeTicket()">예매하기</button>

<div id="result"></div>
</div>

<script>
function makeTicket(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let member = document.getElementById("member").value;

  if(!name || !phone || !member){
    alert("정보 다 입력해줘!");
    return;
  }

  // 루미 ID 생성
  let lumiId = "LB-" + Math.floor(1000 + Math.random()*9000);

  // 티켓 번호 생성
  let ticketId = "LBT-0712-" + Math.floor(1000 + Math.random()*9000);

  // QR에 들어갈 데이터
  let qrData = `https://lumibel.com/checkin?ticket=${ticketId}&uid=${lumiId}`;

  document.getElementById("result").innerHTML = `
    <h3>예매 완료 💗</h3>
    <p>닉네임: ${name}</p>
    <p>지명: ${member}</p>
    <p>루미ID: ${lumiId}</p>
    <p>티켓번호: ${ticketId}</p>
    <div id="qrcode"></div>
    <p>📸 캡처해두면 빠르게 입장 가능!</p>
  `;

  new QRCode(document.getElementById("qrcode"), {
    text: qrData,
    width: 200,
    height: 200
  });
}
</script>

</body>
</html>
