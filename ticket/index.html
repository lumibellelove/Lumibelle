<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TICKET | Lumibelle</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body>

<!-- 🔥 여기부터 핵심 수정 -->

<div class="notice-box">
<h3>입장 및 대기 규칙</h3>
<ul>
  <li>줄 대기 시작: <strong>13:20부터 가능</strong>합니다.</li>
  <li>13:20 이전 대기는 절대 불가합니다.</li>
  <li>입장 순서: 사전 예약 입장(13:50~) ▶ 현장 입장</li>
  <li>입장 시 <strong>닉네임 + 숫자 4자리</strong>가 일치해야 합니다.</li>
  <li>입금 확인이 완료된 예약자만 QR 체크인을 통해 입장할 수 있습니다.</li>
</ul>
</div>

<article class="ticket-card">

<h2>예매 정보 입력</h2>

<div class="status-row">
  <span class="status-pill">계좌 : 국민은행 000000-00-000000</span>
  <span class="status-pill">예금주 : 루미벨</span>
</div>

<p class="ticket-note">
입금 확인이 완료된 예약자만 공연 당일 QR 체크인을 통해 입장할 수 있어요.
</p>

</article>

<!-- 🔥 여기까지 수정 -->

</body>
</html>
