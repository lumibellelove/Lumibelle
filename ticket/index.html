  <style>
   :root{--panel:#fff5fb;--line:#f2d8e7;--pink:#ff5fa8;--text:#7f6a77;--muted:#b28ea2;--shadow:0 8px 24px rgba(232,191,211,.12)}
    *{box-sizing:border-box} html,body{margin:0;padding:0} body{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#fffafc 0%,#fff8fb 100%);color:var(--text);font-family:"SUIT","Noto Sans KR",sans-serif;letter-spacing:-.01em} main{flex:1}
    
    /* 상단 레이아웃 스타일 (기존 스타일 생략 후 하단에 FINAL 코드로 덮어씌움) */

    /* [기존 티켓 페이지 전용 스타일들...] */
    .ticket-container{max-width:1200px;margin:60px auto;padding:0 24px}
    /* ... (생략된 기존 티켓 페이지 본문 스타일들) ... */

    /* ===== FINAL: 홈 기준 상단 레이아웃 강제 통일 (사용자 요청 반영) ===== */
    .wrap {
      width: min(1260px, calc(100% - 32px)) !important;
      margin: 0 auto !important;
    }

    .top-lang-bar {
      width: 100% !important;
      max-width: 1260px !important;
      margin: 16px auto 0 !important;
      display: flex !important;
      justify-content: flex-end !important;
      padding: 0 34px 0 18px !important;
      box-sizing: border-box !important;
    }

    .lang-switch {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
    }

    .lang-switch a {
      margin-left: 0 !important;
      text-decoration: none !important;
      font-size: 0.85em !important;
      color: #b28ea2 !important;
    }

    .header-box {
      display: flex !important;
      align-items: center !important;
      gap: 24px !important;
      margin-top: 20px !important;
    }

    .logo img {
      display: block !important;
      max-width: 150px !important;
      height: auto !important;
    }

    nav {
      display: grid !important;
      grid-template-columns: repeat(8, minmax(0, 1fr)) !important;
      gap: 18px !important;
      text-align: center !important;
      align-items: center !important;
      flex: 1 !important;
      margin: 0 20px !important;
    }

    nav a {
      width: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      min-width: 0 !important;
      border-radius: 22px !important;
      text-decoration: none !important;
      transform: none !important;
    }

    nav a b,
    nav a span {
      display: block !important;
      width: 100% !important;
      text-align: center !important;
      white-space: nowrap !important;
    }

    nav a b {
      font-size: 1.18em !important;
      font-weight: 700 !important;
      color: #d97ca9 !important;
    }

    nav a span {
      margin-top: 2px !important; /* 홈 기준인 2px로 수정 */
      font-size: 0.94em !important;
      font-weight: 600 !important;
      color: #c697b1 !important;
    }

    nav a.current b,
    nav a:hover b {
      color: #ff59a5 !important;
    }

    nav a.current span,
    nav a:hover span {
      color: #d88dad !important;
    }

    /* 마우스 효과용 스타일 유지 */
    #lumi-cursor-glow { position: fixed; top: 0; left: 0; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,182,213,0.15) 0%, rgba(255,255,255,0) 70%); pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: opacity 0.3s ease; opacity: 0; }
    #lumi-cursor-core { position: fixed; top: 0; left: 0; width: 12px; height: 12px; background: #ffb6d5; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 10px #ffb6d5; transition: opacity 0.3s ease; opacity: 0; }
    .lumi-cursor-spark { position: fixed; width: 6px; height: 6px; background: #ffdeeb; border-radius: 50%; pointer-events: none; z-index: 9997; }

    /* 반응형 규칙 생략 (사용자 제공 코드와 동일) */
    @media (max-width: 1180px) { ... }
    @media (max-width: 780px) { ... }
  </style>
 </head>
 <body>
