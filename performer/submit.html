
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Performer Submit | Lumibelle</title><style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=SUIT:wght@500;600;700;800;900&display=swap');:root{--pink:#ff5fa8;--pink2:#d77ca7;--line:#f2d8e7;--text:#7f6a77;--muted:#b28ea2;--shadow:0 14px 32px rgba(232,191,211,.16)}*{box-sizing:border-box}body{margin:0;font-family:"SUIT",sans-serif;color:var(--text);background:linear-gradient(180deg,#fffafc,#fff0f7)}.wrap{width:min(760px,calc(100% - 28px));margin:0 auto;padding:24px 0 52px}.hero,.card{border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);border-radius:28px}.hero{padding:34px 28px;background:linear-gradient(135deg,#fff0f7,#f7efff)}h1{font-family:"Cormorant Garamond",serif;font-size:60px;line-height:.9;color:var(--pink);margin:10px 0}.card{padding:22px;margin-top:14px}.field{display:grid;gap:7px;margin-bottom:12px}label{font-weight:900;color:#9a7187}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;font:inherit;font-weight:800;color:var(--text)}textarea{min-height:100px}.btn{width:100%;min-height:52px;border:0;border-radius:999px;background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;font-weight:900;font-size:16px}.msg{display:none;margin-top:12px;padding:14px;border-radius:18px;background:#e9fff0;color:#21864a;font-weight:900;line-height:1.6}</style></head><body><div class="wrap"><section class="hero"><h1>Performer<br>Submit</h1><p>출연 준비에 필요한 정보를 작성해 주세요. 이 1차 버전은 화면 확인용이며, Google Sheet 저장 연동은 다음 단계에서 연결합니다.</p></section><form class="card" id="form"><div class="field"><label>팀명</label><input name="team" required></div><div class="field"><label>대표자명 / 담당자명</label><input name="manager"></div><div class="field"><label>연락 가능한 X 계정 또는 이메일</label><input name="contact"></div><div class="field"><label>출연 인원수</label><input name="members" type="number"></div><div class="field"><label>동행 스탭 인원수</label><input name="staff" type="number"></div><div class="field"><label>점심 수령 여부</label><select name="meal"><option>O</option><option>X</option><option>미정</option></select></div><div class="field"><label>알레르기 / 식단 특이사항</label><textarea name="allergy"></textarea></div><div class="field"><label>물판 진행 여부</label><select name="booth"><option>진행</option><option>미진행</option><option>미정</option></select></div><div class="field"><label>세트리스트</label><textarea name="setlist" placeholder="곡명 / 곡 순서"></textarea></div><div class="field"><label>음원 / 영상 / 마이크 요청</label><textarea name="tech"></textarea></div><div class="field"><label>정산 계좌 정보</label><textarea name="account" placeholder="은행 / 계좌번호 / 예금주"></textarea></div><div class="field"><label>기타 특이사항</label><textarea name="memo"></textarea></div><button class="btn">제출 내용 저장</button><div class="msg" id="msg">작성 내용이 이 브라우저에 저장되었습니다. 실제 접수 연동은 Google Sheet 연결 후 사용해 주세요.</div></form></div><script>document.getElementById('form').onsubmit=e=>{e.preventDefault();localStorage.setItem('performerSubmitDraft',JSON.stringify(Object.fromEntries(new FormData(e.target).entries())));document.getElementById('msg').style.display='block'};</script></body></html>
