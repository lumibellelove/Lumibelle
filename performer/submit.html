<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Performer Submit | Lumibelle</title><style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=SUIT:wght@500;600;700;800;900&display=swap');:root{--pink:#ff5fa8;--pink2:#d77ca7;--line:#f2d8e7;--text:#7f6a77;--muted:#b28ea2;--shadow:0 14px 32px rgba(232,191,211,.16)}*{box-sizing:border-box}body{margin:0;font-family:"SUIT",sans-serif;color:var(--text);background:linear-gradient(180deg,#fffafc,#fff0f7)}.wrap{width:min(760px,calc(100% - 28px));margin:0 auto;padding:24px 0 52px}.hero,.card{border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);border-radius:28px}.hero{padding:34px 28px;background:linear-gradient(135deg,#fff0f7,#f7efff)}h1{font-family:"Cormorant Garamond",serif;font-size:60px;line-height:.9;color:var(--pink);margin:10px 0}.hero p{font-weight:800;line-height:1.7}.card{padding:22px;margin-top:14px}.field{display:grid;gap:7px;margin-bottom:12px}label{font-weight:900;color:#9a7187}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;font:inherit;font-weight:800;color:var(--text);background:#fff}textarea{min-height:100px}.btn{width:100%;min-height:52px;border:0;border-radius:999px;background:linear-gradient(180deg,#ff7eb3,#ff5fa5);color:#fff;font-weight:900;font-size:16px}.msg{display:none;margin-top:12px;padding:14px;border-radius:18px;background:#e9fff0;color:#21864a;font-weight:900;line-height:1.6}.hidden{display:none!important}.notice{padding:13px 14px;border:1px solid var(--line);background:#fff7fb;border-radius:18px;font-size:13px;font-weight:800;line-height:1.6;color:#8f7183;margin-bottom:14px}</style></head><body><div class="wrap"><section class="hero"><h1>Performer<br>Submit</h1><p>출연 준비에 필요한 정보를 작성해 주세요. 운영자가 선택한 항목만 표시됩니다.</p></section><form class="card" id="form"><div class="notice">작성 후 제출하면 현재 브라우저에 임시 저장됩니다. Google Sheet 접수 연동은 다음 단계에서 연결됩니다.</div>
<div class="field" data-field="팀명"><label>팀명</label><input name="team" required></div>
<div class="field" data-field="대표자명"><label>대표자명 / 담당자명</label><input name="manager"></div>
<div class="field" data-field="연락 가능한 X/메일"><label>연락 가능한 X 계정 또는 이메일</label><input name="contact"></div>
<div class="field" data-field="출연 인원수"><label>출연 인원수</label><input name="members" type="number"></div>
<div class="field" data-field="동행 스탭 인원수"><label>동행 스탭 인원수</label><input name="staff" type="number"></div>
<div class="field" data-field="점심 신청 여부"><label>점심 수령 여부</label><select name="meal"><option>O</option><option>X</option><option>미정</option></select></div>
<div class="field" data-field="알레르기"><label>알레르기 / 식단 특이사항</label><textarea name="allergy"></textarea></div>
<div class="field" data-field="물판 진행 여부"><label>물판 진행 여부</label><select name="booth"><option>진행</option><option>미진행</option><option>미정</option></select></div>
<div class="field" data-field="세트리스트"><label>세트리스트</label><textarea name="setlist" placeholder="곡명 / 곡 순서"></textarea></div>
<div class="field" data-field="음원 파일명"><label>음원 파일명</label><textarea name="audio" placeholder="파일명 / 곡 순서 / 전달 방식"></textarea></div>
<div class="field" data-field="영상 사용 여부"><label>영상 사용 여부</label><select name="video"><option>사용</option><option>미사용</option><option>미정</option></select></div>
<div class="field" data-field="마이크 필요 수"><label>마이크 필요 수</label><input name="mic" placeholder="예: 무선 마이크 2대"></div>
<div class="field" data-field="정산 계좌"><label>정산 계좌 정보</label><textarea name="account" placeholder="은행 / 계좌번호 / 예금주"></textarea></div>
<div class="field" data-field="안전교육 수료 여부"><label>공연자 안전교육 수료 여부</label><select name="safety"><option>수료 완료</option><option>제출 예정</option><option>해당 없음</option></select></div>
<div class="field" data-field="자료 제출 여부"><label>자료 제출 여부</label><select name="submitStatus"><option>제출 완료</option><option>제출 예정</option><option>확인 필요</option></select></div>
<div class="field" data-field="특이사항"><label>기타 특이사항</label><textarea name="memo"></textarea></div>
<button class="btn">제출 내용 저장</button><div class="msg" id="msg">작성 내용이 이 브라우저에 저장되었습니다. 실제 접수 연동은 Google Sheet 연결 후 사용해 주세요.</div></form></div><script>
function applyConfig(){let cfg={};try{cfg=JSON.parse(localStorage.getItem('lumiOfficeSubmitConfig')||'{}')}catch(e){};document.querySelectorAll('[data-field]').forEach(el=>{const key=el.dataset.field;if(Object.prototype.hasOwnProperty.call(cfg,key)&&cfg[key]===false){el.classList.add('hidden')}else{el.classList.remove('hidden')}})}
applyConfig();
document.getElementById('form').onsubmit=e=>{e.preventDefault();localStorage.setItem('performerSubmitDraft',JSON.stringify(Object.fromEntries(new FormData(e.target).entries())));document.getElementById('msg').style.display='block'};
</script></body></html>
